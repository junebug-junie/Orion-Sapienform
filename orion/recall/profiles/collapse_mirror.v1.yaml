# Lighter than reflect.v1 for actions.respond_to_juniper_collapse_mirror.v1:
# - disable query expansion (single fragment pass) to cut sequential backend fan-out
# - shorter SQL window and smaller top_k vs reflect.v1 (7d / 200 rows)
profile: collapse_mirror.v1
vector_top_k: 8
rdf_top_k: 6
max_per_source: 3
max_total_items: 16
time_decay_half_life_hours: 72
render_budget_tokens: 256
enable_query_expansion: false
enable_sql_timeline: true
sql_since_minutes: 2880
# 48 hours
sql_top_k: 40
relevance:
  backend_weights:
    vector: 1.0
    sql_timeline: 0.9
    sql_chat: 0.6
    rdf_chat: 0.55
    rdf: 0.4
  score_weight: 0.7
  text_similarity_weight: 0.15
  recency_weight: 0.1
  enable_recency: true
  recency_half_life_hours: 72

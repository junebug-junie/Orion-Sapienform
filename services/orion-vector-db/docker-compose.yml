# ───────────────────────────────────────────────────────────────
# 🧠 Orion Vector DB — Standalone ChromaDB Server + UI Viewer
# ───────────────────────────────────────────────────────────────

services:
  vector-db:
    image: chromadb/chroma:0.4.24
    container_name: ${PROJECT}-vector-db
    restart: unless-stopped
    networks:
      - app-net
    ports:
      # Maps the host port to the container's internal port (8000).
      - "${PORT}:8000"
    volumes:
      - ${CHROMA_DATA_PATH}:/chroma/chroma
      - ./scripts/chroma_preflight.py:/opt/orion/chroma_preflight.py:ro
    entrypoint:
      - /bin/sh
      - -c
    command:
      - "python /opt/orion/chroma_preflight.py /chroma/chroma/chroma.sqlite3 && exec uvicorn chromadb.app:app --host 0.0.0.0 --port 8000"

    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      #- ANONYMIZED_TELEMETRY=False
      - CHROMA_MULTI_TENANT=true
      #- ALLOW_RESET=true
      #- IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

      - CHROMA_SERVER_HTTP_PORT=8000
      - CHROMA_ALLOW_RESET=true
      - CHROMA_NO_TELEMETRY=true
      - CHROMA_LOG_LEVEL=DEBUG

    healthcheck:
      test: ["CMD-SHELL", "python -c 'import requests; import sys; sys.exit(0 if requests.get(\"http://localhost:8000/api/v1/heartbeat\").ok else 1)' || exit 1"]      
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s


networks:
  app-net:
    name: ${NET}
    external: true


version: v1
required_sections:
  - us_politics
  - global_politics
  - local_politics
recommended_sections:
  - ai_technology
  - science_climate_energy
  - healthcare_mental_health
  - security_infrastructure_software
  - hardware_compute_gpu
  - local_conditions
default_limits:
  max_articles_per_run: 100
trust_policy:
  default_min_tier_for_graph: 2
politics_policy:
  separate_fact_from_analysis: true
stance_policy:
  politics_default: only_when_requested
digest_policy:
  max_digest_items_total: 12
  max_digest_items_per_section: 2
  min_digest_items_per_required_section: 1
  max_worth_reading: 10
  max_worth_watching: 8
  prefer_required_sections: true
  include_coverage_note: true
situation_policy:
  max_situation_changes_per_run: 25
  group_articles_by_topic: true
  min_articles_for_corroborated_topic: 2
ranking_policy:
  weights:
    source_trust: 0.25
    section_priority: 0.20
    novelty: 0.20
    local_relevance: 0.15
    orion_relevance: 0.10
    recency: 0.10
clustering_policy:
  enabled: true
  similarity_threshold: 0.45
  max_articles_per_cluster: 8
  min_strong_terms: 2
  preserve_section_boundaries: true
  allow_cross_source_merge: true
  weak_token_file: null
sources:
  - source_id: npr_us_politics
    name: NPR Politics RSS
    type: rss
    strategy: rss
    url: https://feeds.npr.org/1014/rss.xml
    domains: ["feeds.npr.org", "www.npr.org", "npr.org"]
    allowed_path_prefixes: ["/"]
    categories: ["us_politics"]
    region_scope: us
    trust_tier: 2
    factuality: high
    enabled: true
    approved: true
    required: false
    allowed_uses:
      digest: true
      claim_extraction: true
      graph_write: true
      stance_capsule: false
      prior_update_candidate: true
    politics_allowed: true
    requires_corroboration: true
    max_articles_per_day: 8
    fetch_timeout_seconds: 20
    notes: "Reachable RSS feed used for US politics coverage."
  - source_id: bbc_world
    name: BBC World RSS
    type: rss
    strategy: rss
    url: https://feeds.bbci.co.uk/news/world/rss.xml
    domains: ["feeds.bbci.co.uk", "www.bbc.com", "www.bbc.co.uk", "bbc.com", "bbc.co.uk"]
    allowed_path_prefixes: ["/news/world", "/news"]
    categories: ["global_politics"]
    region_scope: global
    trust_tier: 2

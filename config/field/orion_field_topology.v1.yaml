# Canonical Orion field topology (biometrics + execution dynamics).
schema_version: field_lattice.v1

nodes:
  - node_id: atlas
  - node_id: athena
  - node_id: circe
  - node_id: prometheus

capabilities:
  - capability_id: llm_inference
  - capability_id: transport
  - capability_id: orchestration
  - capability_id: storage
  - capability_id: vision
  - capability_id: graph
  - capability_id: memory

node_channels:
  - availability
  - staleness
  - cpu_pressure
  - memory_pressure
  - gpu_pressure
  - thermal_pressure
  - disk_pressure
  - expected_offline_suppression
  - execution_load
  - execution_friction
  - reasoning_load
  - failure_pressure
  - transport_pressure
  - contract_pressure
  - catalog_drift_pressure
  - delivery_confidence
  - bus_health
  - observer_failure_pressure
  - conversation_load
  - repair_pressure

capability_channels:
  - pressure
  - confidence
  - available_capacity
  - execution_pressure
  - reasoning_pressure
  - reliability_pressure
  - transport_pressure
  - contract_pressure

edges:
  - source_id: node:atlas
    target_id: capability:llm_inference
    edge_type: node_capability
    weight: 0.85
    channel_map:
      gpu_pressure: pressure
      memory_pressure: pressure
      reasoning_load: reasoning_pressure

  - source_id: node:athena
    target_id: capability:transport
    edge_type: node_capability
    weight: 0.85
    channel_map:
      transport_pressure: pressure
      catalog_drift_pressure: contract_pressure
      observer_failure_pressure: reliability_pressure
      delivery_confidence: confidence
      bus_health: available_capacity

  - source_id: node:athena
    target_id: capability:orchestration
    edge_type: node_capability
    weight: 0.90
    channel_map:
      cpu_pressure: pressure
      execution_load: execution_pressure
      execution_friction: reliability_pressure
      failure_pressure: reliability_pressure
      transport_pressure: pressure
      reasoning_load: reasoning_pressure

  - source_id: node:athena
    target_id: capability:storage
    edge_type: node_capability
    weight: 0.75
    channel_map:
      disk_pressure: pressure
      memory_pressure: pressure

  - source_id: node:athena
    target_id: capability:graph
    edge_type: node_capability
    weight: 0.70
    channel_map:
      cpu_pressure: pressure

  - source_id: node:prometheus
    target_id: capability:memory
    edge_type: node_capability
    weight: 0.60
    channel_map:
      cpu_pressure: pressure

  - source_id: node:circe
    target_id: capability:llm_inference
    edge_type: node_capability
    weight: 0.50
    channel_map:
      gpu_pressure: pressure

  # capability→capability: transport degradation bleeds into orchestration
  - source_id: capability:transport
    target_id: capability:orchestration
    edge_type: capability_capability
    weight: 0.70
    channel_map:
      transport_pressure: transport_pressure
      contract_pressure: reliability_pressure

  # capability→capability: inference unavailability raises orchestration pressure
  - source_id: capability:llm_inference
    target_id: capability:orchestration
    edge_type: capability_capability
    weight: 0.60
    channel_map:
      pressure: pressure

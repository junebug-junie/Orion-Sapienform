services:
  thought:
    build:
      context: ../..
      dockerfile: services/orion-thought/Dockerfile
    container_name: ${PROJECT}-thought
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_NAME=${SERVICE_NAME:-orion-thought}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}
      - NODE_NAME=${NODE_NAME}
      - THOUGHT_PORT=${THOUGHT_PORT:-7155}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED:-true}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG:-false}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - CHANNEL_THOUGHT_REQUEST=${CHANNEL_THOUGHT_REQUEST:-orion:thought:request}
      - CHANNEL_THOUGHT_ARTIFACT=${CHANNEL_THOUGHT_ARTIFACT:-orion:thought:artifact}
      - CHANNEL_THOUGHT_RESULT_PREFIX=${CHANNEL_THOUGHT_RESULT_PREFIX:-orion:thought:result:}
      - CHANNEL_CORTEX_EXEC_REQUEST=${CHANNEL_CORTEX_EXEC_REQUEST:-orion:cortex:exec:request}
      - CHANNEL_CORTEX_EXEC_RESULT_PREFIX=${CHANNEL_CORTEX_EXEC_RESULT_PREFIX:-orion:exec:result}
      - STANCE_REACT_TIMEOUT_SEC=${STANCE_REACT_TIMEOUT_SEC:-120}
      - ORION_THOUGHT_MIND_ENRICHMENT_ENABLED=${ORION_THOUGHT_MIND_ENRICHMENT_ENABLED:-false}
      - ORION_MIND_BASE_URL=${ORION_MIND_BASE_URL:-http://orion-mind:6611}
      - ORION_THOUGHT_MIND_TIMEOUT_SEC=${ORION_THOUGHT_MIND_TIMEOUT_SEC:-210}
      - ORION_THOUGHT_MIND_WALL_MS=${ORION_THOUGHT_MIND_WALL_MS:-180000}
      - ORION_THOUGHT_MIND_ROUTER_PROFILE=${ORION_THOUGHT_MIND_ROUTER_PROFILE:-default}
      - ORION_THOUGHT_MIND_MAX_RESPONSE_BYTES=${ORION_THOUGHT_MIND_MAX_RESPONSE_BYTES:-2000000}
      - ORION_THOUGHT_MIND_ARTIFACT_PUBLISH_ENABLED=${ORION_THOUGHT_MIND_ARTIFACT_PUBLISH_ENABLED:-false}
      - ORION_THOUGHT_MIND_COLORING_MAX_ITEMS=${ORION_THOUGHT_MIND_COLORING_MAX_ITEMS:-3}
      - CHANNEL_MIND_ARTIFACT=${CHANNEL_MIND_ARTIFACT:-orion:mind:artifact}
      - NOTIFY_BASE_URL=${NOTIFY_BASE_URL:-http://orion-athena-notify:7140}
      - NOTIFY_API_TOKEN=${NOTIFY_API_TOKEN:-}
    networks:
      - app-net
    ports:
      - "${THOUGHT_PORT:-7155}:7155"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7155/health"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-net:
    external: true

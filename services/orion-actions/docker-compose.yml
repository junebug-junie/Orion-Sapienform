services:
  actions:
    build:
      context: ../..
      dockerfile: services/orion-actions/Dockerfile
    container_name: ${PROJECT}-actions
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
      - LOG_LEVEL=DEBUG
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - LOG_LEVEL=${LOG_LEVEL}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ACTIONS_SUBSCRIBE_CHANNEL=${ACTIONS_SUBSCRIBE_CHANNEL}
      - ACTIONS_SUBSCRIBE_CHANNELS=${ACTIONS_SUBSCRIBE_CHANNELS}
      - CORTEX_REQUEST_CHANNEL=${CORTEX_REQUEST_CHANNEL}
      - ACTIONS_VERB=${ACTIONS_VERB}
      - CORTEX_EXEC_REQUEST_CHANNEL=${CORTEX_EXEC_REQUEST_CHANNEL}
      - CORTEX_EXEC_DAILY_REQUEST_CHANNEL=${CORTEX_EXEC_DAILY_REQUEST_CHANNEL:-orion:cortex:exec:request:background}
      - ACTIONS_EXEC_TIMEOUT_SECONDS=${ACTIONS_EXEC_TIMEOUT_SECONDS}
      - NOTIFY_URL=${NOTIFY_URL}
      - NOTIFY_API_TOKEN=${NOTIFY_API_TOKEN}
      - ACTIONS_RECIPIENT_GROUP=${ACTIONS_RECIPIENT_GROUP}
      - ACTIONS_SESSION_ID=${ACTIONS_SESSION_ID}
      - ACTIONS_DEDUPE_TTL_SECONDS=${ACTIONS_DEDUPE_TTL_SECONDS}
      - ACTIONS_NOTIFY_DEDUPE_WINDOW_SECONDS=${ACTIONS_NOTIFY_DEDUPE_WINDOW_SECONDS}
      - ACTIONS_MAX_CONCURRENCY=${ACTIONS_MAX_CONCURRENCY}
      - ACTIONS_RECALL_PROFILE=${ACTIONS_RECALL_PROFILE}
      - ACTIONS_JOURNAL_SCHEDULER_RECALL_PROFILE=${ACTIONS_JOURNAL_SCHEDULER_RECALL_PROFILE}
      - ACTIONS_JOURNAL_METACOG_RECALL_PROFILE=${ACTIONS_JOURNAL_METACOG_RECALL_PROFILE}
      - ACTIONS_JOURNAL_NOTIFY_RECALL_PROFILE=${ACTIONS_JOURNAL_NOTIFY_RECALL_PROFILE}
      - ACTIONS_JOURNAL_WORLD_PULSE_RECALL_PROFILE=${ACTIONS_JOURNAL_WORLD_PULSE_RECALL_PROFILE}
      - ACTIONS_WORLD_PULSE_RUN_DRY_RUN=${ACTIONS_WORLD_PULSE_RUN_DRY_RUN}
      - ACTIONS_WORLD_PULSE_JOURNAL_ENABLED=${ACTIONS_WORLD_PULSE_JOURNAL_ENABLED}
      - ACTIONS_WORLD_PULSE_JOURNAL_ALLOW_DRY_RUN=${ACTIONS_WORLD_PULSE_JOURNAL_ALLOW_DRY_RUN}
      - ACTIONS_WORLD_PULSE_ENABLED=${ACTIONS_WORLD_PULSE_ENABLED}
      - ACTIONS_WORLD_PULSE_HOUR_LOCAL=${ACTIONS_WORLD_PULSE_HOUR_LOCAL}
      - ACTIONS_WORLD_PULSE_MINUTE_LOCAL=${ACTIONS_WORLD_PULSE_MINUTE_LOCAL}
      - WORLD_PULSE_BASE_URL=${WORLD_PULSE_BASE_URL}
      - ACTIONS_RECALL_TIMEOUT_SECONDS=${ACTIONS_RECALL_TIMEOUT_SECONDS}
      - ACTIONS_LLM_ROUTE=${ACTIONS_LLM_ROUTE}
      - ACTIONS_DAILY_LLM_ROUTE=${ACTIONS_DAILY_LLM_ROUTE}
      - ACTIONS_JOURNAL_LLM_ROUTE=${ACTIONS_JOURNAL_LLM_ROUTE}
      - ACTIONS_LLM_TIMEOUT_SECONDS=${ACTIONS_LLM_TIMEOUT_SECONDS}
      - ACTIONS_DAILY_TIMEZONE=${ACTIONS_DAILY_TIMEZONE}
      - ACTIONS_DAILY_RUN_ON_STARTUP=${ACTIONS_DAILY_RUN_ON_STARTUP}
      - ACTIONS_DAILY_RUN_ONCE_DATE=${ACTIONS_DAILY_RUN_ONCE_DATE}
      - ACTIONS_DAILY_PULSE_ENABLED=${ACTIONS_DAILY_PULSE_ENABLED}
      - ACTIONS_DAILY_PULSE_HOUR_LOCAL=${ACTIONS_DAILY_PULSE_HOUR_LOCAL}
      - ACTIONS_DAILY_PULSE_MINUTE_LOCAL=${ACTIONS_DAILY_PULSE_MINUTE_LOCAL}
      - ACTIONS_DAILY_METACOG_ENABLED=${ACTIONS_DAILY_METACOG_ENABLED}
      - ACTIONS_DAILY_METACOG_HOUR_LOCAL=${ACTIONS_DAILY_METACOG_HOUR_LOCAL}
      - ACTIONS_DAILY_METACOG_MINUTE_LOCAL=${ACTIONS_DAILY_METACOG_MINUTE_LOCAL}
      - ACTIONS_DAILY_GOAL_ARCHIVE_ENABLED=${ACTIONS_DAILY_GOAL_ARCHIVE_ENABLED:-true}
      - ACTIONS_DAILY_GOAL_ARCHIVE_RUN_ON_STARTUP=${ACTIONS_DAILY_GOAL_ARCHIVE_RUN_ON_STARTUP:-true}
      - ACTIONS_DAILY_GOAL_ARCHIVE_HOUR_LOCAL=${ACTIONS_DAILY_GOAL_ARCHIVE_HOUR_LOCAL:-3}
      - ACTIONS_DAILY_GOAL_ARCHIVE_MINUTE_LOCAL=${ACTIONS_DAILY_GOAL_ARCHIVE_MINUTE_LOCAL:-15}
      - AUTONOMY_GOAL_ARCHIVE_SUBJECTS=${AUTONOMY_GOAL_ARCHIVE_SUBJECTS:-orion,relationship}
      - AUTONOMY_GOAL_ARCHIVE_BOOTSTRAP_MAX_ROUNDS=${AUTONOMY_GOAL_ARCHIVE_BOOTSTRAP_MAX_ROUNDS:-30}
      - AUTONOMY_GOAL_RETENTION_DAYS=${AUTONOMY_GOAL_RETENTION_DAYS:-30}
      - AUTONOMY_GOAL_MAX_ACTIVE_PER_SUBJECT=${AUTONOMY_GOAL_MAX_ACTIVE_PER_SUBJECT:-3}
      - AUTONOMY_GOAL_ARCHIVE_MAX_UPDATES=${AUTONOMY_GOAL_ARCHIVE_MAX_UPDATES:-200}
      - AUTONOMY_GRAPH_QUERY_URL=${AUTONOMY_GRAPH_QUERY_URL}
      - AUTONOMY_GRAPH_UPDATE_URL=${AUTONOMY_GRAPH_UPDATE_URL}
      - AUTONOMY_GRAPH_TIMEOUT_SEC=${AUTONOMY_GRAPH_TIMEOUT_SEC:-30}
      - RDF_STORE_USER=${RDF_STORE_USER:-admin}
      - RDF_STORE_PASS=${RDF_STORE_PASS:-orion}
      - ACTIONS_ASYNC_MESSAGES_ENABLED=${ACTIONS_ASYNC_MESSAGES_ENABLED}
      - ACTIONS_DAILY_ASYNC_MESSAGES_ENABLED=${ACTIONS_DAILY_ASYNC_MESSAGES_ENABLED}
      - ACTIONS_DAILY_EMAIL_ENABLED=${ACTIONS_DAILY_EMAIL_ENABLED}
      - ACTIONS_PENDING_ATTENTION_ENABLED=${ACTIONS_PENDING_ATTENTION_ENABLED}
      - ACTIONS_PRESERVE_GENERIC_NOTIFY_ENABLED=${ACTIONS_PRESERVE_GENERIC_NOTIFY_ENABLED}
      - ACTIONS_SKILLS_SCHEDULER_ENABLED=${ACTIONS_SKILLS_SCHEDULER_ENABLED}
      - ACTIONS_SKILLS_RUN_ON_STARTUP=${ACTIONS_SKILLS_RUN_ON_STARTUP}
      - ACTIONS_SKILLS_INTERVAL_SECONDS=${ACTIONS_SKILLS_INTERVAL_SECONDS}
      - ACTIONS_SKILLS_NOTIFY_ENABLED=${ACTIONS_SKILLS_NOTIFY_ENABLED}
      - ACTIONS_SKILLS_GPU_MEM_THRESHOLD=${ACTIONS_SKILLS_GPU_MEM_THRESHOLD}
      - ACTIONS_SKILLS_BIOMETRICS_STABILITY_THRESHOLD=${ACTIONS_SKILLS_BIOMETRICS_STABILITY_THRESHOLD}
      - ACTIONS_SKILLS_DOCKER_HEALTH_ENABLED=${ACTIONS_SKILLS_DOCKER_HEALTH_ENABLED:-false}
      - ACTIONS_JOURNALING_ENABLED=${ACTIONS_JOURNALING_ENABLED}
      - ACTIONS_JOURNALING_DAILY_ENABLED=${ACTIONS_JOURNALING_DAILY_ENABLED}
      - ACTIONS_JOURNALING_COOLDOWN_SECONDS=${ACTIONS_JOURNALING_COOLDOWN_SECONDS}
      - ACTIONS_JOURNALING_COLLAPSE_DENSE_ONLY=${ACTIONS_JOURNALING_COLLAPSE_DENSE_ONLY}
      - ACTIONS_SCHEDULER_DAILY_JOURNAL_MESSAGES_ENABLED=${ACTIONS_SCHEDULER_DAILY_JOURNAL_MESSAGES_ENABLED}
      - ACTIONS_SCHEDULER_DAILY_JOURNAL_EMAIL_ENABLED=${ACTIONS_SCHEDULER_DAILY_JOURNAL_EMAIL_ENABLED}
      - ACTIONS_JOURNAL_SESSION_ID=${ACTIONS_JOURNAL_SESSION_ID}
      - ACTIONS_JOURNAL_AUTHOR=${ACTIONS_JOURNAL_AUTHOR}
      - ACTIONS_JOURNAL_WRITE_CHANNEL=${ACTIONS_JOURNAL_WRITE_CHANNEL}
      - ACTIONS_WORKFLOW_SCHEDULE_STORE_PATH=${ACTIONS_WORKFLOW_SCHEDULE_STORE_PATH}
      - ACTIONS_SCHEDULER_CURSOR_STORE_PATH=${ACTIONS_SCHEDULER_CURSOR_STORE_PATH}
      - ACTIONS_WORKFLOW_SCHEDULE_CLAIM_BATCH_SIZE=${ACTIONS_WORKFLOW_SCHEDULE_CLAIM_BATCH_SIZE}
      - ACTIONS_WORKFLOW_ATTENTION_OVERDUE_MIN_SECONDS=${ACTIONS_WORKFLOW_ATTENTION_OVERDUE_MIN_SECONDS}
      - ACTIONS_WORKFLOW_ATTENTION_REMINDER_COOLDOWN_SECONDS=${ACTIONS_WORKFLOW_ATTENTION_REMINDER_COOLDOWN_SECONDS}
      - ACTIONS_SELF_EXPERIMENTS_ENABLED=${ACTIONS_SELF_EXPERIMENTS_ENABLED}
      - ACTIONS_SELF_EXPERIMENTS_URL=${ACTIONS_SELF_EXPERIMENTS_URL}
      - ACTIONS_SELF_EXPERIMENTS_TIMEOUT_SECONDS=${ACTIONS_SELF_EXPERIMENTS_TIMEOUT_SECONDS}
    networks:
      - app-net
    ports:
      - "7160:7160"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7160/health"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-net:
    external: true

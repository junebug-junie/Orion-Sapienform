# services/orion-spark-introspector/docker-compose.yml
services:
  spark-introspector:
    build:
      context: ../..
      dockerfile: services/orion-spark-introspector/Dockerfile
    container_name: ${PROJECT}-spark-introspector
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - app-net
    environment:
      PROJECT: ${PROJECT}
      NODE_NAME: ${NODE_NAME}
      SERVICE_NAME: ${SERVICE_NAME}
      SERVICE_VERSION: ${SERVICE_VERSION}

      ORION_BUS_URL: ${ORION_BUS_URL}
      ORION_BUS_ENFORCE_CATALOG: ${ORION_BUS_ENFORCE_CATALOG}
      ORION_BUS_ENABLED: ${ORION_BUS_ENABLED}
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC}
      PORT: ${PORT}

      # Bus channels
      CHANNEL_COGNITION_TRACE_PUB: ${CHANNEL_COGNITION_TRACE_PUB:-orion:cognition:trace}
      CHANNEL_SPARK_TELEMETRY: ${CHANNEL_SPARK_TELEMETRY:-orion:spark:telemetry}
      CHANNEL_SPARK_STATE_SNAPSHOT: ${CHANNEL_SPARK_STATE_SNAPSHOT:-orion:spark:state:snapshot}
      CHANNEL_SPARK_INTROSPECT_CANDIDATE: ${CHANNEL_SPARK_INTROSPECT_CANDIDATE:-orion:spark:introspect:candidate*}
      CHANNEL_SPARK_INTROSPECT_CANDIDATE_PUBLISH: ${CHANNEL_SPARK_INTROSPECT_CANDIDATE_PUBLISH:-orion:spark:introspect:candidate}
      CHANNEL_SPARK_SIGNAL: ${CHANNEL_SPARK_SIGNAL:-orion:spark:signal}
      CHANNEL_CORE_EVENTS: ${CHANNEL_CORE_EVENTS:-orion:core:events}
      TURN_EFFECT_ALERTS_ENABLE: ${TURN_EFFECT_ALERTS_ENABLE:-false}
      TURN_EFFECT_ALERTS_COHERENCE_DROP: ${TURN_EFFECT_ALERTS_COHERENCE_DROP:-0.25}
      TURN_EFFECT_ALERTS_VALENCE_DROP: ${TURN_EFFECT_ALERTS_VALENCE_DROP:-0.25}
      TURN_EFFECT_ALERTS_NOVELTY_SPIKE: ${TURN_EFFECT_ALERTS_NOVELTY_SPIKE:-0.35}
      TURN_EFFECT_ALERTS_COOLDOWN_SEC: ${TURN_EFFECT_ALERTS_COOLDOWN_SEC:-120}
      TURN_EFFECT_ALERTS_NOTIFY_ENABLE: ${TURN_EFFECT_ALERTS_NOTIFY_ENABLE:-false}
      TURN_EFFECT_ALERTS_DEDUPE_ENABLE: ${TURN_EFFECT_ALERTS_DEDUPE_ENABLE:-true}
      TURN_EFFECT_ALERTS_DEDUPE_WINDOW_SEC: ${TURN_EFFECT_ALERTS_DEDUPE_WINDOW_SEC:-600}
      TURN_EFFECT_ALERTS_DEDUPE_EPS: ${TURN_EFFECT_ALERTS_DEDUPE_EPS:-0.02}
      CHANNEL_VECTOR_SEMANTIC_UPSERT: ${CHANNEL_VECTOR_SEMANTIC_UPSERT:-orion:vector:semantic:upsert}
      CHANNEL_EMBEDDING_GENERATE: ${CHANNEL_EMBEDDING_GENERATE:-orion:embedding:generate}
      CHANNEL_CHAT_HISTORY_SPARK_META_PATCH: ${CHANNEL_CHAT_HISTORY_SPARK_META_PATCH:-orion:chat:history:spark_meta:patch}
      EMBEDDING_RESULT_PREFIX: ${EMBEDDING_RESULT_PREFIX:-orion:embedding:result:}
      SPARK_VECTOR_COLLECTION: ${SPARK_VECTOR_COLLECTION:-orion_spark_store}
      VALENCE_ANCHOR_POS_TEXT: ${VALENCE_ANCHOR_POS_TEXT:-I feel hopeful and grateful.}
      VALENCE_ANCHOR_NEG_TEXT: ${VALENCE_ANCHOR_NEG_TEXT:-I feel hopeless and afraid.}
      VALENCE_GAIN: ${VALENCE_GAIN:-0.35}
      VALENCE_ANCHOR_REFRESH_SEC: ${VALENCE_ANCHOR_REFRESH_SEC:-21600}
      VALENCE_ANCHOR_TIMEOUT_SEC: ${VALENCE_ANCHOR_TIMEOUT_SEC:-10}
      CORTEX_REQUEST_CHANNEL: ${CORTEX_REQUEST_CHANNEL:-orion:cortex:request}

      # Freshness
      SPARK_STATE_VALID_FOR_MS: ${SPARK_STATE_VALID_FOR_MS:-15000}

      # Tissue
      ORION_TISSUE_SNAPSHOT_PATH: ${ORION_TISSUE_SNAPSHOT_PATH:-/mnt/graphdb/orion/spark/tissue-brain.npy}

      # Cortex timeouts
      CORTEX_TIMEOUT_SEC: ${CORTEX_TIMEOUT_SEC:-120}

      # Spark introspection (Phase 1 + queue + debug)
      SPARK_INTROSPECTION_EXECUTION_LANE: ${SPARK_INTROSPECTION_EXECUTION_LANE:-spark}
      SPARK_INTROSPECTION_LLM_LANE: ${SPARK_INTROSPECTION_LLM_LANE:-spark}
      SPARK_INTROSPECTION_ALLOW_CHAT_FALLBACK: ${SPARK_INTROSPECTION_ALLOW_CHAT_FALLBACK:-false}
      SPARK_INTROSPECTION_MAX_TOKENS: ${SPARK_INTROSPECTION_MAX_TOKENS:-384}
      SPARK_INTROSPECTION_ENABLE_HEAVY: ${SPARK_INTROSPECTION_ENABLE_HEAVY:-true}
      SPARK_INTROSPECTION_MAX_INFLIGHT: ${SPARK_INTROSPECTION_MAX_INFLIGHT:-1}
      SPARK_INTROSPECTION_TIMEOUT_SEC: ${SPARK_INTROSPECTION_TIMEOUT_SEC:-45}
      SPARK_INTROSPECTION_QUEUE_MAX_AGE_SEC: ${SPARK_INTROSPECTION_QUEUE_MAX_AGE_SEC:-180}
      SPARK_INTROSPECTION_DROP_ON_PRESSURE: ${SPARK_INTROSPECTION_DROP_ON_PRESSURE:-true}
      SPARK_INTROSPECTION_ACQUIRE_TIMEOUT_SEC: ${SPARK_INTROSPECTION_ACQUIRE_TIMEOUT_SEC:-0}
      SPARK_INTROSPECTION_MIN_INTERVAL_SEC: ${SPARK_INTROSPECTION_MIN_INTERVAL_SEC:-0}
      SPARK_INTROSPECTION_IDEMPOTENCY_ENABLE: ${SPARK_INTROSPECTION_IDEMPOTENCY_ENABLE:-true}
      SPARK_INTROSPECTION_KEY_PREFIX: ${SPARK_INTROSPECTION_KEY_PREFIX:-spark:introspection}
      SPARK_INTROSPECTION_INFLIGHT_TTL_SEC: ${SPARK_INTROSPECTION_INFLIGHT_TTL_SEC:-300}
      SPARK_INTROSPECTION_DONE_TTL_SEC: ${SPARK_INTROSPECTION_DONE_TTL_SEC:-86400}
      SPARK_INTROSPECTION_QUEUE_ENABLED: ${SPARK_INTROSPECTION_QUEUE_ENABLED:-false}
      SPARK_INTROSPECTION_QUEUE_STREAM: ${SPARK_INTROSPECTION_QUEUE_STREAM:-orion:queue:spark:introspection}
      SPARK_INTROSPECTION_QUEUE_GROUP: ${SPARK_INTROSPECTION_QUEUE_GROUP:-spark-introspector-workers}
      SPARK_INTROSPECTION_QUEUE_DLQ: ${SPARK_INTROSPECTION_QUEUE_DLQ:-orion:queue:spark:introspection:dlq}
      SPARK_INTROSPECTION_QUEUE_READ_COUNT: ${SPARK_INTROSPECTION_QUEUE_READ_COUNT:-1}
      SPARK_INTROSPECTION_QUEUE_BLOCK_MS: ${SPARK_INTROSPECTION_QUEUE_BLOCK_MS:-5000}
      SPARK_INTROSPECTION_QUEUE_MAX_INFLIGHT: ${SPARK_INTROSPECTION_QUEUE_MAX_INFLIGHT:-1}
      SPARK_INTROSPECTION_QUEUE_MAX_ATTEMPTS: ${SPARK_INTROSPECTION_QUEUE_MAX_ATTEMPTS:-3}
      SPARK_INTROSPECTION_QUEUE_RECLAIM_PENDING: ${SPARK_INTROSPECTION_QUEUE_RECLAIM_PENDING:-true}
      SPARK_INTROSPECTION_QUEUE_RECLAIM_MIN_IDLE_MS: ${SPARK_INTROSPECTION_QUEUE_RECLAIM_MIN_IDLE_MS:-120000}
      SPARK_INTROSPECTION_QUEUE_STALE_POLICY: ${SPARK_INTROSPECTION_QUEUE_STALE_POLICY:-drop}
      SPARK_INTROSPECTION_INLINE_HEAVY_ENABLED: ${SPARK_INTROSPECTION_INLINE_HEAVY_ENABLED:-true}
      SPARK_INTROSPECTION_QUEUE_DEBUG_ENABLE: ${SPARK_INTROSPECTION_QUEUE_DEBUG_ENABLE:-false}

    ports:
      - "${PORT:-8444}:${PORT:-8444}"

    volumes:
      - ${ORION_DATA_ROOT:-/mnt/graphdb}/orion/spark:/mnt/graphdb/orion/spark

networks:
  app-net:
    external: true

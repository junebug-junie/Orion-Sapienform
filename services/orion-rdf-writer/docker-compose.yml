# ───────────────────────────────────────────────────────────────
# ✍️  Orion RDF Writer — bus → triples → RDF store (GraphDB, Fuseki, …)
# ───────────────────────────────────────────────────────────────

services:
  rdf-writer:
    build:
      context: ../..
      dockerfile: services/orion-rdf-writer/Dockerfile
    container_name: ${PROJECT}-rdf-writer
    restart: unless-stopped
    networks:
      - app-net
    ports:
      # Use the configurable port from the .env file
      - "${PORT}:${PORT}"
    volumes:
      # Persistent host path for logs + dead-letter NDJSON (see RDF_WRITE_DEAD_LETTER_PATH).
      - /mnt/storage-lukewarm/rdf_logs:/app/logs
    environment:
      # --- Service Identity ---
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - PORT=${PORT}

      # --- Orion Bus Integration ---
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_URL=${ORION_BUS_URL}

      # --- Bus Listener Channels ---
      # Enqueue (Direct writes)
      - CHANNEL_RDF_ENQUEUE=${CHANNEL_RDF_ENQUEUE}
      # Collapse (Raw)
      - CHANNEL_EVENTS_COLLAPSE=${CHANNEL_EVENTS_COLLAPSE}
      # Tagged/Enriched
      - CHANNEL_EVENTS_TAGGED=${CHANNEL_EVENTS_TAGGED}
      - CHANNEL_EVENTS_TAGGED_CHAT=${CHANNEL_EVENTS_TAGGED_CHAT}
      # Core Events (Filtering targets="rdf")
      - CHANNEL_CORE_EVENTS=${CHANNEL_CORE_EVENTS}
      # Worker intake for Cortex (RPC)
      - CHANNEL_WORKER_RDF=${CHANNEL_WORKER_RDF}
      - CORTEX_LOG_CHANNEL=${CORTEX_LOG_CHANNEL}
      - CHANNEL_COGNITION_TRACE_PUB=${CHANNEL_COGNITION_TRACE_PUB}
      - CHANNEL_CHAT_HISTORY_TURN=${CHANNEL_CHAT_HISTORY_TURN}
      - CHANNEL_CHAT_HISTORY_LOG=${CHANNEL_CHAT_HISTORY_LOG}
      - CHANNEL_MEMORY_IDENTITY_SNAPSHOT=${CHANNEL_MEMORY_IDENTITY_SNAPSHOT}
      - CHANNEL_MEMORY_DRIVES_AUDIT=${CHANNEL_MEMORY_DRIVES_AUDIT}
      - CHANNEL_MEMORY_GOALS_PROPOSED=${CHANNEL_MEMORY_GOALS_PROPOSED}
      - CHANNEL_WORLD_PULSE_GRAPH=${CHANNEL_WORLD_PULSE_GRAPH}

      # --- Bus Publish Channels ---
      - CHANNEL_RDF_CONFIRM=${CHANNEL_RDF_CONFIRM}
      - CHANNEL_RDF_ERROR=${CHANNEL_RDF_ERROR}

      # --- GraphDB Configuration ---
      - GRAPHDB_URL=${GRAPHDB_URL}
      - GRAPHDB_REPO=${GRAPHDB_REPO}
      - GRAPHDB_USER=${GRAPHDB_USER}
      - GRAPHDB_PASS=${GRAPHDB_PASS}

      # --- RDF store (GraphDB, Fuseki, or generic SPARQL) ---
      # V1: prefer fuseki/generic via .env; graphdb here is legacy compatibility when unset.
      - RDF_STORE_BACKEND=${RDF_STORE_BACKEND:-graphdb}
      - RDF_STORE_BASE_URL=${RDF_STORE_BASE_URL:-}
      - RDF_STORE_DATASET=${RDF_STORE_DATASET:-orion}
      - RDF_STORE_QUERY_URL=${RDF_STORE_QUERY_URL:-}
      - RDF_STORE_UPDATE_URL=${RDF_STORE_UPDATE_URL:-}
      - RDF_STORE_GRAPH_STORE_URL=${RDF_STORE_GRAPH_STORE_URL:-}
      - RDF_STORE_USER=${RDF_STORE_USER:-}
      - RDF_STORE_PASS=${RDF_STORE_PASS:-}
      - RDF_STORE_TIMEOUT_SEC=${RDF_STORE_TIMEOUT_SEC:-10.0}
      - RDF_STORE_NORMALIZE_GRAPHDB_CONTEXT=${RDF_STORE_NORMALIZE_GRAPHDB_CONTEXT:-false}
      - RDF_WRITE_ASYNC_ENABLED=${RDF_WRITE_ASYNC_ENABLED:-true}
      - RDF_WRITE_QUEUE_MAXSIZE=${RDF_WRITE_QUEUE_MAXSIZE:-5000}
      - RDF_WRITE_WORKERS=${RDF_WRITE_WORKERS:-8}
      - RDF_WRITE_MAX_IN_FLIGHT=${RDF_WRITE_MAX_IN_FLIGHT:-32}
      - RDF_WRITE_HTTP_MAX_CONNECTIONS=${RDF_WRITE_HTTP_MAX_CONNECTIONS:-64}
      - RDF_WRITE_HTTP_MAX_KEEPALIVE=${RDF_WRITE_HTTP_MAX_KEEPALIVE:-32}
      - RDF_WRITE_RETRY_ATTEMPTS=${RDF_WRITE_RETRY_ATTEMPTS:-3}
      - RDF_WRITE_RETRY_BASE_DELAY_SEC=${RDF_WRITE_RETRY_BASE_DELAY_SEC:-0.25}
      - RDF_WRITE_RETRY_MAX_DELAY_SEC=${RDF_WRITE_RETRY_MAX_DELAY_SEC:-5.0}
      - RDF_WRITE_DEAD_LETTER_ENABLED=${RDF_WRITE_DEAD_LETTER_ENABLED:-true}
      - RDF_WRITE_DEAD_LETTER_PATH=${RDF_WRITE_DEAD_LETTER_PATH:-/app/logs/orion-rdf-writer-deadletter.ndjson}

      # --- Runtime ---
      - LOG_LEVEL=${LOG_LEVEL}
      - BATCH_SIZE=${BATCH_SIZE}
      - RDF_SKIP_KINDS=${RDF_SKIP_KINDS}
      - RDF_SKIP_REJECTED=${RDF_SKIP_REJECTED}
      - RDF_DURABLE_ONLY=${RDF_DURABLE_ONLY}
      - WORLD_PULSE_GRAPH_ENABLED=${WORLD_PULSE_GRAPH_ENABLED}
      - WORLD_PULSE_GRAPH_DRY_RUN=${WORLD_PULSE_GRAPH_DRY_RUN}
      - WORLD_PULSE_GRAPH_REQUIRE_POLICY_STAMP=${WORLD_PULSE_GRAPH_REQUIRE_POLICY_STAMP}
      - RETRY_LIMIT=${RETRY_LIMIT}
      - RETRY_INTERVAL=${RETRY_INTERVAL}

networks:
  app-net:
    # This service connects to an existing, external network.
    name: ${NET}
    external: true

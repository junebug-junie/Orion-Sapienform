services:
  graphiti-adapter:
    build:
      context: ../..
      dockerfile: services/orion-graphiti-adapter/Dockerfile
    container_name: orion-${NODE_NAME}-graphiti-adapter
    restart: unless-stopped
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - LOG_LEVEL=${LOG_LEVEL}
      - POSTGRES_URI=${POSTGRES_URI}
      - GRAPHITI_AUTO_APPLY_SCHEMA=${GRAPHITI_AUTO_APPLY_SCHEMA}
      - FALKORDB_URI=${FALKORDB_URI}
      - FALKORDB_GRAPH=${FALKORDB_GRAPH}
      - FALKORDB_ENABLED=${FALKORDB_ENABLED}
      - GRAPHITI_BACKEND=${GRAPHITI_BACKEND}
      - CRYSTALLIZER_EMBED_HOST_URL=${CRYSTALLIZER_EMBED_HOST_URL}
      - GRAPHITI_AUTO_BUILD_INDICES=${GRAPHITI_AUTO_BUILD_INDICES}
    ports:
      - "${PORT:-8640}:8000"
    networks:
      - app-net

  # FalkorDB runs in services/orion-falkordb/ (shared operator stack).
  # Start it before this adapter when FALKORDB_ENABLED=true.

networks:
  app-net:
    external: true
    name: ${NET:-app-net}

type: spec
id: spec:knowledge-forge-ideation-review-v1
status: execution_ready
component: orion-knowledge-forge
requirements:
  - Add proposal-only Claude-backed ideation review via POST /v1/ideation/run
  - Support local/noop provider as default for tests and offline runs
  - Support optional Anthropic provider when ANTHROPIC_API_KEY is configured
  - Ideation writes only to reviews/pending/ideation-*.md when write is enabled and operator token is satisfied
  - Ideation output is proposed status; never mutate claims/accepted, specs/execution_ready, or decisions
  - Reject path traversal and out-of-corpus input_paths
  - Return 503 when KNOWLEDGE_FORGE_IDEATION_ENABLED=false
non_goals:
  - Hub Run Ideation Review button (deferred v1.2)
  - MCP server exposure for ideation
  - Prompt caching optimization
  - Shelling out to claude -p from the service
  - Canonical corpus mutation from ideation runs
acceptance_tests:
  - PYTHONPATH=services/orion-knowledge-forge pytest services/orion-knowledge-forge/tests/test_ideation_api.py -q
  - PYTHONPATH=services/orion-knowledge-forge pytest services/orion-knowledge-forge/tests/ -q
  - curl -s -X POST http://127.0.0.1:8630/v1/ideation/run -H Content-Type:application/json -d '{"task":"smoke","mode":"arsonist_review","input_paths":["claims/accepted"],"write_review":false}' returns run_id and local provider
  - write_review=true with KNOWLEDGE_FORGE_IDEATION_WRITE_ENABLED=false returns content with artifact_path null and warning
  - write_review=true with write enabled creates file under reviews/pending/ only
  - accepted claims unchanged after ideation write smoke
source_claims:
  - claim:orion:knowledge-forge:0001
  - claim:orion:knowledge-forge:0002
  - claim:orion:knowledge-forge:0003
  - claim:orion:knowledge-forge:0004
  - claim:orion:knowledge-forge:0005
likely_files:
  - services/orion-knowledge-forge/app/routers/ideation.py
  - services/orion-knowledge-forge/app/ideation/runner.py
  - services/orion-knowledge-forge/app/ideation/prompt_builder.py
  - services/orion-knowledge-forge/app/ideation/writer.py
  - services/orion-knowledge-forge/app/providers/local_provider.py
  - services/orion-knowledge-forge/app/providers/anthropic_provider.py
  - services/orion-knowledge-forge/app/api_schemas.py
  - services/orion-knowledge-forge/app/settings.py
  - services/orion-knowledge-forge/app/main.py
  - services/orion-knowledge-forge/tests/test_ideation_api.py
  - services/orion-knowledge-forge/.env_example
  - CLAUDE.md
  - services/orion-knowledge-forge/CLAUDE.md
  - .claude/commands/forge-critique.md
  - .claude/commands/forge-spec.md
  - .claude/commands/forge-context-pack.md
  - .claude/commands/forge-arsonist.md
known_traps:
  - Anthropic provider requires lazy import so local-only boot works without anthropic package errors
  - write_review=true requires operator token when writes are enabled
  - input_paths must stay inside ORION_KNOWLEDGE_ROOT corpus sandbox
supports: []
contradicts: []
supersedes: []

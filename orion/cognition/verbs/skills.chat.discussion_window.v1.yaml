name: skills.chat.discussion_window.v1
label: Skills — Chat discussion window (SQL)
description: >
  Deterministic read of recent chat turns from chat_history_log within a wall-clock window.
  No session_id semantics; uses created_at bounds plus optional user_id/source filters and contiguity trimming.
category: ExecutiveControl
priority: low
interruptible: true
can_interrupt_others: false
requires_gpu: false
requires_memory: false
timeout_ms: 30000
max_recursion_depth: 0
services: []
input_schema:
  type: object
  properties:
    lookback_seconds:
      type: integer
    end_time_utc:
      type: string
      description: ISO-8601 UTC end bound (optional)
    user_id:
      type: string
    source:
      type: string
    max_turns:
      type: integer
    require_prompt_and_response:
      type: boolean
plan:
  - name: skills.chat.discussion_window.v1
    description: Fetch bounded discussion window from chat_history_log.
    order: 0
    services: []

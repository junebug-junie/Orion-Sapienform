<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orion Hub — Substrate Inspector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css?v=1.0.8" />
</head>
<body class="bg-black text-gray-200 min-h-screen p-6">
  <div class="max-w-6xl mx-auto space-y-4">
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-semibold">Substrate Inspector</h1>
      <div class="flex gap-2">
        <button id="substrateRefreshButton" class="px-3 py-2 text-xs rounded border border-gray-700 bg-gray-900 hover:bg-gray-800">Refresh</button>
        <a href="/" class="px-3 py-2 text-xs rounded border border-gray-700 bg-gray-900 hover:bg-gray-800">Back to Hub</a>
      </div>
    </div>

    <div id="substrateSourceMeta" class="text-xs text-gray-400"></div>

    <section class="bg-gray-900 border border-gray-800 rounded p-4">
      <h2 class="font-medium mb-2">Substrate Overview (GraphDB)</h2>
      <pre id="substrateOverview" class="text-xs bg-gray-950 border border-gray-800 rounded p-3 overflow-auto">Loading…</pre>
    </section>

    <section class="bg-gray-900 border border-gray-800 rounded p-4">
      <h2 class="font-medium mb-2">Hotspots (GraphDB)</h2>
      <pre id="substrateHotspots" class="text-xs bg-gray-950 border border-gray-800 rounded p-3 overflow-auto">Loading…</pre>
    </section>

    <section class="bg-gray-900 border border-gray-800 rounded p-4">
      <h2 class="font-medium mb-2">Review Queue (SQL)</h2>
      <pre id="substrateReviewQueue" class="text-xs bg-gray-950 border border-gray-800 rounded p-3 overflow-auto">Loading…</pre>
    </section>

    <section class="bg-gray-900 border border-gray-800 rounded p-4">
      <h2 class="font-medium mb-2">Recent Review Executions (SQL)</h2>
      <pre id="substrateReviewExecutions" class="text-xs bg-gray-950 border border-gray-800 rounded p-3 overflow-auto">Loading…</pre>
    </section>

    <section class="bg-gray-900 border border-gray-800 rounded p-4">
      <h2 class="font-medium mb-2">Telemetry Summary (SQL)</h2>
      <pre id="substrateTelemetrySummary" class="text-xs bg-gray-950 border border-gray-800 rounded p-3 overflow-auto">Loading…</pre>
    </section>

    <section class="bg-gray-900 border border-gray-800 rounded p-4">
      <h2 class="font-medium mb-2">Calibration (SQL)</h2>
      <pre id="substrateCalibration" class="text-xs bg-gray-950 border border-gray-800 rounded p-3 overflow-auto">Loading…</pre>
    </section>
  </div>

  <script src="/static/js/substrate.js?v={{HUB_UI_ASSET_VERSION}}"></script>
</body>
</html>

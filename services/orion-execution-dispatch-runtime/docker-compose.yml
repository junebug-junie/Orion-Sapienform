services:
  execution-dispatch-runtime:
    build:
      context: ../..
      dockerfile: services/orion-execution-dispatch-runtime/Dockerfile
    container_name: ${PROJECT}-execution-dispatch-runtime
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${EXECUTION_DISPATCH_RUNTIME_PORT:-8121}:8121"
    environment:
      - PROJECT=${PROJECT}
      - SERVICE_NAME=${SERVICE_NAME:-orion-execution-dispatch-runtime}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}
      - POSTGRES_URI=${POSTGRES_URI}
      - EXECUTION_DISPATCH_POLICY_PATH=${EXECUTION_DISPATCH_POLICY_PATH:-/app/config/execution_dispatch/execution_dispatch_policy.v1.yaml}
      - EXECUTION_DISPATCH_MODE=${EXECUTION_DISPATCH_MODE:-dry_run}
      - EXECUTION_DISPATCH_POLL_INTERVAL_SEC=${EXECUTION_DISPATCH_POLL_INTERVAL_SEC:-2.0}
      - ENABLE_EXECUTION_DISPATCH_RUNTIME=${ENABLE_EXECUTION_DISPATCH_RUNTIME:-true}
      - CORTEX_EXEC_CHANNEL=${CORTEX_EXEC_CHANNEL:-orion:cortex:exec:request:background}
      - CORTEX_EXEC_RESULT_PREFIX=${CORTEX_EXEC_RESULT_PREFIX:-orion:exec:result}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED:-true}
      - EXECUTION_DISPATCH_RPC_TIMEOUT_SEC=${EXECUTION_DISPATCH_RPC_TIMEOUT_SEC:-120}
      - ORION_DISPATCH_MAX_PER_DAY=${ORION_DISPATCH_MAX_PER_DAY:-24}
      - BUS_ACTION_OUTCOME_OUT=${BUS_ACTION_OUTCOME_OUT:-orion:autonomy:action:outcome}
      - NOTIFY_URL=${NOTIFY_URL:-http://orion-notify:7140}
      - NOTIFY_API_TOKEN=${NOTIFY_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

networks:
  app-net:
    external: true

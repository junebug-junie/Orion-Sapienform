services:
  memory-crystallizer:
    build:
      context: ../..
      dockerfile: services/orion-memory-crystallizer/Dockerfile
    container_name: orion-${NODE_NAME}-memory-crystallizer
    restart: unless-stopped
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - LOG_LEVEL=${LOG_LEVEL}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - ORION_HEALTH_CHANNEL=${ORION_HEALTH_CHANNEL}
      - ERROR_CHANNEL=${ERROR_CHANNEL}
      - CRYSTALLIZER_CHANNEL_PROPOSED=${CRYSTALLIZER_CHANNEL_PROPOSED}
      - CRYSTALLIZER_CHANNEL_VALIDATED=${CRYSTALLIZER_CHANNEL_VALIDATED}
      - CRYSTALLIZER_CHANNEL_APPROVED=${CRYSTALLIZER_CHANNEL_APPROVED}
      - CRYSTALLIZER_CHANNEL_REJECTED=${CRYSTALLIZER_CHANNEL_REJECTED}
      - CRYSTALLIZER_CHANNEL_QUARANTINED=${CRYSTALLIZER_CHANNEL_QUARANTINED}
      - CRYSTALLIZER_CHANNEL_PROJECT=${CRYSTALLIZER_CHANNEL_PROJECT}
      - CRYSTALLIZER_CHANNEL_RETRIEVED=${CRYSTALLIZER_CHANNEL_RETRIEVED}
      - CRYSTALLIZER_CHANNEL_VECTOR_UPSERT=${CRYSTALLIZER_CHANNEL_VECTOR_UPSERT}
      - POSTGRES_URI=${POSTGRES_URI}
      - CRYSTALLIZER_AUTO_APPLY_SCHEMA=${CRYSTALLIZER_AUTO_APPLY_SCHEMA}
      - CRYSTALLIZER_VECTOR_COLLECTION=${CRYSTALLIZER_VECTOR_COLLECTION}
      - CRYSTALLIZER_EMBED_HOST_URL=${CRYSTALLIZER_EMBED_HOST_URL}
      - CRYSTALLIZER_EMBED_TIMEOUT_MS=${CRYSTALLIZER_EMBED_TIMEOUT_MS}
      - GRAPHITI_ENABLED=${GRAPHITI_ENABLED}
      - GRAPHITI_URL=${GRAPHITI_URL}
      - FALKORDB_URI=${FALKORDB_URI}
    ports:
      - "${PORT:-8634}:8000"
    networks:
      - app-net

networks:
  app-net:
    external: true
    name: ${NET:-app-net}

schema_version: self_state_policy.v1
policy_id: self_state_policy.v1

condition_thresholds:
  quiet_max: 0.15
  steady_max: 0.40
  loaded_max: 0.70
  strained_max: 0.90

dimension_weights:
  field_intensity: 0.15
  coherence: 0.15
  uncertainty: 0.10
  agency_readiness: 0.10
  resource_pressure: 0.10
  execution_pressure: 0.15
  reasoning_pressure: 0.05
  reliability_pressure: 0.13
  continuity_pressure: 0.03
  introspection_pressure: 0.02
  social_pressure: 0.02
  # transport_integrity is no longer display-only (2026-07-12): it has a real
  # producer (orion/self_state/transport.py, live behind
  # ENABLE_TRANSPORT_SELF_STATE_INFLUENCE) so it earns a policy weight and now
  # contributes to overall_intensity when the flag is on. Small weight: it's
  # a synthesis of channels already reflected in resource_pressure/
  # reliability_pressure/coherence, not an independent primary signal.
  transport_integrity: 0.05

attention_target_weights:
  system: 0.30
  node: 0.35
  capability: 0.35

channel_dimension_map:
  # NOTE (2026-07-12, self-state mesh substrate redesign Phase 1): the 11 raw
  # node-level channels that are also diffused into capability_vectors under a
  # different channel name by a topology edge (config/field/orion_field_topology.v1.yaml)
  # do NOT get a direct entry here anymore. Direct entries always won max()
  # against their own correctly edge-weighted diffusion (weight <= 1 always),
  # which made per-node topology edge weights functionally inert. Removed:
  # transport_pressure, bus_health, delivery_confidence, execution_load,
  # execution_friction, failure_pressure, reasoning_load, cpu_pressure,
  # gpu_pressure, memory_pressure, disk_pressure. Their signal still reaches
  # dimensions via the diffused capability channel name (e.g. gpu_pressure ->
  # capability:llm_inference's "pressure", mapped below).
  thermal_pressure: resource_pressure
  staleness: continuity_pressure
  availability: coherence
  expected_offline_suppression: coherence
  pressure: resource_pressure
  execution_pressure: execution_pressure
  reasoning_pressure: reasoning_pressure
  reliability_pressure: reliability_pressure
  confidence: coherence
  available_capacity: coherence
  repair_pressure: social_pressure
  conversation_load: social_pressure
  egress_confidence_deficit: introspection_pressure
  prediction_error: uncertainty
  field_coherence_warning: coherence

evidence_channel_map:
  # Evidence-only (2026-07-12): the same 11 raw channels removed from
  # channel_dimension_map above, restored here for dominant_evidence/reasons
  # transparency ONLY -- they do not feed the dimension's score (that would
  # reintroduce the double-counting bug channel_dimension_map's removal just
  # fixed). Needed because orion-spark-introspector's tissue-viz bypass
  # (_hardware_resource_pressure/_execution_load_pressure in
  # services/orion-spark-introspector/app/worker.py) parses dominant_evidence
  # for these exact raw channel names to avoid a generic diffused channel
  # that can stick saturated (live incident 2026-07-10) -- without this map,
  # that bypass would silently regress to always returning None.
  transport_pressure: resource_pressure
  bus_health: coherence
  delivery_confidence: coherence
  execution_load: execution_pressure
  execution_friction: reliability_pressure
  failure_pressure: reliability_pressure
  reasoning_load: reasoning_pressure
  cpu_pressure: resource_pressure
  gpu_pressure: resource_pressure
  memory_pressure: resource_pressure
  disk_pressure: resource_pressure

stabilizing_channels:
  availability: 0.50
  confidence: 0.50
  available_capacity: 0.50
  expected_offline_suppression: 0.30

pressure_channels:
  # execution_load, execution_friction, failure_pressure, reasoning_load,
  # cpu_pressure, gpu_pressure, memory_pressure, disk_pressure removed
  # alongside their channel_dimension_map entries above (2026-07-12) — a
  # pressure_channels entry with no channel_dimension_map entry can never be
  # flagged by build_self_state()'s unresolved-pressure detection, so leaving
  # them here would be a declared-but-dead config entry.
  - thermal_pressure
  - staleness
  - pressure
  - execution_pressure
  - reasoning_pressure
  - reliability_pressure
  - repair_pressure
  - conversation_load
  - egress_confidence_deficit
  - prediction_error
  - field_coherence_warning

context_channels:
  - recent_perturbation_count
  - overall_salience

dimension_worse_direction:
  # Phase 2 (2026-07-12) deviation probe (orion/self_state/deviation.py,
  # measurement-only, no gating behavior yet): which direction is the
  # notable one per dimension, mirroring the sign conventions already
  # implicit in orion/self_state/scoring.py's formulas -- coherence_score/
  # agency_readiness_score treat high=good; every *_pressure dimension,
  # uncertainty, and field_intensity treat high=bad.
  field_intensity: up
  coherence: down
  uncertainty: up
  agency_readiness: down
  resource_pressure: up
  execution_pressure: up
  reasoning_pressure: up
  reliability_pressure: up
  continuity_pressure: up
  introspection_pressure: up
  social_pressure: up
  transport_integrity: down

unresolved_pressure_threshold: 0.60
dominant_channel_threshold: 0.25
trajectory_threshold: 0.03

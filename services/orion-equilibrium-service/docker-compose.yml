services:
  equilibrium-service:
    build:
      context: ../..
      dockerfile: services/orion-equilibrium-service/Dockerfile
    container_name: ${PROJECT}-equilibrium
    restart: unless-stopped
    networks:
      - app-net
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - INSTANCE_ID=${INSTANCE_ID}

      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_VELOCITY_TRACKING_ENABLED=${ORION_BUS_VELOCITY_TRACKING_ENABLED}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - ORION_HEALTH_CHANNEL=${ORION_HEALTH_CHANNEL}

      - EQUILIBRIUM_EXPECTED_SERVICES=${EQUILIBRIUM_EXPECTED_SERVICES}
      - EQUILIBRIUM_EXPECTED_SERVICES_PATH=${EQUILIBRIUM_EXPECTED_SERVICES_PATH}
      - EQUILIBRIUM_GRACE_MULTIPLIER=${EQUILIBRIUM_GRACE_MULTIPLIER}
      - EQUILIBRIUM_PUBLISH_INTERVAL_SEC=${EQUILIBRIUM_PUBLISH_INTERVAL_SEC}
      - EQUILIBRIUM_WINDOWS_SEC=${EQUILIBRIUM_WINDOWS_SEC}
      - EQUILIBRIUM_COLLAPSE_MIRROR_INTERVAL_SEC=${EQUILIBRIUM_COLLAPSE_MIRROR_INTERVAL_SEC}
      - EQUILIBRIUM_STATE_KEY=${EQUILIBRIUM_STATE_KEY}
      - EQUILIBRIUM_STATE_RETENTION_SEC=${EQUILIBRIUM_STATE_RETENTION_SEC:-3600}
      - CHANNEL_EQUILIBRIUM_SNAPSHOT=${CHANNEL_EQUILIBRIUM_SNAPSHOT}
      - CHANNEL_SPARK_SIGNAL=${CHANNEL_SPARK_SIGNAL}
      - CHANNEL_METACOGNITION_TICK=${CHANNEL_METACOGNITION_TICK}
      - METACOGNITION_TICK_KIND=${METACOGNITION_TICK_KIND:-metacognition.tick.v1}
      - CHANNEL_EQUILIBRIUM_METACOG_TRIGGER=${CHANNEL_EQUILIBRIUM_METACOG_TRIGGER}
      - CHANNEL_COGNITION_TRACE_PUB=${CHANNEL_COGNITION_TRACE_PUB}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC}

      - EQUILIBRIUM_METACOG_ENABLE=${EQUILIBRIUM_METACOG_ENABLE}
      - EQUILIBRIUM_METACOG_PUBLISH_VERB_REQUEST=${EQUILIBRIUM_METACOG_PUBLISH_VERB_REQUEST}
      - EQUILIBRIUM_METACOG_BASELINE_INTERVAL_SEC=${EQUILIBRIUM_METACOG_BASELINE_INTERVAL_SEC}
      - EQUILIBRIUM_METACOG_BASELINE_MAX_SKIPS=${EQUILIBRIUM_METACOG_BASELINE_MAX_SKIPS}
      - EQUILIBRIUM_METACOG_COOLDOWN_SEC=${EQUILIBRIUM_METACOG_COOLDOWN_SEC}
      - EQUILIBRIUM_METACOG_PAD_PULSE_THRESHOLD=${EQUILIBRIUM_METACOG_PAD_PULSE_THRESHOLD}
      - EQUILIBRIUM_METACOG_SUBSTRATE_TRIGGER_ENABLE=${EQUILIBRIUM_METACOG_SUBSTRATE_TRIGGER_ENABLE:-true}
      - EQUILIBRIUM_METACOG_SUBSTRATE_DENSE_THRESHOLD=${EQUILIBRIUM_METACOG_SUBSTRATE_DENSE_THRESHOLD:-0.55}
      - EQUILIBRIUM_METACOG_SUBSTRATE_PULSE_THRESHOLD=${EQUILIBRIUM_METACOG_SUBSTRATE_PULSE_THRESHOLD:-0.30}
      - CHANNEL_COLLAPSE_MIRROR_USER_EVENT=${CHANNEL_COLLAPSE_MIRROR_USER_EVENT:-orion:collapse:intake}
      - CHANNEL_PAD_SIGNAL=${CHANNEL_PAD_SIGNAL:-orion:pad:signal}
      - EQUILIBRIUM_METACOG_RECALL_ENABLED=${EQUILIBRIUM_METACOG_RECALL_ENABLED:-false}
      - CHANNEL_REPAIR_PRESSURE_APPRAISAL=${CHANNEL_REPAIR_PRESSURE_APPRAISAL:-orion:repair_pressure:appraisal}
      - EQUILIBRIUM_METACOG_RELATIONAL_TRIGGER_ENABLE=${EQUILIBRIUM_METACOG_RELATIONAL_TRIGGER_ENABLE:-true}
      - EQUILIBRIUM_METACOG_RELATIONAL_CONFIDENCE_THRESHOLD=${EQUILIBRIUM_METACOG_RELATIONAL_CONFIDENCE_THRESHOLD:-0.7}
      - EQUILIBRIUM_METACOG_RELATIONAL_LEVEL_THRESHOLD=${EQUILIBRIUM_METACOG_RELATIONAL_LEVEL_THRESHOLD:-0.5}
      - CHANNEL_FIELD_CHANNEL_ANOMALY_SCORE=${CHANNEL_FIELD_CHANNEL_ANOMALY_SCORE:-orion:field_channel:anomaly_score}
      - EQUILIBRIUM_METACOG_TELEMETRY_ANOMALY_TRIGGER_ENABLE=${EQUILIBRIUM_METACOG_TELEMETRY_ANOMALY_TRIGGER_ENABLE:-true}
      - EQUILIBRIUM_METACOG_TELEMETRY_ANOMALY_THRESHOLD_MULTIPLIER=${EQUILIBRIUM_METACOG_TELEMETRY_ANOMALY_THRESHOLD_MULTIPLIER:-3.0}
      - CHANNEL_THOUGHT_ARTIFACT=${CHANNEL_THOUGHT_ARTIFACT:-orion:thought:artifact}
      - CHANNEL_HARNESS_RUN_ARTIFACT=${CHANNEL_HARNESS_RUN_ARTIFACT:-orion:harness:run:artifact}
      - CHANNEL_GRAMMAR_EVENT=${CHANNEL_GRAMMAR_EVENT:-orion:grammar:event}
      - EQUILIBRIUM_METACOG_CHAT_TURN_TRIGGER_ENABLE=${EQUILIBRIUM_METACOG_CHAT_TURN_TRIGGER_ENABLE:-true}
      - EQUILIBRIUM_METACOG_CHAT_TURN_CORRELATOR_TTL_SEC=${EQUILIBRIUM_METACOG_CHAT_TURN_CORRELATOR_TTL_SEC:-600}
      - EQUILIBRIUM_METACOG_CHAT_TURN_SURPRISE_THRESHOLD=${EQUILIBRIUM_METACOG_CHAT_TURN_SURPRISE_THRESHOLD:-0.7}
      - EQUILIBRIUM_METACOG_CHAT_TURN_COOLDOWN_SEC=${EQUILIBRIUM_METACOG_CHAT_TURN_COOLDOWN_SEC:-30}
      - ENABLE_SUBSTRATE_FELT_STATE_CTX=${ENABLE_SUBSTRATE_FELT_STATE_CTX:-true}
      - SUBSTRATE_FELT_STATE_DATABASE_URL=${SUBSTRATE_FELT_STATE_DATABASE_URL:-postgresql://postgres:postgres@orion-athena-sql-db:5432/conjourney}
      - SUBSTRATE_FELT_STATE_MAX_AGE_SEC=${SUBSTRATE_FELT_STATE_MAX_AGE_SEC:-120}
      - EQUILIBRIUM_SPARK_HEARTBEAT_ENABLE=${EQUILIBRIUM_SPARK_HEARTBEAT_ENABLE}
      - EQUILIBRIUM_SPARK_HEARTBEAT_INTERVAL_SEC=${EQUILIBRIUM_SPARK_HEARTBEAT_INTERVAL_SEC}

networks:
  app-net:
    name: ${NET}
    external: true

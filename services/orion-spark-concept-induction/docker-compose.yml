services:
  spark-concept-induction:
    build:
      context: ../..
      dockerfile: services/orion-spark-concept-induction/Dockerfile
    container_name: orion-${NODE_NAME}-spark-concept-induction
    restart: unless-stopped
    networks:
      - app-net
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC}
      - BUS_INTAKE_CHANNELS=${BUS_INTAKE_CHANNELS:-["orion:chat:history:log","orion:chat:history:turn","orion:chat:social:turn","orion:chat:social:stored","orion:chat:gpt:turn","orion:chat:gpt:message:log","orion:collapse:sql-write","orion:spark:telemetry","orion:metacognition:tick","orion:cognition:trace"]}
      - BUS_PROFILE_OUT=${BUS_PROFILE_OUT}
      - BUS_DELTA_OUT=${BUS_DELTA_OUT}
      - BUS_VECTOR_OUT=${BUS_VECTOR_OUT}
      - BUS_RDF_OUT=${BUS_RDF_OUT}
      - BUS_SQL_OUT=${BUS_SQL_OUT}
      - BUS_DRIVE_STATE_OUT=${BUS_DRIVE_STATE_OUT}
      - BUS_TENSION_EVENT_OUT=${BUS_TENSION_EVENT_OUT}
      - BUS_DRIVE_AUDIT_OUT=${BUS_DRIVE_AUDIT_OUT}
      - BUS_IDENTITY_SNAPSHOT_OUT=${BUS_IDENTITY_SNAPSHOT_OUT}
      - BUS_GOAL_PROPOSAL_OUT=${BUS_GOAL_PROPOSAL_OUT}
      - BUS_TURN_DOSSIER_OUT=${BUS_TURN_DOSSIER_OUT}
      - CONCEPT_WINDOW_MAX_EVENTS=${CONCEPT_WINDOW_MAX_EVENTS}
      - CONCEPT_WINDOW_MAX_MINUTES=${CONCEPT_WINDOW_MAX_MINUTES}
      - CONCEPT_TRIGGER_COOLDOWN_SEC=${CONCEPT_TRIGGER_COOLDOWN_SEC}
      - CONCEPT_TRIGGER_DEDUPE_SEC=${CONCEPT_TRIGGER_DEDUPE_SEC}
      - CONCEPT_TRIGGER_RECENT_DECISIONS=${CONCEPT_TRIGGER_RECENT_DECISIONS}
      - CONCEPT_AUTONOMOUS_TRIGGER_ENABLED=${CONCEPT_AUTONOMOUS_TRIGGER_ENABLED}
      - CONCEPT_SUBJECTS=${CONCEPT_SUBJECTS}
      - SPACY_MODEL=${SPACY_MODEL}
      - CONCEPT_MAX_CANDIDATES=${CONCEPT_MAX_CANDIDATES}
      - EMBEDDINGS_BASE_URL=${EMBEDDINGS_BASE_URL}
      - EMBEDDINGS_TIMEOUT_SEC=${EMBEDDINGS_TIMEOUT_SEC}
      - CONCEPT_CLUSTER_THRESHOLD=${CONCEPT_CLUSTER_THRESHOLD}
      - USE_CORTEX_ORCH=${USE_CORTEX_ORCH}
      - CORTEX_ORCH_VERB=${CORTEX_ORCH_VERB}
      - CORTEX_ORCH_REQUEST_CHANNEL=${CORTEX_ORCH_REQUEST_CHANNEL}
      - CORTEX_ORCH_RESULT_PREFIX=${CORTEX_ORCH_RESULT_PREFIX}
      - CORTEX_TIMEOUT_SEC=${CORTEX_TIMEOUT_SEC}
      - CONCEPT_STORE_PATH=${CONCEPT_STORE_PATH}
      - DRIVE_DECAY_TAU_SEC=${DRIVE_DECAY_TAU_SEC}
      - DRIVE_SATURATION_GAIN=${DRIVE_SATURATION_GAIN}
      - DRIVE_ACTIVATION_ON=${DRIVE_ACTIVATION_ON}
      - DRIVE_ACTIVATION_OFF=${DRIVE_ACTIVATION_OFF}
      - GOAL_PROPOSAL_COOLDOWN_MINUTES=${GOAL_PROPOSAL_COOLDOWN_MINUTES}
      - CONCEPT_PROFILE_REPOSITORY_BACKEND=${CONCEPT_PROFILE_REPOSITORY_BACKEND}
      - CONCEPT_PROFILE_GRAPHDB_ENDPOINT=${CONCEPT_PROFILE_GRAPHDB_ENDPOINT}
      - CONCEPT_PROFILE_GRAPHDB_URL=${CONCEPT_PROFILE_GRAPHDB_URL}
      - CONCEPT_PROFILE_GRAPHDB_REPO=${CONCEPT_PROFILE_GRAPHDB_REPO}
      - CONCEPT_PROFILE_GRAPHDB_USER=${CONCEPT_PROFILE_GRAPHDB_USER}
      - CONCEPT_PROFILE_GRAPHDB_PASS=${CONCEPT_PROFILE_GRAPHDB_PASS}
      - CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC=${CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC}
      - CONCEPT_PROFILE_GRAPH_URI=${CONCEPT_PROFILE_GRAPH_URI}
      - CONCEPT_PROFILE_PARITY_MIN_COMPARISONS=${CONCEPT_PROFILE_PARITY_MIN_COMPARISONS}
      - CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE=${CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE}
      - CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE=${CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE}
      - CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES=${CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES}
      - CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL=${CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL}
    volumes:
      - /mnt/storage-lukewarm/orion/concepts:/data
    env_file:
      - .env
    ports:
      - "8510:8510"

networks:
  app-net:
    external: true

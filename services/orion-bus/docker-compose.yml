# ───────────────────────────────────────────────────────────────
# 🚌 Orion Bus — Mesh Message Broker (Redis core + metrics)
# Node-aware | Ephemeral | Telemetry-mounted
# ───────────────────────────────────────────────────────────────

services:
  bus-core:
    build:
      context: .
      dockerfile: Dockerfile.bus-core
    container_name: orion-${PROJECT}-bus-core
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory-policy",
        "allkeys-lru",
        "--client-output-buffer-limit",
        "pubsub",
        "64mb",
        "32mb",
        "120",
      ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${TELEMETRY_ROOT}/${PROJECT}/bus/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      app-net:
        aliases:
          - bus-core

  bus-exporter:
    image: oliver006/redis_exporter:latest
    container_name: orion-${PROJECT}-bus-exporter
    environment:
      - REDIS_ADDR=redis://bus-core:6379
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      bus-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  bus-observer:
    build:
      context: ../..
      dockerfile: services/orion-bus/Dockerfile
    container_name: orion-${PROJECT}-bus-observer
    env_file:
      - .env
    environment:
      REDIS_URL: redis://bus-core:6379/0
      PUBLISH_ORION_BUS_GRAMMAR: ${PUBLISH_ORION_BUS_GRAMMAR:-false}
      GRAMMAR_EVENT_CHANNEL: ${GRAMMAR_EVENT_CHANNEL:-orion:grammar:event}
      BUS_OBSERVER_ENABLED: ${BUS_OBSERVER_ENABLED:-true}
      BUS_OBSERVER_POLL_INTERVAL_SEC: ${BUS_OBSERVER_POLL_INTERVAL_SEC:-10}
      BUS_OBSERVER_STREAMS: ${BUS_OBSERVER_STREAMS:-orion:evt:gateway,orion:bus:out}
      BUS_STREAM_DEPTH_WARNING: ${BUS_STREAM_DEPTH_WARNING:-25000}
      BUS_STREAM_DEPTH_CRITICAL: ${BUS_STREAM_DEPTH_CRITICAL:-100000}
      BUS_OBSERVER_NODE_ID: ${BUS_OBSERVER_NODE_ID:-athena}
    depends_on:
      bus-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

# ───────────────────────────────────────────────────────────────
# Shared Network
# ───────────────────────────────────────────────────────────────
networks:
  app-net:
    external: true

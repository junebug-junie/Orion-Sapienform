services:
  whisper-tts:
    build:
      context: ../..
      dockerfile: services/orion-whisper-tts/Dockerfile
    container_name: ${PROJECT}-whisper-tts
    restart: unless-stopped
    networks:
      - app-net

    env_file:
      - .env

    environment:
      # Project-wide basics
      - PROJECT=${PROJECT}

      # Bus wiring (usually from root .env)
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}

      # Identity
      - SERVICE_NAME=whisper-tts
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}

      # Bus Channels
      - CHANNEL_TTS_INTAKE=${CHANNEL_TTS_INTAKE}

      # Timeouts
      - CONNECT_TIMEOUT_SEC=${CONNECT_TIMEOUT_SEC}
      - READ_TIMEOUT_SEC=${READ_TIMEOUT_SEC}

      # TTS config (optional override; or just keep in .env)
      - TTS_BACKEND=${TTS_BACKEND:-coqui}
      - TTS_MODEL_NAME=${TTS_MODEL_NAME:-tts_models/multilingual/multi-dataset/xtts_v2}
      - TTS_USE_GPU=${TTS_USE_GPU:-true}
      - TTS_DEFAULT_LANGUAGE=${TTS_DEFAULT_LANGUAGE:-en}
      - TTS_DEFAULT_SPEAKER=${TTS_DEFAULT_SPEAKER:-Ana Florence}
      - TTS_DEFAULT_SPEAKER_WAV=${TTS_DEFAULT_SPEAKER_WAV:-}
      - TTS_SPLIT_SENTENCES=${TTS_SPLIT_SENTENCES:-true}
      - TTS_VOICE_PROFILE_DIR=${TTS_VOICE_PROFILE_DIR:-/models/voices}
      - COQUI_TOS_AGREED=${COQUI_TOS_AGREED:-1}
      - WHISPER_TTS_STT_TIMEOUT_SEC=${WHISPER_TTS_STT_TIMEOUT_SEC:-90}
      - WHISPER_TTS_SYNTH_TIMEOUT_SEC=${WHISPER_TTS_SYNTH_TIMEOUT_SEC:-120}

      # GPU visibility
      #- CUDA_VISIBLE_DEVICES=${GPU_INDEX}
      #- NVIDIA_VISIBLE_DEVICES=${GPU_INDEX}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    volumes:
      - /mnt/telemetry/models/coqui/tts:/root/.local/share/tts
      - ${TTS_VOICE_PROFILE_HOST_DIR:-/mnt/telemetry/models/coqui/voices}:/models/voices:ro

    gpus: all
    # Compose v3+ syntax for GPUs (Docker 20.10+)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "7800:7800"

    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  app-net:
    external: true

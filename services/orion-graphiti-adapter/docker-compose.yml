services:
  graphiti-adapter:
    build:
      context: ../..
      dockerfile: services/orion-graphiti-adapter/Dockerfile
    container_name: orion-${NODE_NAME}-graphiti-adapter
    restart: unless-stopped
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - LOG_LEVEL=${LOG_LEVEL}
      - POSTGRES_URI=${POSTGRES_URI}
      - GRAPHITI_AUTO_APPLY_SCHEMA=${GRAPHITI_AUTO_APPLY_SCHEMA}
      - FALKORDB_URI=${FALKORDB_URI}
      - FALKORDB_GRAPH=${FALKORDB_GRAPH}
      - FALKORDB_ENABLED=${FALKORDB_ENABLED}
    ports:
      - "${PORT:-8640}:8000"
    networks:
      - app-net

  falkordb:
    image: falkordb/falkordb:latest
    container_name: orion-${NODE_NAME}-falkordb
    restart: unless-stopped
    profiles:
      - falkordb
    ports:
      - "6380:6379"
    networks:
      - app-net

networks:
  app-net:
    external: true
    name: ${NET:-app-net}

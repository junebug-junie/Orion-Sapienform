version: "3.9"
services:
  orion-world-pulse:
    build:
      context: ../..
      dockerfile: services/orion-world-pulse/Dockerfile
    container_name: orion-world-pulse
    env_file:
      - .env
    ports:
      - "8628:8628"
    restart: unless-stopped
    networks:
      - app-net
    volumes:
      # Host ~/.fcc mounted read-only; the curiosity readonly fetch derives the
      # Firecrawl key from /root/.fcc/.env (ORION_FCC_ENV_PATH) so no secret is
      # ever placed in .env / .env_example. Mirrors orion-spark-concept-induction.
      - ${HOME}/.fcc:/root/.fcc:ro

networks:
  app-net:
    external: true

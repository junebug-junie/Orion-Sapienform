services:
  substrate-runtime:
    build:
      context: ../..
      dockerfile: services/orion-substrate-runtime/Dockerfile
    container_name: ${PROJECT}-substrate-runtime
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${SUBSTRATE_RUNTIME_PORT:-8115}:8115"
    environment:
      - PROJECT=${PROJECT}
      - NODE_NAME=${NODE_NAME}
      - SERVICE_NAME=${SERVICE_NAME:-orion-substrate-runtime}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}
      - POSTGRES_URI=${POSTGRES_URI}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED:-true}
      - ENABLE_BIOMETRICS_NODE_REDUCER=${ENABLE_BIOMETRICS_NODE_REDUCER:-true}
      - ENABLE_BIOMETRICS_PRESSURE_ORGAN=${ENABLE_BIOMETRICS_PRESSURE_ORGAN:-true}
      - ENABLE_NODE_PRESSURE_REDUCER=${ENABLE_NODE_PRESSURE_REDUCER:-true}
      - BIOMETRICS_NODE_STALE_AFTER_SEC=${BIOMETRICS_NODE_STALE_AFTER_SEC:-180}
      - BIOMETRICS_PRESSURE_MIN_CONFIDENCE=${BIOMETRICS_PRESSURE_MIN_CONFIDENCE:-0.60}
      - NODE_CATALOG_PATH=${NODE_CATALOG_PATH:-/app/config/biometrics/node_catalog.yaml}
      - GRAMMAR_POLL_INTERVAL_SEC=${GRAMMAR_POLL_INTERVAL_SEC:-1.0}
      - SUBSTRATE_DYNAMICS_TICK_ENABLED=${SUBSTRATE_DYNAMICS_TICK_ENABLED:-false}
      - SUBSTRATE_DYNAMICS_TICK_INTERVAL_SEC=${SUBSTRATE_DYNAMICS_TICK_INTERVAL_SEC:-30.0}
      - SUBSTRATE_EPISODIC_TICK_ENABLED=${SUBSTRATE_EPISODIC_TICK_ENABLED:-false}
      - SUBSTRATE_EPISODIC_TICK_INTERVAL_SEC=${SUBSTRATE_EPISODIC_TICK_INTERVAL_SEC:-300.0}
      - SUBSTRATE_EPISODIC_WINDOW_SECONDS=${SUBSTRATE_EPISODIC_WINDOW_SECONDS:-900}
      - SUBSTRATE_EPISODIC_MAX_RECEIPTS=${SUBSTRATE_EPISODIC_MAX_RECEIPTS:-64}
      - SUBSTRATE_EPISODIC_RETENTION_DAYS=${SUBSTRATE_EPISODIC_RETENTION_DAYS:-14.0}
      - BIOMETRICS_GRAMMAR_BATCH_LIMIT=${BIOMETRICS_GRAMMAR_BATCH_LIMIT:-500}
      - EXECUTION_GRAMMAR_BATCH_LIMIT=${EXECUTION_GRAMMAR_BATCH_LIMIT:-500}
      - TRANSPORT_GRAMMAR_BATCH_LIMIT=${TRANSPORT_GRAMMAR_BATCH_LIMIT:-1000}
      - REDUCER_HEARTBEAT_STALE_SEC=${REDUCER_HEARTBEAT_STALE_SEC:-120}
      - REDUCER_POISON_MAX_RETRIES=${REDUCER_POISON_MAX_RETRIES:-3}
      - PUBLISH_ACCEPTED_PRESSURE_GRAMMAR=${PUBLISH_ACCEPTED_PRESSURE_GRAMMAR:-true}
      - ACCEPTED_PRESSURE_GRAMMAR_CHANNEL=${ACCEPTED_PRESSURE_GRAMMAR_CHANNEL:-orion:grammar:accepted-pressure}
      - SUBSTRATE_CURSOR_TAIL_SEED_ON_LAG=${SUBSTRATE_CURSOR_TAIL_SEED_ON_LAG:-false}
      - SUBSTRATE_CURSOR_LAG_RESYNC_HOURS=${SUBSTRATE_CURSOR_LAG_RESYNC_HOURS:-6}
      - SUBSTRATE_CURSOR_RESET_OPERATOR_TOKEN=${SUBSTRATE_CURSOR_RESET_OPERATOR_TOKEN:-}
      - ENABLE_EXECUTION_TRAJECTORY_REDUCER=${ENABLE_EXECUTION_TRAJECTORY_REDUCER:-false}
      - ENABLE_TRANSPORT_BUS_REDUCER=${ENABLE_TRANSPORT_BUS_REDUCER:-false}
      - BUS_STREAM_DEPTH_CRITICAL=${BUS_STREAM_DEPTH_CRITICAL:-100000}
      - TRANSPORT_SUBSTRATE_MATURITY=${TRANSPORT_SUBSTRATE_MATURITY:-trace_only}
      - ENABLE_CHAT_GRAMMAR_REDUCER=${ENABLE_CHAT_GRAMMAR_REDUCER:-false}
      - CHAT_GRAMMAR_BATCH_LIMIT=${CHAT_GRAMMAR_BATCH_LIMIT:-100}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ORION_RECEIPT_RETENTION_SUCCESS_MINUTES=${ORION_RECEIPT_RETENTION_SUCCESS_MINUTES:-30}
      - ORION_RECEIPT_RETENTION_ERROR_HOURS=${ORION_RECEIPT_RETENTION_ERROR_HOURS:-6}
      - ORION_RECEIPT_FULL_PAYLOAD_SUCCESS=${ORION_RECEIPT_FULL_PAYLOAD_SUCCESS:-false}
      - ORION_RECEIPT_FULL_PAYLOAD_SAMPLE_RATE=${ORION_RECEIPT_FULL_PAYLOAD_SAMPLE_RATE:-0}
      - ORION_RECEIPT_MAX_TABLE_GB=${ORION_RECEIPT_MAX_TABLE_GB:-25}
      - ORION_RECEIPT_WARN_TABLE_GB=${ORION_RECEIPT_WARN_TABLE_GB:-15}
      - ORION_RECEIPT_CRITICAL_TABLE_GB=${ORION_RECEIPT_CRITICAL_TABLE_GB:-20}
      - ORION_RECEIPT_EMERGENCY_METADATA_ONLY=${ORION_RECEIPT_EMERGENCY_METADATA_ONLY:-true}
      - ORION_RECEIPT_PRUNE_INTERVAL_SEC=${ORION_RECEIPT_PRUNE_INTERVAL_SEC:-300}
      - ORION_RECEIPT_PRUNE_BATCH_SIZE=${ORION_RECEIPT_PRUNE_BATCH_SIZE:-10000}
      - ORION_RECEIPT_POSTGRES_DATA_PATH=${ORION_RECEIPT_POSTGRES_DATA_PATH:-/mnt/postgres}
      - ORION_RECEIPT_DISK_CRITICAL_PCT=${ORION_RECEIPT_DISK_CRITICAL_PCT:-85}

networks:
  app-net:
    external: true

schema_version: biometrics_node_catalog.v1

defaults:
  expected_online: true
  role: unknown
  capabilities: {}

nodes:
  atlas:
    aliases:
      - atlas
      - atlas.tail348bbe.ts.net
    role: inference_gpu
    expected_online: true
    capabilities:
      local_llm_heavy: true
      local_llm_quick: true
      embedding: true
      batch_inference: true
      graphdb: false
      postgres: false
      hub: false
      monitoring: false

  athena:
    aliases:
      - athena
      - athena.tail348bbe.ts.net
    role: orchestration
    expected_online: true
    capabilities:
      hub: true
      redis_bus: true
      graphdb: true
      postgres: true
      orchestration: true
      local_llm_heavy: false
      local_llm_quick: false
      monitoring: false

  circe:
    aliases:
      - circe
      - circe.tail348bbe.ts.net
    role: burst_gpu
    # Was false: circe was intermittent/burst-only. A real llamacpp chat worker
    # (orion-atlas-llamacpp-chat, port 8011) has been running on circe continuously
    # for days (2026-07-18) -- expected_online=false was making pressure_organ.py
    # suppress circe's real strain pressure as "expected staleness" instead of
    # surfacing it (see orion/substrate/biometrics_loop/pressure_organ.py:125).
    expected_online: true
    capabilities:
      local_llm_heavy: true
      local_llm_quick: true
      training: true
      batch_inference: true
      dream_batch: true
      graphdb: false
      postgres: false
      hub: false

  prometheus:
    aliases:
      - prometheus
      - prometheous
      - prometheus.tail348bbe.ts.net
      - prometheous.tail348bbe.ts.net
    role: observability
    expected_online: true
    capabilities:
      monitoring: true
      logs: true
      metrics: true
      orchestration: false
      local_llm_heavy: false

# Structured index of FieldStateV1's 35 raw digester channels (29 NODE_CHANNELS
# + 8 CAPABILITY_CHANNELS in services/orion-field-digester/app/tensor/channels.py,
# overlapping on stream_backlog_pressure/contract_pressure). 29 = 23 original + 5
# FCC-motor channels added 2026-07-23 (harness_step_load,
# tool_failure_streak_pressure, avg_step_chars_pressure, compliance_deficit,
# turn_incompletion) + 1 FCC-motor channel added 2026-07-24
# (context_gathering_ratio; reasoning_load also gained a real motor-side
# magnitude the same day but is not a new channel). transport_pressure/bus_health
# renamed to stream_backlog_pressure/stream_backlog_health 2026-07-24 for scope
# honesty (see each channel's own entry below) -- total channel count unchanged,
# same two channels under new names.
#
# This is the machine-readable companion to
# services/orion-field-digester/README.md's "Field channel glossary" section,
# which stays the prose reference (full mechanism detail, live-data
# investigation history). This file is the single structured source both
# that doc and Hub's Field Channel Glossary panel
# (services/orion-hub/scripts/field_channel_glossary_routes.py) read from, so
# the two can't independently drift the way the README's own frozen verdicts
# already have.
#
# Deliberately does NOT include a "verdict" field: liveness verdicts are
# computed LIVE from substrate_field_state by
# orion.field.channel_glossary.classify_channel_series(), not
# hand-maintained here -- a static verdict column is exactly what already
# went stale once (see the README's "Decay vs. injection-interval mismatch"
# section).
version: 1

categories:
  physical_substrate: "Physical substrate / embodiment -- pure hardware sensor readings, nothing cognitive."
  task_execution: "Task-execution domain -- what Orion is actively doing computationally right now and how well it's going."
  social_conversational: "Social / conversational domain -- the texture of the current chat interaction."
  infra_transport: "Infrastructure / transport workload -- the bus's own workload/health as infrastructure, not a compute resource."
  sensor_trust_liveness: "Sensor trust / liveness -- whether a source's other readings can be trusted right now, not what it's doing."
  synthesized_rollup: "Synthesized / aggregate rollups -- capability-level composites blending multiple node-level signals."
  self_monitoring: "Self-monitoring / introspection -- whether Orion's own internal model is consistent or accurate."

channels:
  - channel: availability
    level: [node]
    category: sensor_trust_liveness
    meaning: "How available/reachable a compute node currently is."
    self_state_dimension: coherence

  - channel: staleness
    level: [node]
    category: sensor_trust_liveness
    meaning: "Whether a node's most recent biometrics sample is too old to trust."
    self_state_dimension: continuity_pressure

  - channel: cpu_pressure
    level: [node]
    category: physical_substrate
    meaning: "How loaded a node's CPU currently is."
    evidence_dimension: resource_pressure

  - channel: memory_pressure
    level: [node]
    category: physical_substrate
    meaning: "Node RAM pressure."
    evidence_dimension: resource_pressure

  - channel: gpu_pressure
    level: [node]
    category: physical_substrate
    meaning: "How loaded a node's GPU currently is."
    evidence_dimension: resource_pressure

  - channel: thermal_pressure
    level: [node]
    category: physical_substrate
    meaning: "Node thermal/temperature pressure."
    self_state_dimension: resource_pressure

  - channel: disk_pressure
    level: [node]
    category: physical_substrate
    meaning: "Node disk I/O pressure."
    evidence_dimension: resource_pressure

  - channel: expected_offline_suppression
    level: [node]
    category: sensor_trust_liveness
    meaning: "Signals a node is expected to be offline, so its absence shouldn't be read as a failure."
    self_state_dimension: coherence

  - channel: execution_load
    level: [node]
    category: task_execution
    meaning: "How much active execution work (agent runs, tool calls) is in flight on a node."
    evidence_dimension: execution_pressure

  - channel: execution_friction
    level: [node]
    category: task_execution
    meaning: "How much resistance (retries/backoff) execution is encountering on a node."
    evidence_dimension: reliability_pressure

  - channel: reasoning_load
    level: [node]
    category: task_execution
    meaning: "How much active LLM-reasoning work a node is doing. Real magnitude
      since 2026-07-24: cortex-exec-sourced runs use reasoning_char_count (chars);
      harness-motor-sourced runs use reasoning_output_tokens (real provider-computed
      tokens from the FCC CLI's own result-event usage object, confirmed live). Falls
      back to a 0.35/0.05 presence-only flag only when neither magnitude is set."
    evidence_dimension: reasoning_pressure

  - channel: failure_pressure
    level: [node]
    category: task_execution
    meaning: "Recent execution failure rate/severity on a node."
    evidence_dimension: reliability_pressure

  - channel: egress_confidence_deficit
    level: [node]
    category: task_execution
    meaning: "1 - confidence that an execution's output actually reached its destination."
    self_state_dimension: introspection_pressure

  - channel: harness_step_load
    level: [node]
    category: task_execution
    meaning: "FCC-motor-only step-load proxy for one unified Hub turn, split out of execution_load (which blends cortex-exec + harness-governor step counts and hard-caps at 8) -- a compute/thermal/power cost proxy for how much processing one turn actually cost on the expensive GPU node running the motor."

  - channel: tool_failure_streak_pressure
    level: [node]
    category: task_execution
    meaning: "Is the FCC motor stuck repeating the same tool failure (e.g. a denied permission) instead of adapting, for one turn."

  - channel: avg_step_chars_pressure
    level: [node]
    category: task_execution
    meaning: "Per-step verbosity of the FCC motor's tool output for one turn."

  - channel: compliance_deficit
    level: [node]
    category: task_execution
    meaning: "Did the FCC motor actually produce a compliant, delivered turn -- HarnessRunV1.compliance_verdict rank (completed/partial/failed/refused), distinct from failure_pressure since a turn can resolve partial with zero individual tool-step failures."

  - channel: turn_incompletion
    level: [node]
    category: task_execution
    meaning: "Did Hub fail to get a usable result back from the harness-governor RPC for this turn at all -- the one unified-turn failure mode where no governor-side grammar event exists. A distinct, worse severity than compliance_deficit's worst rank."

  - channel: context_gathering_ratio
    level: [node]
    category: task_execution
    meaning: "What fraction of one FCC-motor turn's classified tool calls were
      read-only research/context tools (Read, Grep, WebSearch, mcp__gitnexus__*,
      mcp__firecrawl__*, ...) vs action/mutation tools (Bash, Edit, Write, other MCP
      tools) -- composition, not volume (harness_step_load already covers volume). A
      fixed, deterministic tool-name allowlist, not a taxonomy: an unmatched tool
      name increments neither bucket, so 0.0 can mean either all-execution or
      zero-classified-calls."

  - channel: repair_pressure
    level: [node]
    category: social_conversational
    meaning: "How much conversational \"repair\" (corrections, re-explaining) is happening in chat."
    self_state_dimension: social_pressure

  - channel: conversation_load
    level: [node]
    category: social_conversational
    meaning: "How much active conversational load (turn volume/complexity) is occurring."
    self_state_dimension: social_pressure

  - channel: stream_backlog_pressure
    level: [node, capability]
    category: infra_transport
    meaning: "Renamed from transport_pressure 2026-07-24 for scope honesty: this only
      ever measures world_pulse's one real Redis Stream (orion:stream:world_pulse:run:result)
      and its dead-letter queue -- the only thing in the architecture with a real
      backlog/XLEN concept. Everything else on the bus is Pub/Sub, which has no
      backlog to measure. Not a general bus/transport-layer pressure signal, and not
      intended to become one without a genuinely different mechanism -- see
      docs/superpowers/specs/2026-07-22-transport-bus-signal-quality-measurement-design.md
      and docs/superpowers/specs/2026-07-23-transport-domain-rpc-health-redesign.md
      for the real cross-service RPC-health signal being built separately."
    evidence_dimension: resource_pressure

  - channel: contract_pressure
    level: [node, capability]
    category: infra_transport
    meaning: "Pressure from bus/schema \"contract\" mismatches (precise real-world condition not otherwise documented in code)."

  - channel: catalog_drift_pressure
    level: [node]
    category: infra_transport
    meaning: "Drift/staleness in the bus event \"catalog\" (schema registry) relative to what's actually flowing."

  - channel: delivery_confidence
    level: [node]
    category: sensor_trust_liveness
    meaning: "Confidence that bus messages are actually being delivered end-to-end. Single-observer channel (2026-07-22): only node:athena's bus-observer ever reports this -- atlas/circe/prometheus have no code path that could produce a real reading and are excluded from the merge entirely (SINGLE_OBSERVER_NODE_CHANNELS, services/orion-field-digester/app/tensor/channels.py), not defaulted to a placeholder value."
    evidence_dimension: coherence

  - channel: stream_backlog_health
    level: [node]
    category: sensor_trust_liveness
    meaning: "Renamed from bus_health 2026-07-24, same scope-honesty reasoning as
      stream_backlog_pressure above -- reflects world_pulse's one Redis Stream, not
      overall bus/transport subsystem health. Single-observer channel (2026-07-22):
      only node:athena's bus-observer ever reports this -- atlas/circe/prometheus
      have no code path that could produce a real reading and are excluded from the
      merge entirely (SINGLE_OBSERVER_NODE_CHANNELS,
      services/orion-field-digester/app/tensor/channels.py), not defaulted to a
      placeholder value."
    evidence_dimension: coherence

  - channel: observer_failure_pressure
    level: [node]
    category: infra_transport
    meaning: "Pressure from failures of the bus \"observer\" role (monitoring/subscriber-side failures)."

  - channel: field_coherence_warning
    level: [node]
    category: self_monitoring
    meaning: "Per-node incoherence score -- fires when two reducers that should agree about a node's state disagree."
    self_state_dimension: coherence

  - channel: prediction_error
    level: [node]
    category: self_monitoring
    meaning: "How much a recent prediction (from the prediction/surprise subsystem) missed reality."
    self_state_dimension: uncertainty

  - channel: pressure
    level: [capability]
    category: synthesized_rollup
    meaning: "Overall load/pressure for a given capability (llm_inference, orchestration, storage, graph, memory, transport)."
    self_state_dimension: resource_pressure

  - channel: confidence
    level: [capability]
    category: synthesized_rollup
    meaning: "How confident the system is that a given capability is currently reliable/available."
    self_state_dimension: coherence

  - channel: available_capacity
    level: [capability]
    category: synthesized_rollup
    meaning: "How much spare operating capacity a capability has right now."
    self_state_dimension: coherence

  - channel: execution_pressure
    level: [capability]
    category: task_execution
    meaning: "Capability-level execution-load pressure."
    self_state_dimension: execution_pressure

  - channel: reasoning_pressure
    level: [capability]
    category: task_execution
    meaning: "Capability-level reasoning-load pressure."
    self_state_dimension: reasoning_pressure

  - channel: reliability_pressure
    level: [capability]
    category: synthesized_rollup
    meaning: "Capability-level pressure representing risk to reliability (from execution friction, failures, or observer failures)."
    self_state_dimension: reliability_pressure

schema_version: consolidation_policy.v1
policy_id: consolidation_policy.v1

window:
  lookback_minutes: 60
  min_support_count: 3
  max_frames_per_source: 500

motif_thresholds:
  min_support_score: 0.20
  min_confidence_score: 0.30
  dominant_motif_min_support: 0.50

# tracked_self_dimensions removed 2026-07-22, SelfStateV1 burn
# (docs/superpowers/specs/2026-07-22-self-state-phi-endo-origination-burn-
# spec.md): its only consumer (_build_field_attention_self_slice) is gone.

tracked_attention_targets:
  - node:athena
  - capability:orchestration
  - capability:graph
  - field:recent_perturbations

tracked_feedback_outcomes:
  - dry_run_only
  - prepared_only
  - completed
  - failed
  - blocked
  - absent
  - deferred
  - mixed

motif_rules:
  # loaded_but_reliable removed 2026-07-22, SelfStateV1 burn: its only input
  # (window.self_states) no longer exists.

  attention_saturated_execution:
    kind: attention_pattern
    label: attention_saturated_execution
    conditions:
      attention_target_any:
        - node:athena
        - capability:orchestration
      min_overall_salience: 0.70

  read_only_policy_loop:
    kind: proposal_policy_pattern
    label: read_only_policy_loop
    conditions:
      approved_read_only_min: 1

  dry_run_feedback_loop:
    kind: dispatch_feedback_pattern
    label: dry_run_feedback_loop
    conditions:
      outcome_status: dry_run_only

  blocked_review_loop:
    kind: dispatch_feedback_pattern
    label: blocked_review_loop
    conditions:
      blocked_or_review_min: 1

  stable_after_dry_run:
    kind: stability_pattern
    label: stable_after_dry_run
    conditions:
      outcome_status: dry_run_only
      self_state_delta:
        allowed:
          - unchanged

  transport_contract_drift_loop:
    kind: attention_pattern
    label: transport_contract_drift_loop
    conditions:
      attention_target: capability:transport
      min_contract_pressure: 0.70

  transport_healthy_idle:
    kind: attention_pattern
    label: transport_healthy_idle
    conditions:
      attention_target: capability:transport
      max_transport_pressure: 0.10
      min_bus_health: 0.90

tensor:
  enabled: true
  max_coordinates: 200

tensor_axes:
  # field_attention_self removed 2026-07-22, SelfStateV1 burn: its only input
  # (window.self_states) no longer exists.
  policy_dispatch_feedback:
    - proposal_kind
    - policy_decision
    - dispatch_status
    - feedback_outcome
  motif_condition_outcome:
    - motif
    - self_condition
    - outcome_status

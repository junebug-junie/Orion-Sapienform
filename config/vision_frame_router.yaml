version: 1

defaults:
  enabled: true
  task_type: retina_fast
  every_n_frames: 10
  min_seconds_between_tasks_per_camera: 5
  max_inflight_per_camera: 1
  request:
    want_caption: true
    want_embeddings: true

global:
  max_inflight_total: 2
  # When true, frames at global inflight cap skip with reason global_inflight_limit.
  # When false, same drop behavior but reason global_inflight_backpressure (no queue in MVP).
  drop_when_busy: true
  require_image_path_exists: true

cameras:
  mock-cam-01:
    enabled: true
    task_type: retina_fast
    every_n_frames: 3
    min_seconds_between_tasks_per_camera: 2

  porch_eye:
    enabled: true
    task_type: detect_open_vocab
    every_n_frames: 5
    min_seconds_between_tasks_per_camera: 3
    request:
      prompts:
        - person
        - package
        - vehicle
        - animal

  kitchen_eye:
    enabled: false

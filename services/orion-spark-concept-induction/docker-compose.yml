services:
  spark-concept-induction:
    build:
      context: ../..
      dockerfile: services/orion-spark-concept-induction/Dockerfile
    container_name: orion-${NODE_NAME}-spark-concept-induction
    restart: unless-stopped
    networks:
      - app-net
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC}
      - BUS_INTAKE_CHANNELS=${BUS_INTAKE_CHANNELS:-["orion:chat:history:log","orion:chat:history:turn","orion:chat:social:turn","orion:chat:social:stored","orion:chat:gpt:turn","orion:chat:gpt:message:log","orion:collapse:sql-write","orion:spark:telemetry","orion:metacognition:tick","orion:cognition:trace","orion:substrate:self_state","orion:feedback:frame","orion:world_pulse:run:result"]}
      - BUS_PROFILE_OUT=${BUS_PROFILE_OUT}
      - BUS_DELTA_OUT=${BUS_DELTA_OUT}
      - BUS_VECTOR_OUT=${BUS_VECTOR_OUT}
      - BUS_RDF_OUT=${BUS_RDF_OUT}
      - BUS_SQL_OUT=${BUS_SQL_OUT}
      - BUS_DRIVE_STATE_OUT=${BUS_DRIVE_STATE_OUT}
      - BUS_TENSION_EVENT_OUT=${BUS_TENSION_EVENT_OUT}
      - BUS_DRIVE_AUDIT_OUT=${BUS_DRIVE_AUDIT_OUT}
      - BUS_IDENTITY_SNAPSHOT_OUT=${BUS_IDENTITY_SNAPSHOT_OUT}
      - BUS_GOAL_PROPOSAL_OUT=${BUS_GOAL_PROPOSAL_OUT}
      - BUS_TURN_DOSSIER_OUT=${BUS_TURN_DOSSIER_OUT}
      - BUS_ACTION_OUTCOME_OUT=${BUS_ACTION_OUTCOME_OUT}
      - CONCEPT_WINDOW_MAX_EVENTS=${CONCEPT_WINDOW_MAX_EVENTS}
      - CONCEPT_WINDOW_MAX_MINUTES=${CONCEPT_WINDOW_MAX_MINUTES}
      - CONCEPT_TRIGGER_COOLDOWN_SEC=${CONCEPT_TRIGGER_COOLDOWN_SEC}
      - CONCEPT_TRIGGER_DEDUPE_SEC=${CONCEPT_TRIGGER_DEDUPE_SEC}
      - CONCEPT_TRIGGER_RECENT_DECISIONS=${CONCEPT_TRIGGER_RECENT_DECISIONS}
      - CONCEPT_AUTONOMOUS_TRIGGER_ENABLED=${CONCEPT_AUTONOMOUS_TRIGGER_ENABLED}
      - CONCEPT_SUBJECTS=${CONCEPT_SUBJECTS}
      - SPACY_MODEL=${SPACY_MODEL}
      - CONCEPT_MAX_CANDIDATES=${CONCEPT_MAX_CANDIDATES}
      - EMBEDDINGS_BASE_URL=${EMBEDDINGS_BASE_URL}
      - EMBEDDINGS_TIMEOUT_SEC=${EMBEDDINGS_TIMEOUT_SEC}
      - CONCEPT_CLUSTER_THRESHOLD=${CONCEPT_CLUSTER_THRESHOLD}
      - USE_CORTEX_ORCH=${USE_CORTEX_ORCH}
      - CORTEX_ORCH_VERB=${CORTEX_ORCH_VERB}
      - CORTEX_ORCH_REQUEST_CHANNEL=${CORTEX_ORCH_REQUEST_CHANNEL}
      - CORTEX_ORCH_RESULT_PREFIX=${CORTEX_ORCH_RESULT_PREFIX}
      - CORTEX_TIMEOUT_SEC=${CORTEX_TIMEOUT_SEC}
      - CONCEPT_STORE_PATH=${CONCEPT_STORE_PATH}
      - DRIVE_DECAY_TAU_SEC=${DRIVE_DECAY_TAU_SEC}
      - DRIVE_SATURATION_GAIN=${DRIVE_SATURATION_GAIN}
      - DRIVE_ACTIVATION_ON=${DRIVE_ACTIVATION_ON}
      - DRIVE_ACTIVATION_OFF=${DRIVE_ACTIVATION_OFF}
      - GOAL_PROPOSAL_COOLDOWN_MINUTES=${GOAL_PROPOSAL_COOLDOWN_MINUTES}
      - GOAL_GENERATION_MODE=${GOAL_GENERATION_MODE}
      - GOAL_DRIVE_ORIGIN_SOURCE=${GOAL_DRIVE_ORIGIN_SOURCE}
      - CONCEPT_PROFILE_GRAPH_BACKEND=${CONCEPT_PROFILE_GRAPH_BACKEND:-falkor}
      - FALKORDB_URI=${FALKORDB_URI:-redis://orion-athena-falkordb:6379}
      - FALKORDB_SUBSTRATE_GRAPH=${FALKORDB_SUBSTRATE_GRAPH:-orion_substrate}
      - CONCEPT_PROFILE_REPOSITORY_BACKEND=${CONCEPT_PROFILE_REPOSITORY_BACKEND}
      - CONCEPT_PROFILE_GRAPHDB_ENDPOINT=${CONCEPT_PROFILE_GRAPHDB_ENDPOINT}
      - CONCEPT_PROFILE_GRAPHDB_URL=${CONCEPT_PROFILE_GRAPHDB_URL}
      - CONCEPT_PROFILE_GRAPHDB_REPO=${CONCEPT_PROFILE_GRAPHDB_REPO}
      - CONCEPT_PROFILE_GRAPHDB_USER=${CONCEPT_PROFILE_GRAPHDB_USER}
      - CONCEPT_PROFILE_GRAPHDB_PASS=${CONCEPT_PROFILE_GRAPHDB_PASS}
      - CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC=${CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC}
      - CONCEPT_PROFILE_GRAPH_URI=${CONCEPT_PROFILE_GRAPH_URI}
      - CONCEPT_PROFILE_PARITY_MIN_COMPARISONS=${CONCEPT_PROFILE_PARITY_MIN_COMPARISONS}
      - CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE=${CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE}
      - CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE=${CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE}
      - CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES=${CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES}
      - CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL=${CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL}
      - AUTONOMY_GOAL_ARCHIVE_ENABLED=${AUTONOMY_GOAL_ARCHIVE_ENABLED:-true}
      - AUTONOMY_GOAL_ARCHIVE_MAX_UPDATES_PER_TICK=${AUTONOMY_GOAL_ARCHIVE_MAX_UPDATES_PER_TICK:-25}
      - AUTONOMY_GOAL_ARCHIVE_SUBJECTS=${AUTONOMY_GOAL_ARCHIVE_SUBJECTS:-orion,relationship}
      - AUTONOMY_GOAL_RETENTION_DAYS=${AUTONOMY_GOAL_RETENTION_DAYS:-30}
      - AUTONOMY_GOAL_MAX_ACTIVE_PER_SUBJECT=${AUTONOMY_GOAL_MAX_ACTIVE_PER_SUBJECT:-3}
      - AUTONOMY_GRAPH_QUERY_URL=${AUTONOMY_GRAPH_QUERY_URL:-}
      - AUTONOMY_GRAPH_UPDATE_URL=${AUTONOMY_GRAPH_UPDATE_URL:-}
      - AUTONOMY_GRAPH_TIMEOUT_SEC=${AUTONOMY_GRAPH_TIMEOUT_SEC:-30}
      - ORION_SUBSTRATE_AUTONOMY_METABOLISM_ENABLED=${ORION_SUBSTRATE_AUTONOMY_METABOLISM_ENABLED:-false}
      - ORION_METABOLISM_MIN_PREDICTIVE_PRESSURE=${ORION_METABOLISM_MIN_PREDICTIVE_PRESSURE:-0.55}
      - ORION_METABOLISM_MIN_CURIOSITY_STRENGTH=${ORION_METABOLISM_MIN_CURIOSITY_STRENGTH:-0.5}
      - ORION_CAPABILITY_POLICY_AUTO_READONLY_ENABLED=${ORION_CAPABILITY_POLICY_AUTO_READONLY_ENABLED:-false}
      - ORION_EPISODE_FETCH_BACKEND=${ORION_EPISODE_FETCH_BACKEND:-auto}
      # Container path; host ~/.fcc mounted read-only at /root/.fcc (see volumes below)
      - ORION_FCC_ENV_PATH=/root/.fcc/.env
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - ORION_AUTONOMY_EPISODE_JOURNAL_ENABLED=${ORION_AUTONOMY_EPISODE_JOURNAL_ENABLED:-false}
      - WP_RUN_RESULT_STREAM_ENABLED=${WP_RUN_RESULT_STREAM_ENABLED:-false}
      - WP_RUN_RESULT_STREAM_KEY=${WP_RUN_RESULT_STREAM_KEY:-orion:stream:world_pulse:run:result}
      - WP_RUN_RESULT_STREAM_GROUP=${WP_RUN_RESULT_STREAM_GROUP:-cg:concept-induction}
      - WP_RUN_RESULT_DLQ_KEY=${WP_RUN_RESULT_DLQ_KEY:-orion:stream:world_pulse:run:result:dlq}
      - WP_RUN_RESULT_BLOCK_MS=${WP_RUN_RESULT_BLOCK_MS:-5000}
      - WP_RUN_RESULT_MAX_ATTEMPTS=${WP_RUN_RESULT_MAX_ATTEMPTS:-5}
      - WP_RUN_RESULT_AUTOCLAIM_IDLE_MS=${WP_RUN_RESULT_AUTOCLAIM_IDLE_MS:-120000}
      - JOURNAL_WRITE_CHANNEL=${JOURNAL_WRITE_CHANNEL:-orion:journal:write}
      - JOURNAL_SESSION_ID=${JOURNAL_SESSION_ID:-orion}
      - JOURNAL_USER_ID=${JOURNAL_USER_ID:-juniper}
      - JOURNAL_AUTHOR=${JOURNAL_AUTHOR:-orion}
    volumes:
      - ${ORION_DATA_ROOT:-/mnt/graphdb}/orion/concepts:/data
      - ${HOME}/.fcc:/root/.fcc:ro
    env_file:
      - .env
    ports:
      - "8510:8510"

networks:
  app-net:
    external: true

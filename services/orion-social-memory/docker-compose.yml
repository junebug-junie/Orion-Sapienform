services:
  orion-social-memory:
    build:
      context: ../..
      dockerfile: services/orion-social-memory/Dockerfile
    container_name: ${PROJECT:-orion}-social-memory
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-orion-social-memory}
      SERVICE_NAME: ${SERVICE_NAME:-orion-social-memory}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      NODE_NAME: ${NODE_NAME:-unknown}
      PORT: ${PORT:-8765}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ORION_BUS_URL: ${ORION_BUS_URL}
      ORION_BUS_ENABLED: ${ORION_BUS_ENABLED:-true}
      ORION_BUS_ENFORCE_CATALOG: ${ORION_BUS_ENFORCE_CATALOG:-false}
      DATABASE_URL: ${DATABASE_URL}
      SOCIAL_MEMORY_INPUT_CHANNEL: ${SOCIAL_MEMORY_INPUT_CHANNEL:-orion:chat:social:stored}
      SOCIAL_MEMORY_PARTICIPANT_CHANNEL: ${SOCIAL_MEMORY_PARTICIPANT_CHANNEL:-orion:social:participant:continuity}
      SOCIAL_MEMORY_ROOM_CHANNEL: ${SOCIAL_MEMORY_ROOM_CHANNEL:-orion:social:room:continuity}
      SOCIAL_MEMORY_STANCE_CHANNEL: ${SOCIAL_MEMORY_STANCE_CHANNEL:-orion:social:stance:snapshot}
      SOCIAL_MEMORY_UPDATE_CHANNEL: ${SOCIAL_MEMORY_UPDATE_CHANNEL:-orion:social:relational:update}
      SOCIAL_MEMORY_OPEN_THREAD_CHANNEL: ${SOCIAL_MEMORY_OPEN_THREAD_CHANNEL:-orion:social:open-thread}
      SOCIAL_MEMORY_PEER_STYLE_CHANNEL: ${SOCIAL_MEMORY_PEER_STYLE_CHANNEL:-orion:social:peer-style}
      SOCIAL_MEMORY_ROOM_RITUAL_CHANNEL: ${SOCIAL_MEMORY_ROOM_RITUAL_CHANNEL:-orion:social:room-ritual}
      SOCIAL_MEMORY_COMMITMENT_CHANNEL: ${SOCIAL_MEMORY_COMMITMENT_CHANNEL:-orion:social:commitment}
      SOCIAL_MEMORY_COMMITMENT_RESOLUTION_CHANNEL: ${SOCIAL_MEMORY_COMMITMENT_RESOLUTION_CHANNEL:-orion:social:commitment:resolution}
      SOCIAL_MEMORY_CLAIM_CHANNEL: ${SOCIAL_MEMORY_CLAIM_CHANNEL:-orion:social:claim}
      SOCIAL_MEMORY_CLAIM_REVISION_CHANNEL: ${SOCIAL_MEMORY_CLAIM_REVISION_CHANNEL:-orion:social:claim:revision}
      SOCIAL_MEMORY_CLAIM_STANCE_CHANNEL: ${SOCIAL_MEMORY_CLAIM_STANCE_CHANNEL:-orion:social:claim:stance}
      SOCIAL_MEMORY_CLAIM_ATTRIBUTION_CHANNEL: ${SOCIAL_MEMORY_CLAIM_ATTRIBUTION_CHANNEL:-orion:social:claim:attribution}
      SOCIAL_MEMORY_CLAIM_CONSENSUS_CHANNEL: ${SOCIAL_MEMORY_CLAIM_CONSENSUS_CHANNEL:-orion:social:claim:consensus}
      SOCIAL_MEMORY_CLAIM_DIVERGENCE_CHANNEL: ${SOCIAL_MEMORY_CLAIM_DIVERGENCE_CHANNEL:-orion:social:claim:divergence}
      SOCIAL_MEMORY_BRIDGE_SUMMARY_CHANNEL: ${SOCIAL_MEMORY_BRIDGE_SUMMARY_CHANNEL:-orion:social:bridge-summary}
      SOCIAL_MEMORY_CLARIFYING_QUESTION_CHANNEL: ${SOCIAL_MEMORY_CLARIFYING_QUESTION_CHANNEL:-orion:social:clarifying-question}
      SOCIAL_MEMORY_DELIBERATION_DECISION_CHANNEL: ${SOCIAL_MEMORY_DELIBERATION_DECISION_CHANNEL:-orion:social:deliberation:decision}
      SOCIAL_MEMORY_TURN_HANDOFF_CHANNEL: ${SOCIAL_MEMORY_TURN_HANDOFF_CHANNEL:-orion:social:turn-handoff}
      SOCIAL_MEMORY_CLOSURE_SIGNAL_CHANNEL: ${SOCIAL_MEMORY_CLOSURE_SIGNAL_CHANNEL:-orion:social:closure-signal}
      SOCIAL_MEMORY_FLOOR_DECISION_CHANNEL: ${SOCIAL_MEMORY_FLOOR_DECISION_CHANNEL:-orion:social:floor:decision}
      SOCIAL_MEMORY_EVIDENCE_MAX: ${SOCIAL_MEMORY_EVIDENCE_MAX:-5}
      SOCIAL_MEMORY_TOPIC_MAX: ${SOCIAL_MEMORY_TOPIC_MAX:-6}
      SOCIAL_MEMORY_ROOM_PARTICIPANT_MAX: ${SOCIAL_MEMORY_ROOM_PARTICIPANT_MAX:-8}
      SOCIAL_MEMORY_OPEN_THREAD_TTL_HOURS: ${SOCIAL_MEMORY_OPEN_THREAD_TTL_HOURS:-6}
      SOCIAL_MEMORY_COMMITMENT_TTL_MINUTES: ${SOCIAL_MEMORY_COMMITMENT_TTL_MINUTES:-90}
      SOCIAL_MEMORY_COMMITMENT_MAX_OPEN: ${SOCIAL_MEMORY_COMMITMENT_MAX_OPEN:-3}
      SOCIAL_MEMORY_STYLE_ADAPTATION_ENABLED: ${SOCIAL_MEMORY_STYLE_ADAPTATION_ENABLED:-true}
      SOCIAL_MEMORY_STYLE_CONFIDENCE_FLOOR: ${SOCIAL_MEMORY_STYLE_CONFIDENCE_FLOOR:-0.35}
    ports:
      - "${PORT:-8765}:${PORT:-8765}"
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    external: true

# Minimal Tempo single-binary config for local/dev alongside otel-collector.
# Traces: collector OTLP/gRPC -> otel-tempo:4317 (see collector-config.yaml).
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester: {}

compactor: {}

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false

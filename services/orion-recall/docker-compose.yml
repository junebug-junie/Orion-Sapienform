services:
  recall:
    build:
      context: ../..
      dockerfile: services/orion-recall/Dockerfile
    container_name: ${PROJECT}-recall
    restart: unless-stopped
    networks:
      - app-net
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      #- NODE_NAME=${NODE_NAME}
      - NODE_NAME=athena-DEBUG-CONTAINER
      - PORT=${PORT}

      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}

      - RECALL_BUS_INTAKE=${RECALL_BUS_INTAKE}
      - RECALL_BUS_REPLY_DEFAULT=${RECALL_BUS_REPLY_DEFAULT}
      - RECALL_BUS_TELEMETRY=${RECALL_BUS_TELEMETRY}

      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC}
      - ORION_HEALTH_CHANNEL=${ORION_HEALTH_CHANNEL}
      - ERROR_CHANNEL=${ERROR_CHANNEL}
      - SHUTDOWN_GRACE_SEC=${SHUTDOWN_GRACE_SEC}
      - RECALL_RABBIT_CONCURRENT_HANDLERS=${RECALL_RABBIT_CONCURRENT_HANDLERS:-false}

      - RECALL_DEFAULT_MAX_ITEMS=${RECALL_DEFAULT_MAX_ITEMS}
      - RECALL_DEFAULT_TIME_WINDOW_DAYS=${RECALL_DEFAULT_TIME_WINDOW_DAYS}
      - RECALL_DEFAULT_MODE=${RECALL_DEFAULT_MODE}
      - RECALL_DEFAULT_PROFILE=${RECALL_DEFAULT_PROFILE}

      # Purpose-conditioned recall (PCR)
      - RECALL_PCR_ENABLED=${RECALL_PCR_ENABLED:-true}
      # 2026-07-14: these 4 numeric tunables were listed with no compose-level default
      # (unlike every other numeric knob in this file) and were missing from live .env
      # entirely -- docker-compose substituted empty string, which crashed pydantic
      # Settings parsing (float_parsing/int_parsing) on every boot and crash-looped
      # this service. Falling back to the exact .env_example values, matching the
      # pattern already used for every other numeric tunable below.
      - RECALL_SKIP_MAX_NOVELTY=${RECALL_SKIP_MAX_NOVELTY:-0.25}
      - RECALL_SKIP_SHIFT_NOVELTY_FLOOR=${RECALL_SKIP_SHIFT_NOVELTY_FLOOR:-0.35}
      - RECALL_CONTINUITY_SQL_MINUTES=${RECALL_CONTINUITY_SQL_MINUTES:-120}
      - RECALL_CONTINUITY_RENDER_BUDGET=${RECALL_CONTINUITY_RENDER_BUDGET:-96}
      - RECALL_ACTIVE_PACKET_ENABLED=${RECALL_ACTIVE_PACKET_ENABLED:-true}
      - ACTIVATION_RECALL_FLOOR=${ACTIVATION_RECALL_FLOOR:-0.08}
      - RECALL_CONCEPT_REGION_ENABLED=${RECALL_CONCEPT_REGION_ENABLED:-true}
      # SUBSTRATE_STORE_BACKEND/FALKORDB_URI/FALKORDB_SUBSTRATE_GRAPH are read directly
      # from the process environment by orion/substrate/graphdb_store.py's
      # build_substrate_store_from_env() (no matching pydantic Settings field in this
      # service) -- this service has no env_file: directive, so without these three
      # entries here they never reach the container's real OS environment regardless
      # of what .env/.env_example say, and the concept_region collector silently
      # degrades to an empty in-memory store forever. Same shared FalkorDB
      # instance/graph as orion-cortex-exec and orion-hub.
      - SUBSTRATE_STORE_BACKEND=${SUBSTRATE_STORE_BACKEND:-falkor}
      - FALKORDB_URI=${FALKORDB_URI}
      - FALKORDB_SUBSTRATE_GRAPH=${FALKORDB_SUBSTRATE_GRAPH:-orion_substrate}
      - RECALL_BELIEF_RENDER_BUDGET=${RECALL_BELIEF_RENDER_BUDGET:-128}
      # No compose-level default on these two: they are NEVER_SYNC_KEYS-protected in
      # scripts/sync_local_env_from_example.py (must be set by hand in .env) and their
      # real default lives in .env_example (currently true / a real adapter URL) --
      # duplicating that value here as a ":-" fallback would drift from .env_example
      # over time and silently reintroduce the exact "flag on, dependency empty"
      # footgun this key pair already caused once.
      - RECALL_GRAPHITI_IN_CHAT=${RECALL_GRAPHITI_IN_CHAT}
      - RECALL_GRAPHITI_ADAPTER_URL=${RECALL_GRAPHITI_ADAPTER_URL}
      - RECALL_GRAPHITI_FALKORDB_URI=${RECALL_GRAPHITI_FALKORDB_URI:-}
      - RECALL_GRAPHITI_TIMEOUT_SEC=${RECALL_GRAPHITI_TIMEOUT_SEC:-10.0}
      # Same 2026-07-14 gap: missing from live .env, no compose default -> was
      # silently resolving to an empty collection name instead of the real default.
      - RECALL_CRYSTALLIZATION_VECTOR_COLLECTION=${RECALL_CRYSTALLIZATION_VECTOR_COLLECTION:-orion_memory_crystallizations}

      - RECALL_ENABLE_SQL_CHAT=${RECALL_ENABLE_SQL_CHAT}
      - RECALL_ENABLE_SQL_MIRRORS=${RECALL_ENABLE_SQL_MIRRORS}
      - RECALL_ENABLE_VECTOR=${RECALL_ENABLE_VECTOR}
      - RECALL_ENABLE_RDF=${RECALL_ENABLE_RDF}

      - RECALL_ENABLE_SQL_TIMELINE=${RECALL_ENABLE_SQL_TIMELINE}
      - RECALL_ENABLE_CARDS=${RECALL_ENABLE_CARDS:-true}
      - RECALL_CARDS_TIMEOUT_SEC=${RECALL_CARDS_TIMEOUT_SEC:-8.0}
      - RECALL_CARDS_MAX_NEIGHBORS=${RECALL_CARDS_MAX_NEIGHBORS:-6}
      - RECALL_CARDS_EMBEDDING_URL=${RECALL_CARDS_EMBEDDING_URL:-}
      - RECALL_CARDS_EMBED_TIMEOUT_SEC=${RECALL_CARDS_EMBED_TIMEOUT_SEC:-5.0}
      - RECALL_CARDS_MIN_SIMILARITY=${RECALL_CARDS_MIN_SIMILARITY:-0.32}
      - RECALL_CARDS_EMBED_CONCURRENCY=${RECALL_CARDS_EMBED_CONCURRENCY:-4}
      - RECALL_SQL_SINCE_MINUTES=${RECALL_SQL_SINCE_MINUTES}
      - RECALL_SQL_TOP_K=${RECALL_SQL_TOP_K}
      # Default timeline table is chat_history_log unless overridden.
      - RECALL_SQL_TIMELINE_TABLE=${RECALL_SQL_TIMELINE_TABLE}
      - RECALL_SQL_TIMELINE_TS_COL=${RECALL_SQL_TIMELINE_TS_COL}
      - RECALL_SQL_TIMELINE_TEXT_COL=${RECALL_SQL_TIMELINE_TEXT_COL}
      - RECALL_SQL_TIMELINE_SESSION_COL=${RECALL_SQL_TIMELINE_SESSION_COL}
      - RECALL_SQL_TIMELINE_NODE_COL=${RECALL_SQL_TIMELINE_NODE_COL}
      - RECALL_SQL_TIMELINE_TAGS_COL=${RECALL_SQL_TIMELINE_TAGS_COL}
      - RECALL_SQL_TIMELINE_REQUIRE_JUNIPER_OBSERVER=${RECALL_SQL_TIMELINE_REQUIRE_JUNIPER_OBSERVER}

      - RECALL_SQL_MESSAGE_TABLE=${RECALL_SQL_MESSAGE_TABLE}
      - RECALL_SQL_MESSAGE_ROLE_COL=${RECALL_SQL_MESSAGE_ROLE_COL}
      - RECALL_SQL_MESSAGE_TEXT_COL=${RECALL_SQL_MESSAGE_TEXT_COL}
      - RECALL_SQL_MESSAGE_CREATED_AT_COL=${RECALL_SQL_MESSAGE_CREATED_AT_COL}

      # Database & Stores
      - RECALL_PG_DSN=${RECALL_PG_DSN}
      - VECTOR_DB_HOST=${VECTOR_DB_HOST}
      - VECTOR_DB_PORT=${VECTOR_DB_PORT}
      - VECTOR_DB_COLLECTION=${VECTOR_DB_COLLECTION}

      - GRAPH_BACKEND=${GRAPH_BACKEND:-fuseki}
      - RDF_STORE_BACKEND=${RDF_STORE_BACKEND:-fuseki}
      - RDF_STORE_BASE_URL=${RDF_STORE_BASE_URL:-}
      - RDF_STORE_DATASET=${RDF_STORE_DATASET:-orion}
      - RDF_STORE_QUERY_URL=${RDF_STORE_QUERY_URL:-}
      - RDF_STORE_UPDATE_URL=${RDF_STORE_UPDATE_URL:-}
      - RDF_STORE_GRAPH_STORE_URL=${RDF_STORE_GRAPH_STORE_URL:-}
      - RDF_STORE_USER=${RDF_STORE_USER:-}
      - RDF_STORE_PASS=${RDF_STORE_PASS:-}

      - GRAPHDB_URL=${GRAPHDB_URL:-}
      - GRAPHDB_REPO=${GRAPHDB_REPO}
      - GRAPHDB_USER=${GRAPHDB_USER}
      - GRAPHDB_PASS=${GRAPHDB_PASS}

      - RECALL_RDF_QUERY_URL=${RECALL_RDF_QUERY_URL:-}
      - RECALL_RDF_USER=${RECALL_RDF_USER:-}
      - RECALL_RDF_PASS=${RECALL_RDF_PASS:-}

      - RECALL_SQL_CHAT_TABLE=${RECALL_SQL_CHAT_TABLE}
      - RECALL_SQL_CHAT_TEXT_COL=${RECALL_SQL_CHAT_TEXT_COL}
      - RECALL_SQL_CHAT_RESPONSE_COL=${RECALL_SQL_CHAT_RESPONSE_COL}
      - RECALL_SQL_CHAT_CREATED_AT_COL=${RECALL_SQL_CHAT_CREATED_AT_COL}
      - RECALL_SQL_CHAT_ID_COL=${RECALL_SQL_CHAT_ID_COL}
      - RECALL_RDF_CHAT_WINDOW_ENABLED=${RECALL_RDF_CHAT_WINDOW_ENABLED:-true}

      - RECALL_SQL_MIRROR_TABLE=${RECALL_SQL_MIRROR_TABLE}
      - RECALL_SQL_MIRROR_SUMMARY_COL=${RECALL_SQL_MIRROR_SUMMARY_COL}
      - RECALL_SQL_MIRROR_TRIGGER_COL=${RECALL_SQL_MIRROR_TRIGGER_COL}
      - RECALL_SQL_MIRROR_OBSERVER_COL=${RECALL_SQL_MIRROR_OBSERVER_COL}
      - RECALL_SQL_MIRROR_OBSERVER_STATE_COL=${RECALL_SQL_MIRROR_OBSERVER_STATE_COL}
      - RECALL_SQL_MIRROR_FIELD_RESONANCE_COL=${RECALL_SQL_MIRROR_FIELD_RESONANCE_COL}
      - RECALL_SQL_MIRROR_INTENT_COL=${RECALL_SQL_MIRROR_INTENT_COL}
      - RECALL_SQL_MIRROR_TYPE_COL=${RECALL_SQL_MIRROR_TYPE_COL}
      - RECALL_SQL_MIRROR_ENTITY_COL=${RECALL_SQL_MIRROR_ENTITY_COL}
      - RECALL_SQL_MIRROR_MANTRA_COL=${RECALL_SQL_MIRROR_MANTRA_COL}
      - RECALL_SQL_MIRROR_CAUSAL_ECHO_COL=${RECALL_SQL_MIRROR_CAUSAL_ECHO_COL}
      - RECALL_SQL_MIRROR_TS_COL=${RECALL_SQL_MIRROR_TS_COL}

      - RECALL_SQL_ENRICH_TABLE=${RECALL_SQL_ENRICH_TABLE}
      - RECALL_SQL_ENRICH_COLLAPSE_ID_COL=${RECALL_SQL_ENRICH_COLLAPSE_ID_COL}
      - RECALL_SQL_ENRICH_TAGS_COL=${RECALL_SQL_ENRICH_TAGS_COL}
      - RECALL_SQL_ENRICH_ENTITIES_COL=${RECALL_SQL_ENRICH_ENTITIES_COL}
      - RECALL_SQL_ENRICH_SALIENCE_COL=${RECALL_SQL_ENRICH_SALIENCE_COL}
      - RECALL_SQL_ENRICH_TS_COL=${RECALL_SQL_ENRICH_TS_COL}

      - RECALL_VECTOR_BASE_URL=${RECALL_VECTOR_BASE_URL}
      # Leave RECALL_VECTOR_COLLECTIONS empty to default to orion_chat_turns,orion_chat
      - RECALL_VECTOR_COLLECTIONS=${RECALL_VECTOR_COLLECTIONS}
      - RECALL_VECTOR_EMBEDDING_URL=${RECALL_VECTOR_EMBEDDING_URL}
      - RECALL_VECTOR_TIMEOUT_SEC=${RECALL_VECTOR_TIMEOUT_SEC}
      - RECALL_VECTOR_MAX_ITEMS=${RECALL_VECTOR_MAX_ITEMS}
      - RECALL_EXCLUDE_REJECTED=${RECALL_EXCLUDE_REJECTED}
      - RECALL_DURABLE_ONLY=${RECALL_DURABLE_ONLY}
      - RECALL_DEBUG_DUMP_TOP_N=${RECALL_DEBUG_DUMP_TOP_N}
      - RECALL_V2_PAGEINDEX_URL=${RECALL_V2_PAGEINDEX_URL}

      - RECALL_RDF_ENDPOINT_URL=${RECALL_RDF_ENDPOINT_URL}
      - RECALL_RDF_TIMEOUT_SEC=${RECALL_RDF_TIMEOUT_SEC}
      - RECALL_RDF_ENABLE_SUMMARIES=${RECALL_RDF_ENABLE_SUMMARIES}

      # Memory graph SPARQL expansion (optional; default off)
      - RECALL_MEMORY_GRAPH_SPARQL_ENABLED=${RECALL_MEMORY_GRAPH_SPARQL_ENABLED:-false}
      - RECALL_MEMORY_GRAPH_NAMED_GRAPHS=${RECALL_MEMORY_GRAPH_NAMED_GRAPHS}
      - RECALL_MEMORY_GRAPH_SPARQL_TIMEOUT_SEC=${RECALL_MEMORY_GRAPH_SPARQL_TIMEOUT_SEC:-2.0}

      - RECALL_TENSOR_RANKER_ENABLED=${RECALL_TENSOR_RANKER_ENABLED}
      - RECALL_TENSOR_RANKER_MODEL_PATH=${RECALL_TENSOR_RANKER_MODEL_PATH}

      # Graph Compression backend (orion-graph-compression artifacts)
      - RECALL_COMPRESSION_ENABLED=${RECALL_COMPRESSION_ENABLED:-true}
      - RECALL_COMPRESSION_PG_DSN=${RECALL_COMPRESSION_PG_DSN}
      - RECALL_COMPRESSION_RDF_QUERY_URL=${RECALL_COMPRESSION_RDF_QUERY_URL}
      - RECALL_COMPRESSION_RDF_USER=${RECALL_COMPRESSION_RDF_USER}
      - RECALL_COMPRESSION_RDF_PASS=${RECALL_COMPRESSION_RDF_PASS}
      - RECALL_COMPRESSION_TIMEOUT_SEC=${RECALL_COMPRESSION_TIMEOUT_SEC:-3.0}
      - CHANNEL_GRAPH_COMPRESSION_EVENTS=${CHANNEL_GRAPH_COMPRESSION_EVENTS}
      - SCHEMA_COMPRESSION_REGION_V1=${SCHEMA_COMPRESSION_REGION_V1}
      - SCHEMA_GRAPH_COMPRESSION_REGION_MATERIALIZED_V1=${SCHEMA_GRAPH_COMPRESSION_REGION_MATERIALIZED_V1}
      - MESSAGE_KIND_GRAPH_COMPRESSION_REGION_MATERIALIZED=${MESSAGE_KIND_GRAPH_COMPRESSION_REGION_MATERIALIZED}
    volumes:
      - ./app:/app/app
    ports:
      - "${PORT}:${PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["/bin/sh", "-c", "sleep 5 && uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"]

networks:
  app-net:
    external: true

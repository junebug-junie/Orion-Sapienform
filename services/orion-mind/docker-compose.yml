# Load variables from `.env` beside this file (see `.env_example`).
# Run from `services/orion-mind`: docker compose -f docker-compose.yml up --build

services:
  mind:
    build:
      context: ../..
      dockerfile: services/orion-mind/Dockerfile
    container_name: ${PROJECT:-orion}-mind
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: ${SERVICE_NAME:-orion-mind}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      NODE_NAME: ${NODE_NAME:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: ${PORT:-6611}
      MIND_SNAPSHOT_MAX_BYTES: ${MIND_SNAPSHOT_MAX_BYTES:-512000}
      MIND_WALL_MS_DEFAULT: ${MIND_WALL_MS_DEFAULT:-180000}
      MIND_N_LOOPS_DEFAULT: ${MIND_N_LOOPS_DEFAULT:-1}
      MIND_ROUTER_PROFILES_PATH: ${MIND_ROUTER_PROFILES_PATH:-}
      MIND_EVIDENCE_MAX_CHARS: ${MIND_EVIDENCE_MAX_CHARS:-12000}
      MIND_EVIDENCE_MAX_MESSAGES: ${MIND_EVIDENCE_MAX_MESSAGES:-8}
      MIND_EVIDENCE_MAX_RECALL_FRAGMENTS: ${MIND_EVIDENCE_MAX_RECALL_FRAGMENTS:-8}
      MIND_EVIDENCE_MAX_PROJECTION_ITEMS: ${MIND_EVIDENCE_MAX_PROJECTION_ITEMS:-16}
      MIND_LLM_SYNTHESIS_ENABLED: ${MIND_LLM_SYNTHESIS_ENABLED:-false}
      MIND_SEMANTIC_MODEL_ROUTE: ${MIND_SEMANTIC_MODEL_ROUTE:-quick}
      MIND_APPRAISAL_MODEL_ROUTE: ${MIND_APPRAISAL_MODEL_ROUTE:-metacog}
      MIND_STANCE_MODEL_ROUTE: ${MIND_STANCE_MODEL_ROUTE:-chat}
      MIND_LLM_TIMEOUT_SEC: ${MIND_LLM_TIMEOUT_SEC:-60}
      MIND_LLM_MAX_TOKENS_SEMANTIC: ${MIND_LLM_MAX_TOKENS_SEMANTIC:-2048}
      MIND_LLM_MAX_TOKENS_APPRAISAL: ${MIND_LLM_MAX_TOKENS_APPRAISAL:-3072}
      MIND_LLM_MAX_TOKENS_STANCE: ${MIND_LLM_MAX_TOKENS_STANCE:-1536}
      MIND_LLM_THINKING_APPRAISAL: ${MIND_LLM_THINKING_APPRAISAL:-true}
      MIND_LLM_FAIL_OPEN_LEGACY: ${MIND_LLM_FAIL_OPEN_LEGACY:-true}
      MIND_LLM_PHASE_SAFETY_MS: ${MIND_LLM_PHASE_SAFETY_MS:-50}
      MIND_LLM_RETURN_LOGPROBS_SEMANTIC: ${MIND_LLM_RETURN_LOGPROBS_SEMANTIC:-false}
      MIND_LLM_LOGPROB_PROBE_MODE: ${MIND_LLM_LOGPROB_PROBE_MODE:-}
      MIND_LLM_UNCERTAINTY_METACOG_ENABLED: ${MIND_LLM_UNCERTAINTY_METACOG_ENABLED:-false}
      MIND_LLM_USE_BUS: ${MIND_LLM_USE_BUS:-true}
      ORION_BUS_ENABLED: ${ORION_BUS_ENABLED:-true}
      ORION_BUS_URL: ${ORION_BUS_URL:-redis://redis:6379/0}
      MIND_LLM_INTAKE_CHANNEL: ${MIND_LLM_INTAKE_CHANNEL:-orion:exec:request:LLMGatewayService}
      MIND_LLM_REPLY_PREFIX: ${MIND_LLM_REPLY_PREFIX:-orion:mind:llm:reply}
    networks:
      app-net:
        aliases:
          - orion-athena-mind
          - orion-mind
    ports:
      - "${HOST_PORT:-6611}:${PORT:-6611}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf \"http://127.0.0.1:$${PORT:-6611}/health\" >/dev/null || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-net:
    external: true

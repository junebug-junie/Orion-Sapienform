# Verb activation: empty allow lists mean "all discovered verbs except deny".
# dream_cycle is active by default (not denied). Legacy dream_preprocess / dream_simple stay off.
default:
  allow: []
  deny:
    - dream_preprocess
    - dream_simple
nodes:
  athena:
    allow: []
    deny: []
  atlas:
    allow: []
    deny: []

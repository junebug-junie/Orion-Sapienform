services:
  cortex-exec:
    build:
      context: ../..
      dockerfile: services/orion-cortex-exec/Dockerfile
    container_name: ${PROJECT}-cortex-exec
    restart: unless-stopped
    env_file:
      - .env

    #volumes:
    #  - ./services/orion-cortex-exec/app:/app/app

    environment:
      # Cortex-specific settings from .env
      NODE_NAME: ${NODE_NAME}

      SERVICE_NAME: ${SERVICE_NAME}
      SERVICE_VERSION: ${SERVICE_VERSION}

      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC}

      ORION_BUS_URL: ${ORION_BUS_URL}
      ORION_BUS_ENFORCE_CATALOG: ${ORION_BUS_ENFORCE_CATALOG}
      ORION_BUS_ENABLED: ${ORION_BUS_ENABLED}

      CHANNEL_EXEC_REQUEST: ${CHANNEL_EXEC_REQUEST}
      CHANNEL_COGNITION_TRACE_PUB: ${CHANNEL_COGNITION_TRACE_PUB:-orion:cognition:trace}
      CHANNEL_METACOG_TRACE_PUB: ${CHANNEL_METACOG_TRACE_PUB:-orion:metacog:trace}
      EXEC_REQUEST_PREFIX: ${EXEC_REQUEST_PREFIX}
      EXEC_RESULT_PREFIX: ${EXEC_RESULT_PREFIX}
      CORTEX_LOG_CHANNEL: ${CORTEX_LOG_CHANNEL}
      CHANNEL_LLM_INTAKE: ${CHANNEL_LLM_INTAKE}
      CHANNEL_RECALL_INTAKE: ${CHANNEL_RECALL_INTAKE}
      CHANNEL_AGENT_CHAIN_INTAKE: ${CHANNEL_AGENT_CHAIN_INTAKE}
      CHANNEL_PLANNER_INTAKE: ${CHANNEL_PLANNER_INTAKE}
      CHANNEL_COUNCIL_INTAKE: ${CHANNEL_COUNCIL_INTAKE}
      CHANNEL_COUNCIL_REPLY_PREFIX: ${CHANNEL_COUNCIL_REPLY_PREFIX}
      CHANNEL_COLLAPSE_SQL_WRITE: ${CHANNEL_COLLAPSE_SQL_WRITE:-orion:collapse:sql-write}
      CHANNEL_COLLAPSE_INTAKE: ${CHANNEL_COLLAPSE_INTAKE:-orion:collapse:intake}
      CHANNEL_PAD_RPC_REQUEST: ${CHANNEL_PAD_RPC_REQUEST:-orion:pad:rpc:request}
      CHANNEL_STATE_REQUEST: ${CHANNEL_STATE_REQUEST:-orion:state:request}
      CHANNEL_PAD_RPC_REPLY_PREFIX: ${CHANNEL_PAD_RPC_REPLY_PREFIX:-orion:pad:rpc:reply}
      CHANNEL_STATE_REPLY_PREFIX: ${CHANNEL_STATE_REPLY_PREFIX:-orion:state:reply}
      CHANNEL_CORE_EVENTS: ${CHANNEL_CORE_EVENTS:-orion:core:events}
      NOTIFY_URL: ${NOTIFY_URL:-http://orion-notify:7140}
      NOTIFY_API_TOKEN: ${NOTIFY_API_TOKEN}
      ORION_TZ: ${ORION_TZ:-America/Denver}
      SKILLS_COMMAND_TIMEOUT_SEC: ${SKILLS_COMMAND_TIMEOUT_SEC:-8}
      DOCKER_SOCK_PATH: ${DOCKER_SOCK_PATH:-/var/run/docker.sock}
      BIOMETRICS_SERVICE_URL: ${BIOMETRICS_SERVICE_URL:-http://orion-biometrics:8058}
      BIOMETRICS_HTTP_TIMEOUT_SEC: ${BIOMETRICS_HTTP_TIMEOUT_SEC:-5}
      ORION_REPO_ROOT: ${ORION_REPO_ROOT:-}
      CONCEPT_PROFILE_REPOSITORY_BACKEND: ${CONCEPT_PROFILE_REPOSITORY_BACKEND:-local}
      CONCEPT_PROFILE_GRAPHDB_ENDPOINT: ${CONCEPT_PROFILE_GRAPHDB_ENDPOINT:-}
      CONCEPT_PROFILE_GRAPHDB_URL: ${CONCEPT_PROFILE_GRAPHDB_URL:-}
      CONCEPT_PROFILE_GRAPHDB_REPO: ${CONCEPT_PROFILE_GRAPHDB_REPO:-collapse}
      CONCEPT_PROFILE_GRAPHDB_USER: ${CONCEPT_PROFILE_GRAPHDB_USER:-}
      CONCEPT_PROFILE_GRAPHDB_PASS: ${CONCEPT_PROFILE_GRAPHDB_PASS:-}
      CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC: ${CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC:-6}
      CONCEPT_PROFILE_GRAPH_URI: ${CONCEPT_PROFILE_GRAPH_URI:-http://conjourney.net/graph/spark/concept-profile}
      CONCEPT_PROFILE_PARITY_MIN_COMPARISONS: ${CONCEPT_PROFILE_PARITY_MIN_COMPARISONS:-50}
      CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE: ${CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE:-0.05}
      CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE: ${CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE:-0.02}
      CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES: ${CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES:-profile_missing_on_graph,profile_missing_on_local,query_error}
      CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL: ${CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL:-25}

      STEP_TIMEOUT_MS: ${STEP_TIMEOUT_MS}

      PYTHONUNBUFFERED: 1

    networks:
      - app-net

networks:
  app-net:
    external: true

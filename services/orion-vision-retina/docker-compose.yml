services:
  orion-vision-retina:
    build:
      context: ../..
      dockerfile: services/orion-vision-retina/Dockerfile
    container_name: orion-vision-retina
    environment:
      - ORION_BUS_URL=${ORION_BUS_URL:-redis://100.92.216.81:6379/0}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG:-false}
      - CHANNEL_RETINA_PUB=${CHANNEL_RETINA_PUB:-orion:vision:frames}
      - CHANNEL_RETINA_ERROR=${CHANNEL_RETINA_ERROR:-orion:vision:retina:error}
      - CHANNEL_SYSTEM_HEALTH=${CHANNEL_SYSTEM_HEALTH:-orion:system:health}
      - RETINA_SOURCE_TYPE=${RETINA_SOURCE_TYPE:-folder}
      - RETINA_SOURCE=${RETINA_SOURCE:-/mnt/telemetry/vision/intake}
      - RETINA_CAMERA_ID=${RETINA_CAMERA_ID:-retina-cam-01}
      - RETINA_STREAM_ID=${RETINA_STREAM_ID:-retina-stream-01}
      - RETINA_FPS=${RETINA_FPS:-1.0}
      - RETINA_WIDTH=${RETINA_WIDTH:-}
      - RETINA_HEIGHT=${RETINA_HEIGHT:-}
      - FRAME_STORAGE_DIR=${FRAME_STORAGE_DIR:-/mnt/telemetry/vision/frames}
      - FRAME_RETENTION_SECONDS=${FRAME_RETENTION_SECONDS:-300}
      - JPEG_QUALITY=${JPEG_QUALITY:-90}
      - HEALTH_INTERVAL_SECONDS=${HEALTH_INTERVAL_SECONDS:-10.0}
      - SOURCE_RECONNECT_SECONDS=${SOURCE_RECONNECT_SECONDS:-5.0}
    volumes:
      - ./app:/app/app
      - ../../orion:/app/orion
      - /mnt/telemetry/vision/frames:/mnt/telemetry/vision/frames
      - /mnt/telemetry/vision/intake:/mnt/telemetry/vision/intake
    # Optional USB webcam:
    # devices:
    #   - /dev/video0:/dev/video0
    networks:
      - app-net

networks:
  app-net:
    external: true

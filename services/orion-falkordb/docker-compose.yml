# ───────────────────────────────────────────────────────────────
# Orion FalkorDB — shared property-graph operator stack
# ───────────────────────────────────────────────────────────────
# Preferred compose home for the mesh-wide FalkorDB instance.
# Consumers (as of 2026-07-18): orion-graphiti-adapter (graphiti_temporal graph),
# orion-substrate-runtime (orion_substrate graph, live via PR #1153 -- was
# "future" in this comment, now live), orion-spark-concept-induction
# (orion_substrate graph, concept profiles only), orion-meta-tags
# (orion_recall graph, dark by default -- see
# docs/superpowers/plans/2026-07-18-recall-tag-entity-falkor-writer-plan.md).

networks:
  app-net:
    name: ${NET}
    external: true

services:
  falkordb:
    image: ${FALKORDB_IMAGE:-falkordb/falkordb:latest}
    container_name: orion-${NODE_NAME}-falkordb
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${FALKORDB_PORT:-6380}:6379"
    volumes:
      - ${FALKORDB_DATA_DIR:-/mnt/graphdb/falkordb}:/var/lib/falkordb/data

name: show_landing_pad_metrics
label: Show Landing Pad Metrics Snapshot
description: >
  Fetch landing pad service metrics snapshot (ingest/health counters as exposed by landing pad).
  Use when the user asks for "landing pad metrics", "landing pad status numbers", or intake metrics.
  Do NOT use for generic mesh or unrelated runtime housekeeping.
category: ExecutiveControl
priority: medium
interruptible: true
can_interrupt_others: false
requires_gpu: false
requires_memory: false
timeout_ms: 30000
max_recursion_depth: 0
services: []
execution_mode: capability_backed
requires_capability_selector: true
preferred_skill_families:
  - landing_pad_metrics
side_effect_level: none
input_schema:
  type: object
  properties:
    text:
      type: string
  required: [text]
output_schema:
  type: object
  properties:
    selected_verb: { type: string }
    selected_skill_family: { type: string }
    selected_skill: { type: string }
    execution_summary: { type: string }

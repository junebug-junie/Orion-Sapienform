  qwen3-30b-a3b-instruct-2507-q5km-atlas-metacog-16k:
    display_name: "Qwen3 30B A3B Instruct 2507 – Q5_K_M (llama.cpp, Atlas Metacog Lane, 2x V100 16GB, 16k)"
    task_type: chat
    backend: llamacpp
    model_id: "qwen3-30b-a3b-instruct-2507-q5_k_m"

    supports_tools: false
    supports_embeddings: false
    supports_vision: false

    gpu:
      num_gpus: 2
      tensor_parallel_size: 1
      device_ids: [1, 2]
      max_model_len: 16384
      max_batch_tokens: 768
      max_concurrent_requests: 1
      gpu_memory_fraction: 0.90

    llamacpp:
      model_root: "/models/gguf"
      hf_repo_id: "bartowski/Qwen_Qwen3-30B-A3B-Instruct-2507-GGUF"
      hf_filename: "Qwen_Qwen3-30B-A3B-Instruct-2507-Q5_K_M.gguf"
      host: "0.0.0.0"
      port: 8080

      ctx_size: 16384
      n_gpu_layers: 99
      threads: 16
      n_parallel: 1
      batch_size: 768

      no_context_shift: true

      split_mode: "row"
      tensor_split: "1,1"
      flash_attn: "on"

      temperature: 0.35
      top_k: 20
      top_p: 0.90
      min_p: 0.0
      presence_penalty: 0.20

      n_predict: 4096

    notes: |
      Metacog-oriented profile for 2x V100 16GB:
      - instruct variant chosen on purpose for cleaner, more deterministic structured metacog output
      - this model supports only non-thinking mode, so no thinking/template toggle is needed
      - Q5_K_M prioritized over Q4_K_M because metacog runs are episodic and do not need oversized context windows
      - 16k context is intentionally modest to preserve headroom for reasoning quality and stability on the 2x16GB lane
      - lower temperature keeps summaries/extractions tighter and reduces drift
      - single-lane / single-parallel for stable parsed outputs
      - if VRAM is tighter than expected, drop to hf_filename: "Qwen_Qwen3-30B-A3B-Instruct-2507-Q4_K_M.gguf"

  # Qwen3 8B dense — HF: https://huggingface.co/Qwen/Qwen3-8B
  # GGUF: bartowski/Qwen_Qwen3-8B-GGUF — non-thinking mode (enable_thinking: false)
  qwen3-8b-q4km-v100-16gb-balanced:
    display_name: "Qwen3 8B – Q4_K_M (llama.cpp, V100 16GB, 16k ctx, non-thinking)"
    task_type: chat
    backend: llamacpp
    model_id: "qwen3-8b-q4_k_m"

    supports_tools: true
    supports_embeddings: false
    supports_vision: false

    gpu:
      num_gpus: 1
      tensor_parallel_size: 1
      device_ids: [0]
      max_model_len: 16384
      max_batch_tokens: 512
      max_concurrent_requests: 4
      gpu_memory_fraction: 0.88

    llamacpp:
      model_root: "/models/gguf"
      hf_repo_id: "bartowski/Qwen_Qwen3-8B-GGUF"
      hf_filename: "Qwen_Qwen3-8B-Q4_K_M.gguf"
      host: "0.0.0.0"
      port: 8080

      ctx_size: 16384
      n_gpu_layers: 99
      threads: 8
      n_parallel: 4
      batch_size: 512

      chat_template_kwargs:
        enable_thinking: false
      # llama.cpp: --reasoning-budget 0 disables Qwen3 thinking when template kwargs are ignored (newer server)
      reasoning_budget: 0

      # Non-thinking mode sampling (Qwen3 model card)
      temperature: 0.7
      top_k: 20
      top_p: 0.8
      min_p: 0.0
      presence_penalty: 0.0

      n_predict: 8192

      no_context_shift: true

    notes: |
      Balanced profile for Qwen3-8B on one V100 16GB; thinking disabled only for workers using THIS profile key.
      - Scope: each orion-llamacpp-host process loads one LLM_PROFILE_NAME; other profiles/workers are unaffected.
      - Knobs: (1) chat_template_kwargs.enable_thinking false -> --chat-template-kwargs; (2) reasoning_budget 0 -> --reasoning-budget 0 (llama.cpp; use when kwargs alone still leave thinking on).
      - If thinking still appears: check logs for ERROR about missing flags; upgrade pinned llama-server (Dockerfile LLAMACPP_IMAGE_TAG) so --chat-template-kwargs and/or --reasoning-budget appear in llama-server --help.
      - Q4_K_M for VRAM headroom with 16k context split across n_parallel slots (4 x 4k per slot).
      - Gateway does not set enable_thinking per request.
      - For dedicated metacog lane: use qwen3-8b-q5km-v100-16gb-atlas-metacog-16k instead.
      - If OOM: lower ctx_size or use Qwen_Qwen3-8B-Q3_K_M.gguf from the same repo.

  qwen3-8b-q5km-v100-16gb-atlas-metacog-16k:
    display_name: "Qwen3 8B – Q5_K_M (llama.cpp, Atlas Metacog, V100 16GB, 16k single-lane, non-thinking)"
    task_type: chat
    backend: llamacpp
    model_id: "qwen3-8b-q5_k_m"

    supports_tools: false
    supports_embeddings: false
    supports_vision: false

    gpu:
      num_gpus: 1
      tensor_parallel_size: 1
      device_ids: [0]
      max_model_len: 16384
      max_batch_tokens: 512
      max_concurrent_requests: 1
      gpu_memory_fraction: 0.88

    llamacpp:
      model_root: "/models/gguf"
      hf_repo_id: "bartowski/Qwen_Qwen3-8B-GGUF"
      hf_filename: "Qwen_Qwen3-8B-Q5_K_M.gguf"
      host: "0.0.0.0"
      port: 8080

      ctx_size: 16384
      n_gpu_layers: 99
      threads: 8
      n_parallel: 4
      batch_size: 512

      reasoning: "off"
      reasoning_budget: 0

      temperature: 0.35
      top_k: 20
      top_p: 0.90
      min_p: 0.0
      presence_penalty: 0.20

      # 4 parallel slots share ctx_size: 16384 -> 4096 tokens per slot.
      # Cap generation so a single structured-JSON metacog reply cannot overflow
      # its slot (prompt + n_predict must fit in 4096). Appraisal replies are
      # short structured JSON (~200 tokens observed), so 1024 is generous.
      n_predict: 1024

      no_context_shift: true

    notes: |
      Atlas metacog lane on one V100 16GB — optimized for episodic structured JSON (draft + enrich).
      - Q5_K_M (~5.9GB weights): best quality/size tradeoff that still leaves ~6GB for 16k KV + overhead on 16GB.
        Q4_K_M is not the ceiling here; Q6_K (~6.7GB) also fits but gains are marginal for JSON extraction vs latency.
        Q8_0 (~8.7GB) fits but leaves less KV headroom if ctx grows.
      - n_parallel=4 -> 4 concurrent slots, ctx_size 16384 split as 4x4096 per slot
        (llama.cpp --ctx-size is TOTAL across slots). n_predict capped to 1024 so a
        single reply cannot overflow a 4k slot. Set n_parallel=1 + n_predict>=4096
        only if you need full 16k single-lane context per request instead of throughput.
      - gpu.max_concurrent_requests is documentation only; --parallel comes from
        llamacpp.n_parallel (see services/orion-llamacpp-host/app/main.py).
      - Thinking off via llamacpp.reasoning: off (--reasoning off); do not use deprecated enable_thinking kwargs.
      - Lower temperature + presence_penalty mirror qwen3-30b-a3b-instruct-2507-q5km-atlas-metacog-16k tuning.
      - Set ATLAS_METACOG_PROFILE_NAME to this key on atlas-metacog worker.
      - If OOM at boot: drop ctx_size to 8192 before falling back to Q4_K_M (Qwen_Qwen3-8B-Q4_K_M.gguf).


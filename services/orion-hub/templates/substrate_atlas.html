<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orion Hub — Substrate Atlas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css?v=1.0.8" />
</head>
<body class="bg-black text-gray-200 min-h-screen flex flex-col" data-atlas-poll-ms="{{GRAMMAR_ATLAS_POLL_INTERVAL_MS}}">
  <header class="shrink-0 border-b border-gray-800 bg-gray-950/90 px-4 py-3 flex items-center justify-between gap-3">
    <div>
      <h1 class="text-lg font-semibold text-white">Substrate Atlas</h1>
      <p class="text-xs text-gray-500">Grammar trace explorer — layers, dimensions, provenance</p>
    </div>
    <div class="flex items-center gap-2">
      <span id="atlasStatus" class="text-xs text-gray-400">Loading traces…</span>
      <button id="atlasRefreshBtn" type="button" class="px-3 py-1.5 text-xs rounded border border-gray-700 bg-gray-900 hover:bg-gray-800">Refresh</button>
      <a href="/" class="px-3 py-1.5 text-xs rounded border border-gray-700 bg-gray-900 hover:bg-gray-800">Back to Hub</a>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 overflow-hidden">
    <aside class="w-56 shrink-0 border-r border-gray-800 bg-gray-950/60 flex flex-col">
      <div class="px-3 py-2 border-b border-gray-800 text-[10px] uppercase tracking-wide text-gray-500">Traces</div>
      <ul id="atlasTraceList" class="flex-1 overflow-y-auto text-xs divide-y divide-gray-800/80"></ul>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 min-h-0">
      <div id="atlasLayerRail" class="shrink-0 flex flex-wrap gap-1.5 px-3 py-2 border-b border-gray-800 bg-gray-900/40"></div>
      <div id="atlasDimensionBar" class="shrink-0 flex flex-wrap gap-1.5 px-3 py-2 border-b border-gray-800 bg-gray-900/20"></div>

      <div class="flex flex-1 min-h-0">
        <div class="flex-1 flex flex-col min-w-0 min-h-0 p-3">
          <div
            id="grammarAtlasCy"
            class="flex-1 w-full rounded-xl border border-gray-800 bg-gray-950/80"
            style="min-height: 400px;"
          ></div>
        </div>
        <aside
          id="atlasAtomInspector"
          class="w-72 shrink-0 border-l border-gray-800 bg-gray-950/60 overflow-y-auto p-3 text-xs text-gray-300"
        >
          <p class="text-gray-500">Select a node to inspect atom fields and provenance.</p>
        </aside>
      </div>

      <section class="shrink-0 border-t border-gray-800 bg-gray-900/50 px-3 py-2">
        <div class="text-[10px] uppercase tracking-wide text-gray-500 mb-1">Timeline</div>
        <div id="atlasTimeline" class="text-[11px] text-gray-400 font-mono overflow-x-auto whitespace-nowrap min-h-[2rem]"></div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/static/js/substrate-atlas.js?v={{HUB_UI_ASSET_VERSION}}"></script>
</body>
</html>

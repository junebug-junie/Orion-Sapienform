      top_p: 0.95
      min_p: 0.0
      presence_penalty: 1.25

      n_predict: 16384

    notes: |
      Sweet-spot profile for 2x V100 32GB SXM2:
      - Q5_K_M chosen over Q4_K_M to preserve more reasoning quality on a model that is explicitly tuned for thinking
      - 64k context keeps this lane ambitious without getting stupid on KV/cache pressure
      - native long-context model, so no YaRN scaling applied here
      - thinking kept on
      - deepseek reasoning parsing keeps thoughts structured instead of dumping raw reasoning into visible content
      - single-lane / single-parallel for stable long-context reasoning
      - if you want a lighter fallback, use hf_filename: "Qwen_QwQ-32B-Q4_K_M.gguf"



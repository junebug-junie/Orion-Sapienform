services:

  hub-app:
    build:
      context: ../..
      dockerfile: services/orion-hub/Dockerfile
      args:
        INSTALL_DEV_DEPS: ${INSTALL_DEV_DEPS:-true}
    container_name: ${PROJECT}-hub

    # Default deployment posture for Hub:
    # network_mode: "host" means this container resolves hosts through the host network stack.
    # In this mode, Docker service DNS names (e.g. "orion-athena-sql-db") are not valid DB hosts.
    # Use a host-reachable Postgres host in *_POSTGRES_URL / DATABASE_URL
    # (127.0.0.1, LAN IP, Tailscale IP, etc.).
    network_mode: "host"

    # use when on athena:
    #ports:
    #  - "${HUB_PORT}:${HUB_PORT}" # if running brain and hub on single node

    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
      - ../..:/repo:ro
      - ../..:/mnt/scripts/Orion-Sapienform:ro
      - ${HOME}/.fcc:/root/.fcc:ro
      - ${HOME}/.claude.json:/root/.claude.json:ro
      - ${HUB_AGENT_CLAUDE_BIN_HOST:-${HOME}/.local/bin/claude}:/usr/local/bin/claude:ro
      - /var/run/docker.sock:/var/run/docker.sock
      #- /mnt/telemetry/models/whisper/${WHISPER_MODEL_SIZE}:/root/.cache/huggingface/hub/models--distil-whisper--${WHISPER_MODEL_SIZE}
    environment:
      # Core service identity
      - PROJECT=${PROJECT}
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - HUB_PORT=${HUB_PORT}
      - HUB_API_BASE_OVERRIDE=${HUB_API_BASE_OVERRIDE}
      - HUB_WS_BASE_OVERRIDE=${HUB_WS_BASE_OVERRIDE}
      - ORION_REPO_ROOT=${ORION_REPO_ROOT:-/repo}
      - ORION_KNOWLEDGE_ROOT=${ORION_KNOWLEDGE_ROOT:-/repo/orion-knowledge}

      # Whisper + Brain
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE}

      # Orion Bus
      - ORION_BUS_URL=${ORION_BUS_URL:-${ORION_BUS_URL}}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - BIOMETRICS_ENABLED=${BIOMETRICS_ENABLED}
      - BIOMETRICS_STALE_AFTER_SEC=${BIOMETRICS_STALE_AFTER_SEC}
      - BIOMETRICS_NO_SIGNAL_AFTER_SEC=${BIOMETRICS_NO_SIGNAL_AFTER_SEC}
      - BIOMETRICS_ROLE_WEIGHTS_JSON=${BIOMETRICS_ROLE_WEIGHTS_JSON}
      - BIOMETRICS_PUSH_INTERVAL_SEC=${BIOMETRICS_PUSH_INTERVAL_SEC}
      - NOTIFY_IN_APP_ENABLED=${NOTIFY_IN_APP_ENABLED}
      - NOTIFY_IN_APP_CHANNEL=${NOTIFY_IN_APP_CHANNEL}
      - NOTIFY_IN_APP_MAX=${NOTIFY_IN_APP_MAX}
      - NOTIFY_TOAST_SECONDS=${NOTIFY_TOAST_SECONDS}
      - NOTIFY_BASE_URL=${NOTIFY_BASE_URL}
      - NOTIFY_API_TOKEN=${NOTIFY_API_TOKEN}
      - COGNITION_TRACE_CACHE_ENABLED=${COGNITION_TRACE_CACHE_ENABLED:-true}
      - COGNITION_TRACE_CACHE_MAX=${COGNITION_TRACE_CACHE_MAX:-200}
      - COGNITION_TRACE_CACHE_TTL_SEC=${COGNITION_TRACE_CACHE_TTL_SEC:-300}
      - COGNITION_TRACE_SUBSCRIBE_CHANNEL=${COGNITION_TRACE_SUBSCRIBE_CHANNEL:-orion:cognition:trace}
      - COGNITION_TRACE_API_DEBUG=${COGNITION_TRACE_API_DEBUG:-false}
      - LANDING_PAD_URL=${LANDING_PAD_URL}
      - LANDING_PAD_TIMEOUT_SEC=${LANDING_PAD_TIMEOUT_SEC}
      - TOPIC_FOUNDRY_BASE_URL=${TOPIC_FOUNDRY_BASE_URL}
      - WORLD_PULSE_BASE_URL=${WORLD_PULSE_BASE_URL}
      - WORLD_PULSE_PROXY_TIMEOUT_SEC=${WORLD_PULSE_PROXY_TIMEOUT_SEC:-10}
      - WORLD_PULSE_UI_FIXTURE_RUN_ENABLED=${WORLD_PULSE_UI_FIXTURE_RUN_ENABLED:-false}
      - KNOWLEDGE_FORGE_BASE_URL=${KNOWLEDGE_FORGE_BASE_URL:-http://127.0.0.1:8630}
      - KNOWLEDGE_FORGE_PROXY_TIMEOUT_SEC=${KNOWLEDGE_FORGE_PROXY_TIMEOUT_SEC:-15}
      - HUB_PROPOSAL_REVIEW_ENABLED=${HUB_PROPOSAL_REVIEW_ENABLED:-false}
      - HUB_PROPOSAL_REVIEW_API_URL=${HUB_PROPOSAL_REVIEW_API_URL:-http://orion-context-exec:8096}
      - HUB_PROPOSAL_REVIEW_TIMEOUT_SEC=${HUB_PROPOSAL_REVIEW_TIMEOUT_SEC:-10}
      - HUB_LLM_GATEWAY_URL=${HUB_LLM_GATEWAY_URL:-http://orion-llm-gateway:8210}
      - HUB_LLM_GATEWAY_TIMEOUT_SEC=${HUB_LLM_GATEWAY_TIMEOUT_SEC:-5}
      - HUB_AGENT_CONTEXT_EXEC_ENABLED=${HUB_AGENT_CONTEXT_EXEC_ENABLED:-true}
      - HUB_CONTEXT_EXEC_API_URL=${HUB_CONTEXT_EXEC_API_URL:-http://orion-context-exec:8096}
      - HUB_CONTEXT_EXEC_TIMEOUT_SEC=${HUB_CONTEXT_EXEC_TIMEOUT_SEC:-600}
      - HUB_AGENT_REPL_ENABLED=${HUB_AGENT_REPL_ENABLED:-true}
      - HUB_AGENT_CLAUDE_ENABLED=${HUB_AGENT_CLAUDE_ENABLED:-false}
      - HUB_FCC_ENV_PATH=/root/.fcc/.env
      - HUB_FCC_SERVER_URL=${HUB_FCC_SERVER_URL:-http://127.0.0.1:8082}
      - HUB_FCC_AUTH_TOKEN=${HUB_FCC_AUTH_TOKEN:-}
      - HUB_AGENT_CLAUDE_BIN=claude
      - HUB_AGENT_CLAUDE_WORKSPACE=/mnt/scripts/Orion-Sapienform
      - HUB_AGENT_CLAUDE_TIMEOUT_SEC=${HUB_AGENT_CLAUDE_TIMEOUT_SEC:-900}
      - HUB_AGENT_CLAUDE_MAX_CONCURRENT=${HUB_AGENT_CLAUDE_MAX_CONCURRENT:-1}
      - HUB_AGENT_CLAUDE_STREAM_READ_LIMIT=${HUB_AGENT_CLAUDE_STREAM_READ_LIMIT:-8388608}
      - HUB_AGENT_CLAUDE_MAX_CONTEXT_TOKENS=${HUB_AGENT_CLAUDE_MAX_CONTEXT_TOKENS:-65536}
      - HUB_AGENT_CLAUDE_FILE_READ_MAX_TOKENS=${HUB_AGENT_CLAUDE_FILE_READ_MAX_TOKENS:-8192}
      - HUB_AGENT_CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=${HUB_AGENT_CLAUDE_AUTOCOMPACT_PCT_OVERRIDE:-70}
      - HUB_CONTEXT_EXEC_EVENT_CHANNEL=${HUB_CONTEXT_EXEC_EVENT_CHANNEL:-orion:context_exec:event}
      - CONTEXT_EXEC_INVESTIGATION_V2_ENABLED=${CONTEXT_EXEC_INVESTIGATION_V2_ENABLED:-false}
      - SUBSTRATE_TELEMETRY_BASE_URL=${SUBSTRATE_TELEMETRY_BASE_URL:-}
      - SUBSTRATE_TELEMETRY_READ_TOKEN=${SUBSTRATE_TELEMETRY_READ_TOKEN:-}
      - SOCIAL_MEMORY_BASE_URL=${SOCIAL_MEMORY_BASE_URL}
      - SELF_EXPERIMENTS_BASE_URL=${SELF_EXPERIMENTS_BASE_URL}
      - SELF_EXPERIMENTS_TIMEOUT_SEC=${SELF_EXPERIMENTS_TIMEOUT_SEC:-6}

      # New Titanium Channels
      - CORTEX_GATEWAY_REQUEST_CHANNEL=${CORTEX_GATEWAY_REQUEST_CHANNEL:-orion-cortex-gateway:request}
      - CORTEX_GATEWAY_RESULT_PREFIX=${CORTEX_GATEWAY_RESULT_PREFIX:-orion-cortex-gateway:result}
      - TTS_REQUEST_CHANNEL=${TTS_REQUEST_CHANNEL:-orion:tts:intake}
      - TTS_RESULT_PREFIX=${TTS_RESULT_PREFIX:-orion:tts:result}
      - STT_REQUEST_CHANNEL=${STT_REQUEST_CHANNEL:-orion:stt:intake}
      - STT_RESULT_PREFIX=${STT_RESULT_PREFIX:-orion:stt:result}

      # LLM Gateway (Legacy)
      - CHANNEL_LLM_INTAKE=${CHANNEL_LLM_INTAKE}
      - CHANNEL_LLM_REPLY_PREFIX=${CHANNEL_LLM_REPLY_PREFIX}

      # Channels
      - CHANNEL_VOICE_TRANSCRIPT=${CHANNEL_VOICE_TRANSCRIPT}
      - CHANNEL_VOICE_LLM=${CHANNEL_VOICE_LLM}
      - CHANNEL_VOICE_TTS=${CHANNEL_VOICE_TTS}
      - CHANNEL_TTS_INTAKE=${CHANNEL_TTS_INTAKE}
      - CHANNEL_COLLAPSE_INTAKE=${CHANNEL_COLLAPSE_INTAKE}
      - CHANNEL_COLLAPSE_TRIAGE=${CHANNEL_COLLAPSE_TRIAGE}

      - CHAT_HISTORY_LOG_CHANNEL=${CHAT_HISTORY_LOG_CHANNEL:-${CHANNEL_CHAT_HISTORY_LOG}}
      - CHANNEL_CHAT_HISTORY_LOG=${CHANNEL_CHAT_HISTORY_LOG}

      # --- Agent Council integration (Legacy) ---
      - CHANNEL_COUNCIL_INTAKE=${CHANNEL_COUNCIL_INTAKE}
      - CHANNEL_COUNCIL_REPLY_PREFIX=${CHANNEL_COUNCIL_REPLY_PREFIX}

      # --- Cortex Orchestrator integration (Legacy) ---
      - CORTEX_REQUEST_CHANNEL=${CORTEX_REQUEST_CHANNEL}
      - CORTEX_RESULT_PREFIX=${CORTEX_RESULT_PREFIX}

      - AGENT_CHAIN_REQUEST_CHANNEL=${AGENT_CHAIN_REQUEST_CHANNEL}
      - AGENT_CHAIN_RESULT_PREFIX=${AGENT_CHAIN_RESULT_PREFIX}

      # --- Recall / RAG integration (Legacy) ---
      - CHANNEL_RECALL_REQUEST=${CHANNEL_RECALL_REQUEST}
      - CHANNEL_RECALL_DEFAULT_REPLY_PREFIX=${CHANNEL_RECALL_DEFAULT_REPLY_PREFIX}
      - RECALL_DEFAULT_MAX_ITEMS=${RECALL_DEFAULT_MAX_ITEMS}
      - RECALL_DEFAULT_TIME_WINDOW_DAYS=${RECALL_DEFAULT_TIME_WINDOW_DAYS}
      - RECALL_DEFAULT_MODE=${RECALL_DEFAULT_MODE}
      - RECALL_PG_DSN=${RECALL_PG_DSN:-}
      - GRAPHITI_ENABLED=${GRAPHITI_ENABLED:-false}
      - GRAPHITI_URL=${GRAPHITI_URL:-}
      - FALKORDB_URI=${FALKORDB_URI:-}
      - CRYSTALLIZER_VECTOR_COLLECTION=${CRYSTALLIZER_VECTOR_COLLECTION:-orion_memory_crystallizations}
      - CRYSTALLIZER_EMBED_HOST_URL=${CRYSTALLIZER_EMBED_HOST_URL:-}
      - CRYSTALLIZER_EMBED_MODE=${CRYSTALLIZER_EMBED_MODE:-http}
      - CRYSTALLIZER_EMBED_TIMEOUT_MS=${CRYSTALLIZER_EMBED_TIMEOUT_MS:-8000}
      - CRYSTALLIZER_AUTO_PROJECT_ON_APPROVE=${CRYSTALLIZER_AUTO_PROJECT_ON_APPROVE:-true}
      - CHROMA_HOST=${CHROMA_HOST:-}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - GRAPHITI_ADAPTER_URL=${GRAPHITI_ADAPTER_URL:-}

      # --- Runtimes ---
      - TIMEOUT_SEC=${TIMEOUT_SEC}
      - HUB_STT_TIMEOUT_SEC=${HUB_STT_TIMEOUT_SEC:-120}
      - HUB_TTS_TIMEOUT_SEC=${HUB_TTS_TIMEOUT_SEC:-180}
      - NVIDIA_VISIBLE_DEVICES=all

      # --- Hub Prompt Context (UI-side rolling history) ---
      - HUB_CONTEXT_TURNS=${HUB_CONTEXT_TURNS}
      - HUB_CONTEXT_MAX_CHARS=${HUB_CONTEXT_MAX_CHARS}
      - HUB_DEBUG_RECALL=${HUB_DEBUG_RECALL}
      - HUB_DEBUG_COUNCIL=${HUB_DEBUG_COUNCIL}
      - HUB_SOCIAL_SKILLS_ENABLED=${HUB_SOCIAL_SKILLS_ENABLED}
      - HUB_SOCIAL_SKILLS_ALLOWLIST=${HUB_SOCIAL_SKILLS_ALLOWLIST}
      - HUB_SOCIAL_STYLE_ADAPTATION_ENABLED=${HUB_SOCIAL_STYLE_ADAPTATION_ENABLED}
      - HUB_SOCIAL_ROOM_RITUALS_ENABLED=${HUB_SOCIAL_ROOM_RITUALS_ENABLED}
      - HUB_SOCIAL_STYLE_CONFIDENCE_FLOOR=${HUB_SOCIAL_STYLE_CONFIDENCE_FLOOR}
      - HUB_SOCIAL_ROOM_REDACTION_POSTURE=${HUB_SOCIAL_ROOM_REDACTION_POSTURE}
      - ORION_SITUATION_ENABLED=${ORION_SITUATION_ENABLED:-true}
      - ORION_SITUATION_TTL_SECONDS=${ORION_SITUATION_TTL_SECONDS:-300}
      - ORION_SITUATION_TIMEZONE=${ORION_SITUATION_TIMEZONE:-America/Denver}
      - ORION_SITUATION_WEATHER_PROVIDER=${ORION_SITUATION_WEATHER_PROVIDER:-stub}
      - HUB_DEFAULT_NO_WRITE=${HUB_DEFAULT_NO_WRITE}
      - HUB_AUTO_DEFAULT_ENABLED=${HUB_AUTO_DEFAULT_ENABLED}
      - HUB_AUTONOMY_SUBJECT_DISPLAY=${HUB_AUTONOMY_SUBJECT_DISPLAY:-two}
      - AUTONOMY_GOAL_EXECUTION_ENABLED=${AUTONOMY_GOAL_EXECUTION_ENABLED:-false}
      - HUB_DOCKER_NETWORK_MODE=${HUB_DOCKER_NETWORK_MODE:-host}
      # Control-plane Postgres precedence in Hub:
      # SUBSTRATE_CONTROL_PLANE_POSTGRES_URL -> SUBSTRATE_POLICY_POSTGRES_URL -> DATABASE_URL
      - DATABASE_URL=${DATABASE_URL}
      - GRAMMAR_ATLAS_ENABLED=${GRAMMAR_ATLAS_ENABLED:-true}
      - GRAMMAR_ATLAS_POLL_INTERVAL_MS=${GRAMMAR_ATLAS_POLL_INTERVAL_MS:-3000}
      - GRAMMAR_ATLAS_POSTGRES_URI=${GRAMMAR_ATLAS_POSTGRES_URI:-}
      - SUBSTRATE_LATTICE_FRESHNESS_THRESHOLD_SEC=${SUBSTRATE_LATTICE_FRESHNESS_THRESHOLD_SEC:-60}
      - SUBSTRATE_CONTROL_PLANE_POSTGRES_URL=${SUBSTRATE_CONTROL_PLANE_POSTGRES_URL}
      - SUBSTRATE_POLICY_POSTGRES_URL=${SUBSTRATE_POLICY_POSTGRES_URL}
      - SUBSTRATE_REVIEW_QUEUE_SQL_DB_PATH=${SUBSTRATE_REVIEW_QUEUE_SQL_DB_PATH}
      - SUBSTRATE_REVIEW_TELEMETRY_SQL_DB_PATH=${SUBSTRATE_REVIEW_TELEMETRY_SQL_DB_PATH:-}
      - SUBSTRATE_AUTONOMY_ENABLED=${SUBSTRATE_AUTONOMY_ENABLED:-false}
      - SUBSTRATE_AUTONOMY_PROPOSALS_ENABLED=${SUBSTRATE_AUTONOMY_PROPOSALS_ENABLED:-true}
      - SUBSTRATE_AUTONOMY_APPLY_ENABLED=${SUBSTRATE_AUTONOMY_APPLY_ENABLED:-false}
      - SUBSTRATE_AUTONOMY_MONITOR_ENABLED=${SUBSTRATE_AUTONOMY_MONITOR_ENABLED:-true}
      - SUBSTRATE_AUTONOMY_ROUTING_PROPOSALS_ENABLED=${SUBSTRATE_AUTONOMY_ROUTING_PROPOSALS_ENABLED:-true}
      - SUBSTRATE_AUTONOMY_COGNITIVE_PROPOSALS_ENABLED=${SUBSTRATE_AUTONOMY_COGNITIVE_PROPOSALS_ENABLED:-false}
      - SUBSTRATE_AUTONOMY_ROUTING_APPLY_ENABLED=${SUBSTRATE_AUTONOMY_ROUTING_APPLY_ENABLED:-false}
      - SUBSTRATE_AUTONOMY_ROUTING_ROLLBACK_DELTA_THRESHOLD=${SUBSTRATE_AUTONOMY_ROUTING_ROLLBACK_DELTA_THRESHOLD:--0.05}
      - SUBSTRATE_AUTONOMY_INTERVAL_SEC=${SUBSTRATE_AUTONOMY_INTERVAL_SEC:-30}
      - SUBSTRATE_AUTONOMY_SELF_REVISION_ENABLED=${SUBSTRATE_AUTONOMY_SELF_REVISION_ENABLED:-false}
      - SUBSTRATE_AUTONOMY_SELF_REVISION_MIN_ERROR=${SUBSTRATE_AUTONOMY_SELF_REVISION_MIN_ERROR:-0.3}
      - SUBSTRATE_AUTONOMY_SELF_REVISION_MAX_AGE_SEC=${SUBSTRATE_AUTONOMY_SELF_REVISION_MAX_AGE_SEC:-300}
      - SUBSTRATE_MUTATION_RETENTION_MAX_BLOCKED_APPLIES=${SUBSTRATE_MUTATION_RETENTION_MAX_BLOCKED_APPLIES:-500}
      - SUBSTRATE_MUTATION_RETENTION_MAX_ROLLBACKS=${SUBSTRATE_MUTATION_RETENTION_MAX_ROLLBACKS:-500}
      - SUBSTRATE_MUTATION_CONTROL_SQL_DB_PATH=${SUBSTRATE_MUTATION_CONTROL_SQL_DB_PATH:-}
      - SUBSTRATE_MUTATION_OPERATOR_TOKEN=${SUBSTRATE_MUTATION_OPERATOR_TOKEN:-}
      # Substrate semantic store: default sparql (Fuseki). graphdb = legacy; in_memory via explicit .env.
      - GRAPH_BACKEND=${GRAPH_BACKEND:-fuseki}
      - RDF_STORE_BACKEND=${RDF_STORE_BACKEND:-fuseki}
      - RDF_STORE_BASE_URL=${RDF_STORE_BASE_URL:-}
      - RDF_STORE_DATASET=${RDF_STORE_DATASET:-orion}
      - RDF_STORE_QUERY_URL=${RDF_STORE_QUERY_URL:-}
      - RDF_STORE_GRAPH_STORE_URL=${RDF_STORE_GRAPH_STORE_URL:-}
      - RDF_STORE_UPDATE_URL=${RDF_STORE_UPDATE_URL:-}
      - RDF_STORE_USER=${RDF_STORE_USER:-admin}
      - RDF_STORE_PASS=${RDF_STORE_PASS:-admin}
      - FUSEKI_USER=${FUSEKI_USER:-}
      - FUSEKI_PASS=${FUSEKI_PASS:-}
      - MEMORY_GRAPH_APPROVAL_BACKEND=${MEMORY_GRAPH_APPROVAL_BACKEND:-auto}
      - MEMORY_GRAPH_DEFAULT_NAMED_GRAPH=${MEMORY_GRAPH_DEFAULT_NAMED_GRAPH:-}
      - MEMORY_GRAPH_SUGGEST_PRIMARY_ROUTE=${MEMORY_GRAPH_SUGGEST_PRIMARY_ROUTE:-quick}
      - MEMORY_GRAPH_SUGGEST_ESCALATION_ROUTE=${MEMORY_GRAPH_SUGGEST_ESCALATION_ROUTE:-brain}
      - MEMORY_GRAPH_SUGGEST_ENABLE_ESCALATION=${MEMORY_GRAPH_SUGGEST_ENABLE_ESCALATION:-true}
      - MEMORY_GRAPH_SUGGEST_INCLUDE_GROUNDING=${MEMORY_GRAPH_SUGGEST_INCLUDE_GROUNDING:-true}
      - MEMORY_GRAPH_SUGGEST_VERB_TIMEOUT_MS=${MEMORY_GRAPH_SUGGEST_VERB_TIMEOUT_MS:-180000}
      - MEMORY_GRAPH_SUGGEST_BRAIN_TIMEOUT_SEC=${MEMORY_GRAPH_SUGGEST_BRAIN_TIMEOUT_SEC:-0}
      - MEMORY_GRAPH_SUGGEST_QUICK_TIMEOUT_SEC=${MEMORY_GRAPH_SUGGEST_QUICK_TIMEOUT_SEC:-0}
      - MEMORY_GRAPH_SUGGEST_STRUCTURED_OUTPUT_METHOD=${MEMORY_GRAPH_SUGGEST_STRUCTURED_OUTPUT_METHOD:-json_object_schema}
      - MEMORY_GRAPH_SUGGEST_MAX_TOKENS=${MEMORY_GRAPH_SUGGEST_MAX_TOKENS:-4096}
      - GDB_CLIENT_ENABLED=${GDB_CLIENT_ENABLED:-false}
      - SUBSTRATE_STORE_BACKEND=${SUBSTRATE_STORE_BACKEND:-sparql}
      - SUBSTRATE_GRAPH_QUERY_URL=${SUBSTRATE_GRAPH_QUERY_URL:-http://orion-athena-fuseki:3030/orion/query}
      - SUBSTRATE_GRAPH_UPDATE_URL=${SUBSTRATE_GRAPH_UPDATE_URL:-http://orion-athena-fuseki:3030/orion/update}
      - SUBSTRATE_GRAPH_URI=${SUBSTRATE_GRAPH_URI:-http://conjourney.net/graph/substrate}
      - SUBSTRATE_GRAPH_TIMEOUT_SEC=${SUBSTRATE_GRAPH_TIMEOUT_SEC:-5.0}
      - SUBSTRATE_GRAPH_USER=${SUBSTRATE_GRAPH_USER:-}
      - SUBSTRATE_GRAPH_PASS=${SUBSTRATE_GRAPH_PASS:-}
      - SUBSTRATE_GRAPHDB_ENDPOINT=${SUBSTRATE_GRAPHDB_ENDPOINT:-}
      - GRAPHDB_URL=${GRAPHDB_URL:-}
      - GRAPHDB_REPO=${GRAPHDB_REPO:-}
      - AUTONOMY_GRAPH_QUERY_URL=${AUTONOMY_GRAPH_QUERY_URL:-}
      - AUTONOMY_GRAPH_UPDATE_URL=${AUTONOMY_GRAPH_UPDATE_URL:-}
      - AUTONOMY_GRAPH_TIMEOUT_SEC=${AUTONOMY_GRAPH_TIMEOUT_SEC:-30}
      - SUBSTRATE_GRAPHDB_GRAPH_URI=${SUBSTRATE_GRAPHDB_GRAPH_URI:-http://conjourney.net/graph/orion/substrate}
      - SUBSTRATE_GRAPHDB_TIMEOUT_SEC=${SUBSTRATE_GRAPHDB_TIMEOUT_SEC:-5.0}
      - SUBSTRATE_GRAPHDB_USER=${SUBSTRATE_GRAPHDB_USER:-}
      - SUBSTRATE_GRAPHDB_PASS=${SUBSTRATE_GRAPHDB_PASS:-}

    runtime: nvidia

    # if running on athena:
    #networks:
    #  - ${NET}

  # Optional: start Knowledge Forge alongside Hub (host-network Hub reaches it via 127.0.0.1:8630).
  orion-knowledge-forge:
    profiles:
      - knowledge-forge
    build:
      context: ../..
      dockerfile: services/orion-knowledge-forge/Dockerfile
    container_name: orion-knowledge-forge
    env_file:
      - path: ../orion-knowledge-forge/.env
        required: false
    environment:
      ORION_KNOWLEDGE_ROOT: ${ORION_KNOWLEDGE_ROOT:-/repo/orion-knowledge}
      KNOWLEDGE_FORGE_REPO_ROOT: ${ORION_KNOWLEDGE_ROOT:-/repo/orion-knowledge}
    volumes:
      - ../..:/repo:ro
    ports:
      - "8630:8630"
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    external: true

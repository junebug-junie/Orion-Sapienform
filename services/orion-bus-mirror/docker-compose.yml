services:
  orion-bus-mirror:
    build:
      context: ../..
      dockerfile: services/orion-bus-mirror/Dockerfile
    container_name: ${PROJECT:-orion}-bus-mirror
    env_file:
      - .env
    environment:
      ORION_BUS_URL: ${ORION_BUS_URL}
      ORION_BUS_ENFORCE_CATALOG: ${ORION_BUS_ENFORCE_CATALOG:-true}
      ORION_BUS_VELOCITY_TRACKING_ENABLED: ${ORION_BUS_VELOCITY_TRACKING_ENABLED:-false}
      MIRROR_PATTERN: ${MIRROR_PATTERN:-orion:*}
      MIRROR_SQLITE_PATH: ${MIRROR_SQLITE_PATH:-/data/bus_mirror.sqlite}
      MIRROR_PARQUET_DIR: ${MIRROR_PARQUET_DIR:-/data/parquet}
      MIRROR_GRAPH_ENABLED: ${MIRROR_GRAPH_ENABLED:-false}
      FALKORDB_URI: ${FALKORDB_URI:-redis://orion-athena-falkordb:6379}
      FALKORDB_BUS_GRAPH: ${FALKORDB_BUS_GRAPH:-orion_bus_synapse}
      MIRROR_GRAPH_CHAIN_TTL_SEC: ${MIRROR_GRAPH_CHAIN_TTL_SEC:-120}
      MIRROR_GRAPH_EWMA_ALPHA: ${MIRROR_GRAPH_EWMA_ALPHA:-0.2}
      MIRROR_GRAPH_INFLIGHT_LOG_INTERVAL_SEC: ${MIRROR_GRAPH_INFLIGHT_LOG_INTERVAL_SEC:-30}
      MIRROR_GRAPH_LONG_RUNNING_THRESHOLD_SEC: ${MIRROR_GRAPH_LONG_RUNNING_THRESHOLD_SEC:-30}
      MIRROR_GRAPH_MAX_VERB_STEPS: ${MIRROR_GRAPH_MAX_VERB_STEPS:-200}
    volumes:
      - "${MIRROR_DATA_DIR:-./data}:/data"
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    external: true

name: chat_general
label: Chat (Generalist)
description: >
  General-purpose identity-aware chat verb for Oríon + Juniper.
  Handles technical questions, architecture, planning, and reflective
  conversation using a single LLM engine via LLMGatewayService, while
  preserving stable Orion identity and Juniper relationship context.

category: ExecutiveControl
priority: medium

interruptible: true
can_interrupt_others: false

requires_gpu: true
requires_memory: true

recall_profile: chat.general.v1

timeout_ms: 300000
max_recursion_depth: 0

services:
  - LLMGatewayService

prompt_template: chat_general.j2

personality_file: orion/cognition/personality/orion_identity.yaml

plan:
  - name: llm_chat_general
    description: >
      Single-step, identity-aware generalist chat response that:
      - interprets intent from recent thread context,
      - preserves Juniper/Oríon continuity,
      - answers directly in the appropriate mode,
      - and generates one final user-facing reply.
    order: 0
    prompt_template: chat_general.j2
    services:
      - LLMGatewayService
    requires_gpu: true
    requires_memory: true

safety_rules: []

services:
  sql-writer:
    build:
      context: ../..
      dockerfile: services/orion-sql-writer/Dockerfile
    container_name: ${PROJECT}-sql-writer
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - /mnt/storage-lukewarm/sql_logs:/app/logs
      # Postgres is external; removing SQLite volume mapping to avoid confusion
    environment:
      - PROJECT=${PROJECT}
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - NODE_NAME=${NODE_NAME}
      - PORT=${PORT}

      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED}
      - ORION_BUS_ENFORCE_CATALOG=${ORION_BUS_ENFORCE_CATALOG}
      - ORION_BUS_URL=${ORION_BUS_URL}

      # Include notify persistence + ChatGPT turn log channels when overriding defaults.
      - SQL_WRITER_SUBSCRIBE_CHANNELS=${SQL_WRITER_SUBSCRIBE_CHANNELS:-["orion:tags:enriched","orion:collapse:sql-write","orion:chat:history:log","orion:chat:history:turn","orion:chat:social:turn","orion:chat:response:feedback","orion:bridge:social:room:intake","orion:bridge:social:room:delivery","orion:bridge:social:room:skipped","orion:bridge:social:participant","orion:chat:gpt:log","orion:chat:gpt:turn","orion:chat:gpt:message:log","orion:chat:gpt:import:run","orion:chat:gpt:conversation","orion:chat:gpt:example","orion:dream:log","orion:telemetry:biometrics","orion:biometrics:summary","orion:biometrics:induction","orion:spark:telemetry","orion:cognition:trace","orion:metacognition:tick","orion:metacog:trace","orion:equilibrium:metacog:trigger","orion:notify:persistence:request","orion:notify:persistence:receipt","orion:journal:write","orion:journal:index","orion:evidence:index:upsert","orion:evidence:markdown:ingest","orion:evidence:parsed:ingest","orion:endogenous:runtime:record","orion:endogenous:runtime:audit","orion:calibration:profile:audit"]}
      - SQL_WRITER_ENABLE_SPARK_SNAPSHOT_CHANNEL=${SQL_WRITER_ENABLE_SPARK_SNAPSHOT_CHANNEL}
      - SQL_WRITER_ROUTE_MAP_JSON=${SQL_WRITER_ROUTE_MAP_JSON}
      - SQL_WRITER_EMIT_JOURNAL_CREATED=${SQL_WRITER_EMIT_JOURNAL_CREATED}
      - SQL_WRITER_JOURNAL_CREATED_CHANNEL=${SQL_WRITER_JOURNAL_CREATED_CHANNEL}
      - SQL_WRITER_EMIT_SOCIAL_TURN_STORED=${SQL_WRITER_EMIT_SOCIAL_TURN_STORED}
      - SQL_WRITER_SOCIAL_TURN_STORED_CHANNEL=${SQL_WRITER_SOCIAL_TURN_STORED_CHANNEL}
      - SPARK_LEGACY_MODE=${SPARK_LEGACY_MODE}
      - METACOG_TRACE_RETENTION_DAYS=${METACOG_TRACE_RETENTION_DAYS:-14}

      - DATABASE_URL=${DATABASE_URL}
      # POSTGRES_URI removed as redundant/conflict

networks:
  app-net:
    name: ${NET}
    external: true

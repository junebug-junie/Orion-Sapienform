# ───────────────────────────────────────────────────────────────
# 🐘 Orion SQL DB — PostgreSQL Database + pgAdmin Client
# ───────────────────────────────────────────────────────────────

services:
  orion-sql-db:
    image: postgres:15
    container_name: ${PROJECT}-sql-db
    shm_size: '1gb'
    # Cap RSS so runaway autovacuum/TOAST work cannot freeze the host (346Gi).
    # 16g is enough for normal ops; 48g let TOAST vacuum thrash disk for minutes per OOM cycle.
    mem_limit: ${POSTGRES_MEM_LIMIT:-16g}
    memswap_limit: ${POSTGRES_MEM_LIMIT:-16g}
    restart: unless-stopped
    # Bound vacuum memory so a single worker cannot pin the cgroup before the cap trips.
    command:
      - postgres
      - -c
      - autovacuum_work_mem=256MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - max_parallel_maintenance_workers=1
      - -c
      - vacuum_cost_delay=2ms
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - "${VOLUMES_ORION_POSTGRES_PATH}"
    networks:
      - app-net
    ports:
      - "${POSTGRES_PORT:-55432}:5432"

  orion-sql-client:
    image: dpage/pgadmin4:8
    container_name: ${PROJECT}-sql-client
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - orion-sql-db
    networks:
      - app-net

networks:
  app-net:
    name: ${NET}
    external: true

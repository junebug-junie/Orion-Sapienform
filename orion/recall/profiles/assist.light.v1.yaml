profile: assist.light.v1
# Low-latency lane: vector_top_k=0 disables all vector/Chroma recall (see source_policy.recall_vector_allowed).
# render_transcript_user_only still applies to transcript-shaped sql_chat rows if that backend is enabled.
render_transcript_user_only: true
vector_top_k: 0
rdf_top_k: 0
max_per_source: 3
max_total_items: 8
time_decay_half_life_hours: 24
render_budget_tokens: 180
enable_query_expansion: true
enable_sql_timeline: false
relevance:
  backend_weights:
    vector: 1.0
    sql_timeline: 0.85
    sql_chat: 0.6
    rdf_chat: 0.4
    rdf: 0.3
  score_weight: 0.75
  text_similarity_weight: 0.1
  recency_weight: 0.05
  enable_recency: false
  recency_half_life_hours: 24

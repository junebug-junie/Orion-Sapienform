# Mesh: skills.mesh.tailscale_mesh_status.v1 runs inside this container. The image does not ship
# `tailscale`. Bind-mounts below pull the HOST CLI + tailscaled socket so Agent/Hub mesh works after
# a normal `docker compose up` (no extra -f file). Override ORION_HOST_TAILSCALE_BIN if yours is
# e.g. /usr/sbin/tailscale. If the host has no Tailscale, `up` may fail on the bind — install it or
# comment these volumes for dev-only nodes.
services:
  cortex-exec:
    build:
      context: ../..
      dockerfile: services/orion-cortex-exec/Dockerfile
    container_name: ${PROJECT}-cortex-exec
    restart: unless-stopped
    env_file:
      - .env

    volumes:
      - ${ORION_HOST_TAILSCALE_BIN:-/usr/bin/tailscale}:${ORION_CONTAINER_TAILSCALE_BIN:-/usr/bin/tailscale}:ro
      - ${ORION_HOST_TAILSCALE_RUN:-/var/run/tailscale}:/var/run/tailscale:ro
      # Host Docker engine + CLI for skills.runtime.docker_prune_stopped_containers.v1 (and other docker skills).
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${ORION_HOST_DOCKER_CLI:-/usr/bin/docker}:/usr/bin/docker:ro
      # NVIDIA: slim image omits nvidia-smi; bind-mount host binary. Needs NVIDIA Container Toolkit + `gpus`
      # below. On hosts without a GPU stack, comment this line and `gpus`, or point ORION_HOST_NVIDIA_SMI at a
      # valid host path.
      - ${ORION_HOST_NVIDIA_SMI:-/usr/bin/nvidia-smi}:/usr/bin/nvidia-smi:ro

    # Block-device access for skills.storage.disk_health_snapshot.v1 (smartctl/nvme need host nodes).
    privileged: true
    # Expose GPU devices + driver libs into the container for nvidia-smi / NVML (requires nvidia-container-toolkit).
    gpus: all

    #volumes:
    #  - ./services/orion-cortex-exec/app:/app/app

    environment:
      # Cortex-specific settings from .env
      NODE_NAME: ${NODE_NAME}

      SERVICE_NAME: ${SERVICE_NAME}
      SERVICE_VERSION: ${SERVICE_VERSION}

      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC}

      ORION_BUS_URL: ${ORION_BUS_URL}
      ORION_BUS_ENFORCE_CATALOG: ${ORION_BUS_ENFORCE_CATALOG}
      ORION_BUS_ENABLED: ${ORION_BUS_ENABLED}

      CHANNEL_EXEC_REQUEST: ${CHANNEL_EXEC_REQUEST}
      CHANNEL_COGNITION_TRACE_PUB: ${CHANNEL_COGNITION_TRACE_PUB:-orion:cognition:trace}
      CHANNEL_METACOG_TRACE_PUB: ${CHANNEL_METACOG_TRACE_PUB:-orion:metacog:trace}
      EXEC_REQUEST_PREFIX: ${EXEC_REQUEST_PREFIX}
      EXEC_RESULT_PREFIX: ${EXEC_RESULT_PREFIX}
      CORTEX_LOG_CHANNEL: ${CORTEX_LOG_CHANNEL}
      CHANNEL_LLM_INTAKE: ${CHANNEL_LLM_INTAKE}
      ATLAS_METACOG_PROFILE_NAME: ${ATLAS_METACOG_PROFILE_NAME:-}
      CHANNEL_RECALL_INTAKE: ${CHANNEL_RECALL_INTAKE}
      CHANNEL_AGENT_CHAIN_INTAKE: ${CHANNEL_AGENT_CHAIN_INTAKE}
      CHANNEL_PLANNER_INTAKE: ${CHANNEL_PLANNER_INTAKE}
      CHANNEL_COUNCIL_INTAKE: ${CHANNEL_COUNCIL_INTAKE}
      CHANNEL_COUNCIL_REPLY_PREFIX: ${CHANNEL_COUNCIL_REPLY_PREFIX}
      CHANNEL_COLLAPSE_SQL_WRITE: ${CHANNEL_COLLAPSE_SQL_WRITE:-orion:collapse:sql-write}
      CHANNEL_COLLAPSE_INTAKE: ${CHANNEL_COLLAPSE_INTAKE:-orion:collapse:intake}
      CHANNEL_PAD_RPC_REQUEST: ${CHANNEL_PAD_RPC_REQUEST:-orion:pad:rpc:request}
      CHANNEL_STATE_REQUEST: ${CHANNEL_STATE_REQUEST:-orion:state:request}
      CHANNEL_PAD_RPC_REPLY_PREFIX: ${CHANNEL_PAD_RPC_REPLY_PREFIX:-orion:pad:rpc:reply}
      CHANNEL_STATE_REPLY_PREFIX: ${CHANNEL_STATE_REPLY_PREFIX:-orion:state:reply}
      CHANNEL_CORE_EVENTS: ${CHANNEL_CORE_EVENTS:-orion:core:events}
      NOTIFY_URL: ${NOTIFY_URL:-http://orion-notify:7140}
      NOTIFY_API_TOKEN: ${NOTIFY_API_TOKEN}
      ORION_TZ: ${ORION_TZ:-America/Denver}
      SKILLS_COMMAND_TIMEOUT_SEC: ${SKILLS_COMMAND_TIMEOUT_SEC:-8}
      SKILLS_MESH_OPS_TIMEOUT_SEC: ${SKILLS_MESH_OPS_TIMEOUT_SEC:-12}
      DOCKER_SOCK_PATH: ${DOCKER_SOCK_PATH:-/var/run/docker.sock}
      DOCKER_HOST: unix://${DOCKER_SOCK_PATH:-/var/run/docker.sock}
      # Must match ORION_CONTAINER_TAILSCALE_BIN (volume mount target above).
      ORION_ACTIONS_TAILSCALE_PATH: ${ORION_ACTIONS_TAILSCALE_PATH:-/usr/bin/tailscale}
      ORION_ACTIONS_NVIDIA_SMI_PATH: ${ORION_ACTIONS_NVIDIA_SMI_PATH:-/usr/bin/nvidia-smi}
      ORION_ACTIONS_SMARTCTL_PATH: ${ORION_ACTIONS_SMARTCTL_PATH:-/usr/sbin/smartctl}
      ORION_ACTIONS_NVME_PATH: ${ORION_ACTIONS_NVME_PATH:-/usr/sbin/nvme}
      ORION_ACTIONS_GITHUB_API_URL: ${ORION_ACTIONS_GITHUB_API_URL:-https://api.github.com}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ORION_ACTIONS_GITHUB_OWNER: ${ORION_ACTIONS_GITHUB_OWNER:-}
      ORION_ACTIONS_GITHUB_REPO: ${ORION_ACTIONS_GITHUB_REPO:-}
      ORION_ACTIONS_MESH_DEFAULT_LOOKBACK_DAYS: ${ORION_ACTIONS_MESH_DEFAULT_LOOKBACK_DAYS:-7}
      ORION_ACTIONS_DOCKER_PRUNE_DEFAULT_UNTIL: ${ORION_ACTIONS_DOCKER_PRUNE_DEFAULT_UNTIL:-72h}
      ORION_ACTIONS_DOCKER_PROTECTED_LABELS: ${ORION_ACTIONS_DOCKER_PROTECTED_LABELS:-orion.keep=true,keep=true,protected=true}
      SKILLS_ALLOW_MUTATING_RUNTIME_HOUSEKEEPING: ${SKILLS_ALLOW_MUTATING_RUNTIME_HOUSEKEEPING:-false}
      BIOMETRICS_SERVICE_URL: ${BIOMETRICS_SERVICE_URL:-http://orion-athena-biometrics:8100}
      BIOMETRICS_HTTP_TIMEOUT_SEC: ${BIOMETRICS_HTTP_TIMEOUT_SEC:-5}
      JOURNAL_PAGEINDEX_SERVICE_URL: ${JOURNAL_PAGEINDEX_SERVICE_URL:-http://orion-pageindex:8360}
      ENDOGENOUS_RUNTIME_ENABLED: ${ENDOGENOUS_RUNTIME_ENABLED:-false}
      ENDOGENOUS_RUNTIME_SURFACE_CHAT_REFLECTIVE_ENABLED: ${ENDOGENOUS_RUNTIME_SURFACE_CHAT_REFLECTIVE_ENABLED:-false}
      ENDOGENOUS_RUNTIME_SURFACE_OPERATOR_ENABLED: ${ENDOGENOUS_RUNTIME_SURFACE_OPERATOR_ENABLED:-false}
      ENDOGENOUS_RUNTIME_ALLOWED_WORKFLOW_TYPES: ${ENDOGENOUS_RUNTIME_ALLOWED_WORKFLOW_TYPES:-contradiction_review,concept_refinement,reflective_journal}
      ENDOGENOUS_RUNTIME_ALLOW_MENTOR_BRANCH: ${ENDOGENOUS_RUNTIME_ALLOW_MENTOR_BRANCH:-false}
      ENDOGENOUS_RUNTIME_SAMPLE_RATE: ${ENDOGENOUS_RUNTIME_SAMPLE_RATE:-1.0}
      ENDOGENOUS_RUNTIME_MAX_ACTIONS: ${ENDOGENOUS_RUNTIME_MAX_ACTIONS:-5}
      ENDOGENOUS_RUNTIME_STORE_BACKEND: ${ENDOGENOUS_RUNTIME_STORE_BACKEND:-memory}
      ENDOGENOUS_RUNTIME_STORE_PATH: ${ENDOGENOUS_RUNTIME_STORE_PATH:-/tmp/orion_endogenous_runtime_records.jsonl}
      ENDOGENOUS_RUNTIME_STORE_MAX_RECORDS: ${ENDOGENOUS_RUNTIME_STORE_MAX_RECORDS:-2000}
      ENDOGENOUS_RUNTIME_SQL_READ_ENABLED: ${ENDOGENOUS_RUNTIME_SQL_READ_ENABLED:-true}
      ENDOGENOUS_RUNTIME_SQL_DATABASE_URL: ${ENDOGENOUS_RUNTIME_SQL_DATABASE_URL:-postgresql://postgres:postgres@orion-athena-sql-db:5432/conjourney}
      ORION_REPO_ROOT: ${ORION_REPO_ROOT:-}
      CONCEPT_PROFILE_REPOSITORY_BACKEND: ${CONCEPT_PROFILE_REPOSITORY_BACKEND:-local}
      CONCEPT_PROFILE_GRAPHDB_ENDPOINT: ${CONCEPT_PROFILE_GRAPHDB_ENDPOINT:-}
      CONCEPT_PROFILE_GRAPHDB_URL: ${CONCEPT_PROFILE_GRAPHDB_URL:-}
      CONCEPT_PROFILE_GRAPHDB_REPO: ${CONCEPT_PROFILE_GRAPHDB_REPO:-collapse}
      CONCEPT_PROFILE_GRAPHDB_USER: ${CONCEPT_PROFILE_GRAPHDB_USER:-}
      CONCEPT_PROFILE_GRAPHDB_PASS: ${CONCEPT_PROFILE_GRAPHDB_PASS:-}
      CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC: ${CONCEPT_PROFILE_GRAPH_TIMEOUT_SEC:-6}
      AUTONOMY_GRAPH_TIMEOUT_SEC: ${AUTONOMY_GRAPH_TIMEOUT_SEC:-4.5}
      AUTONOMY_SUBJECT_MAX_WORKERS: ${AUTONOMY_SUBJECT_MAX_WORKERS:-2}
      AUTONOMY_SUBQUERY_MAX_WORKERS: ${AUTONOMY_SUBQUERY_MAX_WORKERS:-1}
      AUTONOMY_CHAT_STANCE_SHORT_CIRCUIT: ${AUTONOMY_CHAT_STANCE_SHORT_CIRCUIT:-true}
      GRAPHDB_PROBE_TIMEOUT_SEC: ${GRAPHDB_PROBE_TIMEOUT_SEC:-3.0}
      AUTONOMY_GRAPH_PROBE_DEEP: ${AUTONOMY_GRAPH_PROBE_DEEP:-false}
      CONCEPT_PROFILE_GRAPH_URI: ${CONCEPT_PROFILE_GRAPH_URI:-http://conjourney.net/graph/spark/concept-profile}
      CONCEPT_PROFILE_PARITY_MIN_COMPARISONS: ${CONCEPT_PROFILE_PARITY_MIN_COMPARISONS:-50}
      CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE: ${CONCEPT_PROFILE_PARITY_MAX_MISMATCH_RATE:-0.05}
      CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE: ${CONCEPT_PROFILE_PARITY_MAX_UNAVAILABLE_RATE:-0.02}
      CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES: ${CONCEPT_PROFILE_PARITY_CRITICAL_MISMATCH_CLASSES:-profile_missing_on_graph,profile_missing_on_local,query_error}
      CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL: ${CONCEPT_PROFILE_PARITY_SUMMARY_INTERVAL:-25}

      STEP_TIMEOUT_MS: ${STEP_TIMEOUT_MS}
      LLM_CHAT_QUICK_MAX_TOKENS: ${LLM_CHAT_QUICK_MAX_TOKENS:-384}
      LLM_CHAT_GENERAL_MAX_TOKENS: ${LLM_CHAT_GENERAL_MAX_TOKENS:-2048}
      LLM_CHAT_FALLBACK_MAX_TOKENS: ${LLM_CHAT_FALLBACK_MAX_TOKENS:-512}
      LLM_DREAM_MAX_TOKENS: ${LLM_DREAM_MAX_TOKENS:-32768}

      PYTHONUNBUFFERED: 1

    networks:
      - app-net

networks:
  app-net:
    external: true

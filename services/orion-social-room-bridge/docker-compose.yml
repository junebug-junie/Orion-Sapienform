services:
  orion-social-room-bridge:
    build:
      context: ../..
      dockerfile: services/orion-social-room-bridge/Dockerfile
    container_name: ${PROJECT:-orion}-social-room-bridge
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-orion-social-room-bridge}
      SERVICE_NAME: ${SERVICE_NAME:-orion-social-room-bridge}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      NODE_NAME: ${NODE_NAME:-unknown}
      PORT: ${PORT:-8764}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ORION_BUS_URL: ${ORION_BUS_URL}
      ORION_BUS_ENABLED: ${ORION_BUS_ENABLED:-true}
      ORION_BUS_ENFORCE_CATALOG: ${ORION_BUS_ENFORCE_CATALOG:-false}
      SOCIAL_BRIDGE_ENABLED: ${SOCIAL_BRIDGE_ENABLED:-true}
      SOCIAL_BRIDGE_DRY_RUN: ${SOCIAL_BRIDGE_DRY_RUN:-false}
      SOCIAL_BRIDGE_PLATFORM: ${SOCIAL_BRIDGE_PLATFORM:-callsyne}
      SOCIAL_BRIDGE_USE_RECALL: ${SOCIAL_BRIDGE_USE_RECALL:-true}
      SOCIAL_BRIDGE_ROOM_ALLOWLIST: ${SOCIAL_BRIDGE_ROOM_ALLOWLIST:-}
      SOCIAL_BRIDGE_SELF_PARTICIPANT_IDS: ${SOCIAL_BRIDGE_SELF_PARTICIPANT_IDS:-}
      SOCIAL_BRIDGE_SELF_NAME: ${SOCIAL_BRIDGE_SELF_NAME:-Oríon}
      SOCIAL_BRIDGE_AUTONOMY_MODE: ${SOCIAL_BRIDGE_AUTONOMY_MODE:-responsive}
      SOCIAL_BRIDGE_ONLY_WHEN_ADDRESSED: ${SOCIAL_BRIDGE_ONLY_WHEN_ADDRESSED:-false}
      SOCIAL_BRIDGE_COOLDOWN_SEC: ${SOCIAL_BRIDGE_COOLDOWN_SEC:-0}
      SOCIAL_BRIDGE_MAX_CONSECUTIVE_ORION_TURNS: ${SOCIAL_BRIDGE_MAX_CONSECUTIVE_ORION_TURNS:-2}
      SOCIAL_BRIDGE_MIN_NOVELTY_SCORE: ${SOCIAL_BRIDGE_MIN_NOVELTY_SCORE:-0.22}
      SOCIAL_BRIDGE_LIGHT_INITIATIVE_MIN_CONTINUITY: ${SOCIAL_BRIDGE_LIGHT_INITIATIVE_MIN_CONTINUITY:-0.45}
      SOCIAL_BRIDGE_DEDUPE_TTL_SEC: ${SOCIAL_BRIDGE_DEDUPE_TTL_SEC:-3600}
      SOCIAL_BRIDGE_SESSION_NAMESPACE: ${SOCIAL_BRIDGE_SESSION_NAMESPACE:-callsyne-room}
      HUB_BASE_URL: ${HUB_BASE_URL:-http://orion-hub:8080}
      HUB_CHAT_PATH: ${HUB_CHAT_PATH:-/api/chat}
      HUB_TIMEOUT_SEC: ${HUB_TIMEOUT_SEC:-120}
      CALLSYNE_BASE_URL: ${CALLSYNE_BASE_URL}
      CALLSYNE_API_TOKEN: ${CALLSYNE_API_TOKEN}
      CALLSYNE_TIMEOUT_SEC: ${CALLSYNE_TIMEOUT_SEC:-30}
      CALLSYNE_POST_PATH_TEMPLATE: ${CALLSYNE_POST_PATH_TEMPLATE:-/api/bridge/messages}
      CALLSYNE_WEBHOOK_TOKEN: ${CALLSYNE_WEBHOOK_TOKEN:-}
      SOCIAL_MEMORY_BASE_URL: ${SOCIAL_MEMORY_BASE_URL:-http://orion-social-memory:8765}
      SOCIAL_MEMORY_TIMEOUT_SEC: ${SOCIAL_MEMORY_TIMEOUT_SEC:-3}
      ROOM_INTAKE_CHANNEL: ${ROOM_INTAKE_CHANNEL:-orion:bridge:social:room:intake}
      ROOM_DELIVERY_CHANNEL: ${ROOM_DELIVERY_CHANNEL:-orion:bridge:social:room:delivery}
      ROOM_SKIPPED_CHANNEL: ${ROOM_SKIPPED_CHANNEL:-orion:bridge:social:room:skipped}
      ROOM_PARTICIPANT_CHANNEL: ${ROOM_PARTICIPANT_CHANNEL:-orion:bridge:social:participant}
      ROOM_REPAIR_SIGNAL_CHANNEL: ${ROOM_REPAIR_SIGNAL_CHANNEL:-orion:social:repair:signal}
      ROOM_REPAIR_DECISION_CHANNEL: ${ROOM_REPAIR_DECISION_CHANNEL:-orion:social:repair:decision}
      ROOM_EPISTEMIC_SIGNAL_CHANNEL: ${ROOM_EPISTEMIC_SIGNAL_CHANNEL:-orion:social:epistemic:signal}
      ROOM_EPISTEMIC_DECISION_CHANNEL: ${ROOM_EPISTEMIC_DECISION_CHANNEL:-orion:social:epistemic:decision}
      ROOM_TURN_POLICY_CHANNEL: ${ROOM_TURN_POLICY_CHANNEL:-orion:social:turn-policy}
    ports:
      - "${PORT:-89101}:${PORT:-89101}"
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    external: true

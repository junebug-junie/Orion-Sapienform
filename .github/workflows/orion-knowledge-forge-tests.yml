# Workflow: Orion Knowledge Forge (repo-root package + service + Hub proxy tests).

name: orion-knowledge-forge-tests

on:
  pull_request:
    paths:
      - "orion/knowledge_forge/**"
      - "orion-knowledge/**"
      - "services/orion-knowledge-forge/**"
      - "services/orion-hub/app/settings.py"
      - "services/orion-hub/scripts/api_routes.py"
      - "services/orion-hub/tests/test_knowledge_forge_proxy_routes.py"
      - "tests/test_knowledge_forge_*.py"
      - "tests/fixtures/knowledge_forge/**"
      - ".github/workflows/orion-knowledge-forge-tests.yml"
  push:
    branches: [main]
    paths:
      - "orion/knowledge_forge/**"
      - "orion-knowledge/**"
      - "services/orion-knowledge-forge/**"
      - "services/orion-hub/app/settings.py"
      - "services/orion-hub/scripts/api_routes.py"
      - "services/orion-hub/tests/test_knowledge_forge_proxy_routes.py"
      - "tests/test_knowledge_forge_*.py"
      - "tests/fixtures/knowledge_forge/**"
      - ".github/workflows/orion-knowledge-forge-tests.yml"

jobs:
  knowledge-forge:
    name: Knowledge Forge unit + golden path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (PyYAML + pydantic from hub requirements subset)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic PyYAML fastapi httpx aiohttp
      - name: Run Knowledge Forge repo-root tests
        run: |
          PYTHONPATH=. python -m pytest tests/test_knowledge_forge_*.py -q
      - name: Run Knowledge Forge service tests
        run: |
          PYTHONPATH=services/orion-knowledge-forge python -m pytest services/orion-knowledge-forge/tests/ -q
      - name: Run Hub Knowledge Forge proxy tests
        run: |
          PYTHONPATH=services/orion-hub python -m pytest services/orion-hub/tests/test_knowledge_forge_proxy_routes.py -q

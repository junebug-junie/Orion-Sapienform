schema_version: proposal_policy.v1
policy_id: proposal_policy.v1

limits:
  max_candidates: 10
  max_suppressed: 10

thresholds:
  min_priority: 0.10
  suppress_below: 0.05
  policy_required_above_risk: 0.20

dimension_weights:
  execution_pressure: 0.30
  resource_pressure: 0.25
  reasoning_pressure: 0.15
  reliability_pressure: 0.35
  uncertainty: 0.25
  field_intensity: 0.20
  agency_readiness: -0.15
  coherence: -0.20

proposal_templates:
  inspect_execution_pressure:
    kind: inspect
    target_kind: capability
    target_id: capability:orchestration
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.40
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      execution_pressure: 0.60

  summarize_loaded_state:
    kind: summarize
    target_kind: self_state
    target_id: self:current
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.35
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      field_intensity: 0.50
      resource_pressure: 0.40

  watch_reliability:
    kind: observe
    target_kind: capability
    target_id: capability:orchestration
    proposed_effect: preserve_stability
    required_policy_gate: read_only
    base_priority: 0.30
    base_risk: 0.02
    reversibility: 1.0
    dimensions:
      reliability_pressure: 0.50

  request_policy_review_for_action:
    kind: request_policy_review
    target_kind: system
    target_id: policy:execution
    proposed_effect: prepare_for_policy_gate
    required_policy_gate: operator_review
    base_priority: 0.20
    base_risk: 0.30
    reversibility: 0.8
    dimensions:
      agency_readiness: 0.50
      execution_pressure: 0.40

  inspect_transport_status:
    kind: inspect
    target_kind: capability
    target_id: capability:transport
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.42
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      contract_pressure: 0.55
      reliability_pressure: 0.40

  inspect_bus_channel_catalog:
    kind: inspect
    target_kind: system
    target_id: orion/bus/channels.yaml
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.38
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      contract_pressure: 0.60

  summarize_transport_contract_drift:
    kind: summarize
    target_kind: capability
    target_id: capability:transport
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.36
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      contract_pressure: 0.65

  watch_transport_backpressure:
    kind: observe
    target_kind: capability
    target_id: capability:transport
    proposed_effect: preserve_stability
    required_policy_gate: read_only
    base_priority: 0.32
    base_risk: 0.02
    reversibility: 1.0
    dimensions:
      contract_pressure: 0.50

  defer_due_to_low_readiness:
    kind: defer
    target_kind: self_state
    target_id: self:current
    proposed_effect: preserve_stability
    required_policy_gate: none
    base_priority: 0.25
    base_risk: 0.0
    reversibility: 1.0
    dimensions:
      uncertainty: 0.50
      reliability_pressure: 0.50

  inspect_node_resource_pressure:
    kind: inspect
    target_kind: node
    target_id: node:atlas
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.34
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      resource_pressure: 0.50

  inspect_field_topology_catalog:
    kind: inspect
    target_kind: field
    target_id: config/field/orion_field_topology.v1.yaml
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.33
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      field_intensity: 0.45

  # P5: attention-bound proposal target. target_id/target_kind below are the
  # fallback literal, used only if target_binding fails to resolve (empty
  # dominant_attention_target_details, or a resolved target_kind outside the
  # accepted whitelist). When it resolves, the candidate's target_id/target_kind
  # follow self_state.dominant_attention_target_details[0] instead.
  #
  # Kill criterion (falsifiable by design, not yet run -- needs live traffic):
  # over a 7-day window, distinct(target_id) across this template's candidates
  # must be >= 3, or the binding isn't doing anything Orion's attention doesn't
  # already do via the literal templates above. See
  # orion/autonomy/evals/run_attention_bound_proposal_eval.py.
  inspect_attended_target:
    kind: inspect
    target_kind: capability   # placeholder default kind; overridden per-candidate when binding resolves to a different kind
    target_id: capability:orchestration   # fallback literal, used only if the binding fails to resolve
    target_binding: "self_state.dominant_attention_targets[0]"
    proposed_effect: increase_observability
    required_policy_gate: read_only
    base_priority: 0.34   # shipped live per explicit user go-ahead ("turn on whatever you need"), not dark-shipped at 0.0 -- read-only inspect proposal under the existing policy gate, same risk class as every other already-live inspect template
    base_risk: 0.05
    reversibility: 1.0
    dimensions:
      field_intensity: 0.30

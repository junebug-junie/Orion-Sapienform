services:
  memory-consolidation:
    build:
      context: ../..
      dockerfile: services/orion-memory-consolidation/Dockerfile
    container_name: orion-${NODE_NAME}-memory-consolidation
    restart: unless-stopped
    environment:
      - SERVICE_NAME=${SERVICE_NAME:-orion-memory-consolidation}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}
      - NODE_NAME=${NODE_NAME}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ORION_BUS_URL=${ORION_BUS_URL}
      - ORION_BUS_ENABLED=${ORION_BUS_ENABLED:-true}
      - ORION_HEALTH_CHANNEL=${ORION_HEALTH_CHANNEL}
      - ERROR_CHANNEL=${ERROR_CHANNEL}
      - POSTGRES_URI=${POSTGRES_URI}
      - CHANNEL_MEMORY_TURN_PERSISTED=${CHANNEL_MEMORY_TURN_PERSISTED}
      - CHANNEL_CHAT_HISTORY_SPARK_META_PATCH=${CHANNEL_CHAT_HISTORY_SPARK_META_PATCH}
      - CHANNEL_LLM_INTAKE=${CHANNEL_LLM_INTAKE:-orion:exec:request:LLMGatewayService}
      - CHANNEL_CORTEX_REQUEST=${CHANNEL_CORTEX_REQUEST:-orion:cortex:request}
      - CHANNEL_CORTEX_RESULT_PREFIX=${CHANNEL_CORTEX_RESULT_PREFIX:-orion:cortex:result}
      - MEMORY_CONSOLIDATION_ENABLED=${MEMORY_CONSOLIDATION_ENABLED:-true}
      - MEMORY_CLASSIFY_TIMEOUT_SEC=${MEMORY_CLASSIFY_TIMEOUT_SEC:-8.0}
      - MEMORY_BOUNDARY_SCORE_THRESHOLD=${MEMORY_BOUNDARY_SCORE_THRESHOLD:-0.70}
      - MEMORY_BOUNDARY_LLM_ONLY_THRESHOLD=${MEMORY_BOUNDARY_LLM_ONLY_THRESHOLD:-0.85}
      - MEMORY_BOUNDARY_OVERRIDE_THRESHOLD=${MEMORY_BOUNDARY_OVERRIDE_THRESHOLD:-0.92}
      - MEMORY_SUGGEST_TIMEOUT_SEC=${MEMORY_SUGGEST_TIMEOUT_SEC:-120.0}
      - MEMORY_FAILED_RETRY_INTERVAL_SEC=${MEMORY_FAILED_RETRY_INTERVAL_SEC:-1800}
      - MEMORY_CONSOLIDATION_OUTPUT=${MEMORY_CONSOLIDATION_OUTPUT:-crystallization_propose}
      - MEMORY_CONSOLIDATION_MIN_NOVELTY=${MEMORY_CONSOLIDATION_MIN_NOVELTY:-0.35}
      - MEMORY_CONSOLIDATION_MIN_SIGNIFICANCE=${MEMORY_CONSOLIDATION_MIN_SIGNIFICANCE:-0.40}
      - MEMORY_CONSOLIDATION_FETCH_GRAMMAR_EVIDENCE=${MEMORY_CONSOLIDATION_FETCH_GRAMMAR_EVIDENCE:-true}
      - MEMORY_CONSOLIDATION_GRAMMAR_DSN=${MEMORY_CONSOLIDATION_GRAMMAR_DSN:-}
      - MEMORY_FORMATION_AUTO_ACTIVATE_ENABLED=${MEMORY_FORMATION_AUTO_ACTIVATE_ENABLED:-false}
      - MEMORY_FORMATION_AUTO_ENCODE_ACTIVATION_RATIO=${MEMORY_FORMATION_AUTO_ENCODE_ACTIVATION_RATIO:-0.4}
      - CRYSTALLIZER_VECTOR_COLLECTION=${CRYSTALLIZER_VECTOR_COLLECTION:-orion_memory_crystallizations}
      - CRYSTALLIZER_EMBED_HOST_URL=${CRYSTALLIZER_EMBED_HOST_URL:-}
      - CRYSTALLIZER_EMBED_TIMEOUT_MS=${CRYSTALLIZER_EMBED_TIMEOUT_MS:-8000}
      - CHROMA_HOST=${CHROMA_HOST:-}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CONCEPT_RELATION_RESOLUTION_ENABLED=${CONCEPT_RELATION_RESOLUTION_ENABLED:-false}
      - CONCEPT_RELATION_CONFIDENCE_FLOOR=${CONCEPT_RELATION_CONFIDENCE_FLOOR:-0.6}
      - CONCEPT_RELATION_CANDIDATE_LIMIT=${CONCEPT_RELATION_CANDIDATE_LIMIT:-5}
      - CONCEPT_RELATION_TIMEOUT_SEC=${CONCEPT_RELATION_TIMEOUT_SEC:-8.0}
    ports:
      - "${PORT:-8635}:8000"
    networks:
      - app-net

networks:
  app-net:
    external: true
    name: ${NET:-app-net}

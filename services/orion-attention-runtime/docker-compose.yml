services:
  attention-runtime:
    build:
      context: ../..
      dockerfile: services/orion-attention-runtime/Dockerfile
    container_name: ${PROJECT}-attention-runtime
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${ATTENTION_RUNTIME_PORT:-8117}:8117"
    environment:
      - PROJECT=${PROJECT}
      - SERVICE_NAME=${SERVICE_NAME:-orion-attention-runtime}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}
      - POSTGRES_URI=${POSTGRES_URI}
      - ATTENTION_POLICY_PATH=${ATTENTION_POLICY_PATH:-/app/config/attention/field_attention_policy.v1.yaml}
      - ATTENTION_POLL_INTERVAL_SEC=${ATTENTION_POLL_INTERVAL_SEC:-2.0}
      - ENABLE_ATTENTION_RUNTIME=${ENABLE_ATTENTION_RUNTIME:-true}
      - ENABLE_TRANSPORT_ATTENTION_VISIBILITY=${ENABLE_TRANSPORT_ATTENTION_VISIBILITY:-false}
      - ATTENTION_FRAME_RETENTION_HOURS=${ATTENTION_FRAME_RETENTION_HOURS:-72.0}
      - ATTENTION_FRAME_PRUNE_INTERVAL_SEC=${ATTENTION_FRAME_PRUNE_INTERVAL_SEC:-3600.0}
      - ATTENTION_RUNTIME_HEALTH_CHECK_INTERVAL_SEC=${ATTENTION_RUNTIME_HEALTH_CHECK_INTERVAL_SEC:-900.0}
      - ATTENTION_FRAME_STALL_MULTIPLIER=${ATTENTION_FRAME_STALL_MULTIPLIER:-1.5}
      - NOTIFY_BASE_URL=${NOTIFY_BASE_URL:-http://orion-athena-notify:7140}
      - NOTIFY_API_TOKEN=${NOTIFY_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

networks:
  app-net:
    external: true

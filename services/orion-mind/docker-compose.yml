# Load variables from `.env` beside this file (see `.env_example`).
# Run from `services/orion-mind`: docker compose -f docker-compose.yml up --build

services:
  mind:
    build:
      context: ../..
      dockerfile: services/orion-mind/Dockerfile
    container_name: ${PROJECT:-orion}-mind
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: ${SERVICE_NAME:-orion-mind}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      NODE_NAME: ${NODE_NAME:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: ${PORT:-6611}
      MIND_SNAPSHOT_MAX_BYTES: ${MIND_SNAPSHOT_MAX_BYTES:-512000}
      MIND_WALL_MS_DEFAULT: ${MIND_WALL_MS_DEFAULT:-120000}
      MIND_N_LOOPS_DEFAULT: ${MIND_N_LOOPS_DEFAULT:-1}
      MIND_ROUTER_PROFILES_PATH: ${MIND_ROUTER_PROFILES_PATH:-}
    networks:
      - app-net
    ports:
      - "${HOST_PORT:-6611}:${PORT:-6611}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf \"http://127.0.0.1:$${PORT:-6611}/health\" >/dev/null || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-net:
    external: true

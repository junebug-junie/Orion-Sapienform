name: chat_general
label: Chat (Generalist)
description: >
  General-purpose identity-aware chat verb for Oríon + Juniper.
  Handles technical questions, architecture, planning, and reflective
  conversation using a single LLM engine via LLMGatewayService, while
  preserving stable Orion identity and Juniper relationship context.

category: ExecutiveControl
priority: medium

interruptible: true
can_interrupt_others: false

requires_gpu: true
requires_memory: true

recall_profile: chat.general.v1

timeout_ms: 300000
max_recursion_depth: 0

services:
  - LLMGatewayService

prompt_template: chat_general.j2

personality_file: orion/cognition/personality/orion_identity.yaml

plan:
  - name: collect_metacog_context
    description: >
      Hydrate current spark/turn-effect context so chat-general turns can
      propagate downstream tension signals.
    order: 0
    services:
      - MetacogContextService
  - name: synthesize_chat_stance_brief
    description: >
      Bounded internal synthesis pass that composes identity kernel, concept induction,
      social state, and reflective continuity into a strict stance brief.
      This step is toolless and emits only internal structured guidance.
    order: 1
    prompt_template: chat_stance_brief.j2
    services:
      - LLMGatewayService
    requires_gpu: true
    requires_memory: true
  - name: llm_chat_general
    description: >
      Final speech pass that answers Juniper directly using the synthesized stance brief.
      Keeps chat bounded, identity-aware, and non-agentic.
    order: 2
    prompt_template: chat_general.j2
    services:
      - LLMGatewayService
    requires_gpu: true
    requires_memory: true

safety_rules: []

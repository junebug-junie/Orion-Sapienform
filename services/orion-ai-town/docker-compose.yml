# Orion mesh wrapper for upstream ai-town self-hosted Convex stack.
# Bootstrap: clone upstream before first build (see README.md).
services:
  frontend:
    build:
      context: ./upstream
      dockerfile: Dockerfile
      args:
        VITE_CONVEX_URL: ${URL_BASE:-http://127.0.0.1}:${PORT:-3210}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_CONVEX_URL=${URL_BASE:-http://127.0.0.1}:${PORT:-3210}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-town-network

  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    ports:
      - "${PORT:-3210}:3210"
      - "${SITE_PROXY_PORT:-3211}:3211"
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - convex-data:/convex/data
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-orion-aitown}
      - INSTANCE_SECRET=${INSTANCE_SECRET:-}
      - CONVEX_RELEASE_VERSION_DEV=${CONVEX_RELEASE_VERSION_DEV:-}
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-}
      - CONVEX_CLOUD_ORIGIN=${URL_BASE:-http://127.0.0.1}:${PORT:-3210}
      - CONVEX_SITE_ORIGIN=${URL_BASE:-http://127.0.0.1}:${SITE_PROXY_PORT:-3211}
      - DATABASE_URL=${DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      start_period: 10s
      retries: 5
    networks:
      - ai-town-network

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    ports:
      - "${DASHBOARD_PORT:-6791}:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${URL_BASE:-http://127.0.0.1}:${PORT:-3210}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-town-network

volumes:
  convex-data:

networks:
  ai-town-network:
    driver: bridge

services:
  field-digester:
    build:
      context: ../..
      dockerfile: services/orion-field-digester/Dockerfile
    container_name: ${PROJECT}-field-digester
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${FIELD_DIGESTER_PORT:-8116}:8116"
    environment:
      - PROJECT=${PROJECT}
      - NODE_NAME=${NODE_NAME}
      - SERVICE_NAME=${SERVICE_NAME:-orion-field-digester}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}
      - POSTGRES_URI=${POSTGRES_URI}
      - LATTICE_PATH=${LATTICE_PATH:-/app/config/field/orion_field_topology.v1.yaml}
      - BIOMETRICS_FIELD_DECAY_RATE=${BIOMETRICS_FIELD_DECAY_RATE:-0.92}
      - BIOMETRICS_FIELD_DIFFUSION_RATE=${BIOMETRICS_FIELD_DIFFUSION_RATE:-1.0}
      - RECEIPT_POLL_INTERVAL_SEC=${RECEIPT_POLL_INTERVAL_SEC:-2.0}
      - ENABLE_TRANSPORT_FIELD_DIGESTION=${ENABLE_TRANSPORT_FIELD_DIGESTION:-false}
      - FIELD_DIGESTER_IDLE_TICK_ENABLED=${FIELD_DIGESTER_IDLE_TICK_ENABLED:-true}
      - FIELD_STATE_RETENTION_HOURS=${FIELD_STATE_RETENTION_HOURS:-72.0}
      - FIELD_STATE_PRUNE_INTERVAL_SEC=${FIELD_STATE_PRUNE_INTERVAL_SEC:-3600.0}
      - FIELD_APPLIED_DELTAS_PRUNE_MIN_AGE_HOURS=${FIELD_APPLIED_DELTAS_PRUNE_MIN_AGE_HOURS:-1.0}
      - FIELD_DIGESTER_HEALTH_CHECK_INTERVAL_SEC=${FIELD_DIGESTER_HEALTH_CHECK_INTERVAL_SEC:-900.0}
      - FIELD_STATE_STALL_MULTIPLIER=${FIELD_STATE_STALL_MULTIPLIER:-1.5}
      - FIELD_APPLIED_DELTAS_ALERT_ROW_COUNT=${FIELD_APPLIED_DELTAS_ALERT_ROW_COUNT:-5000000}
      - FIELD_DIGESTER_DB_SIZE_ALERT_GB=${FIELD_DIGESTER_DB_SIZE_ALERT_GB:-60.0}
      - NOTIFY_BASE_URL=${NOTIFY_BASE_URL:-http://orion-athena-notify:7140}
      - NOTIFY_API_TOKEN=${NOTIFY_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FIELD_CHANNEL_CORPUS_PATH=${FIELD_CHANNEL_CORPUS_PATH:-}
      - CORPUS_SINK_MAX_BYTES=${CORPUS_SINK_MAX_BYTES:-200000000}
      - CORPUS_SINK_ROTATED_KEEP=${CORPUS_SINK_ROTATED_KEEP:-5}
      - FIELD_PLASTICITY_ENABLED=${FIELD_PLASTICITY_ENABLED:-true}
      - FIELD_PLASTICITY_MAX_DRIFT=${FIELD_PLASTICITY_MAX_DRIFT:-0.15}
      - FIELD_PLASTICITY_DECAY_HALF_LIFE_HOURS=${FIELD_PLASTICITY_DECAY_HALF_LIFE_HOURS:-168}
      - FIELD_PLASTICITY_SQL_DB_PATH=${FIELD_PLASTICITY_SQL_DB_PATH:-}
      - FIELD_PLASTICITY_PRODUCER_ENABLED=${FIELD_PLASTICITY_PRODUCER_ENABLED:-true}
      - FIELD_PLASTICITY_PRODUCER_INTERVAL_HOURS=${FIELD_PLASTICITY_PRODUCER_INTERVAL_HOURS:-24}
      - FIELD_PLASTICITY_PRODUCER_WINDOW_HOURS=${FIELD_PLASTICITY_PRODUCER_WINDOW_HOURS:-168}

    volumes:
      # FIELD_CHANNEL_CORPUS_PATH defaults under /mnt/telemetry (same host
      # mount orion-spark-introspector already uses for its own corpus
      # paths) -- without this mount the path resolves inside the
      # container's ephemeral filesystem and silently vanishes on restart.
      - ${TELEMETRY_ROOT:-/mnt/telemetry}:/mnt/telemetry
      # FIELD_PLASTICITY_SQL_DB_PATH lives on the same disk as Postgres (a
      # sibling directory to postgres_data, never inside it) -- shared with
      # orion-hub's identical mount below so both containers see the same
      # sqlite file.
      - ${STORAGE_ROOT:-/mnt/postgres}/field_topology:/mnt/postgres/field_topology

networks:
  app-net:
    external: true
